openapi: '3.0.3'
info:
  title: 'Private Equity & Venture Capital API'
  description: "Comprehensive API for accessing private equity and venture capital data including funds, general partners, transactions, and portfolio companies.\n"
  version: '1.0.0'
  contact:
    name: 'FactSet Research Systems'
    email: 'api@factset.com'
    url: 'https://developer.factset.com/contact'
  license:
    name: 'Apache License, Version 2.0'
    url: 'https://www.apache.org/licenses/LICENSE-2.0'
externalDocs:
  description: 'API Documentation'
  url: 'https://developer.factset.com/api-catalog/factset-pevc-api'
servers:
  - url: 'https://api.factset.com/content/factset-pevc/v1'
    description: 'Production'
security:
  - FactSetApiKey: []
  - FactSetOAuth2: []
tags:
  - name: 'Universe'
    description: 'Returns Entity Candidates and Matches for a single name and attributes.'
  - name: 'Funds'
    description: 'Access detailed information on Private Equity and Venture Capital funds, including fundraising history, cash flows, performance metrics, portfolio holdings, and associated Limited Partners.'
  - name: 'General and Limited Partners'
    description: 'Retrieve comprehensive data for General Partners (GP) and Limited Partners (LP), including firm profiles, managed funds, key contacts, and commitments.'
  - name: 'Transactions'
    description: 'Detailed access to private transaction events like venture capital, private equity, and M&A activity for portfolio companies, including investment stage, amount, investors, and securities.'
  - name: 'Strategies'
    description: 'Defines the investment strategy of a fund or General Partner, detailing geographic, sector, instrument, and control criteria focus.'
  - name: 'IPOs'
    description: 'Provides information on the Initial Public Offerings (IPOs) of portfolio companies, including pricing, size, and status.'
paths:
  /universe:
    get:
      summary: 'Returns Entity Candidates and Matches for a single name and attributes.'
      description: "Finds the best candidate entities matching the given entity name. Country code can also be supplied to narrow the search.\n\nReturns a list of potential entity matches, along with a match indicator, to assist in identifying the correct entity within the FactSet universe.\n\n**Max of 1 Name permitted in a single request.**\n"
      tags:
        - 'Universe'
      operationId: 'getUniverse'
      parameters:
        - $ref: '#/components/parameters/name'
        - $ref: '#/components/parameters/country'
        - $ref: '#/components/parameters/entityType'
      responses:
        '200':
          description: 'Response containing Entity Match results.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityMatchesResponse'
              examples:
                Entity Matches:
                  $ref: '#/components/examples/resultOfEntityMatches'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '415':
          $ref: '#/components/responses/415'
        '500':
          $ref: '#/components/responses/500'
  /funds:
    get:
      summary: 'Retrieve core profile and summary data for specified Private Equity or Venture Capital Funds.'
      description: "Retrieves the main descriptive and profile information for one or more Private Equity or Venture Capital funds identified by their FactSet entity IDs. This includes key characteristics like fund status (e.g., Open, Closed), fund type (e.g., Venture, Buyout), vintage year, and high-level strategy details.\n\nUse the `/universe` endpoint, set the `entityType` parameter to `VEN` (Venture Capital Fund), `PVF` (Private Equity Fund/Alt Investment), or `FAF` (Family of Funds (Venture Capital/Private Equity)). Submit the fund's name. The returned `entityId` is the required input value for this endpoint."
      operationId: 'getFund'
      tags:
        - 'Funds'
      parameters:
        - $ref: '#/components/parameters/ids'
      responses:
        '200':
          description: 'Successful response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FundDetailsResponse'
              examples:
                Fund Details:
                  $ref: '#/components/examples/resultOfFunds'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '415':
          $ref: '#/components/responses/415'
        '500':
          $ref: '#/components/responses/500'
  /funds/portfolio-companies:
    get:
      summary: 'Retrieve the list of portfolio companies held by specified Private Equity or Venture Capital Funds.'
      description: "Provides a list of **FactSet entity identifiers** for the portfolio companies in which a specified fund has invested. This endpoint is key for analyzing a fund's holdings and exposure to different companies in the private market.\n\nUse the `/universe` endpoint, set the `entityType` parameter to `VEN` (Venture Capital Fund), `PVF` (Private Equity Fund/Alt Investment), or `FAF` (Family of Funds (Venture Capital/Private Equity)). Submit the fund's name. The returned `entityId` is the required input value for this endpoint."
      operationId: 'getFundPortfolioCompanies'
      tags:
        - 'Funds'
      parameters:
        - $ref: '#/components/parameters/portfolioCompaniesIds'
      responses:
        '200':
          description: 'Successful response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FundPortfolioCompaniesResponse'
              examples:
                Portfolio Companies:
                  $ref: '#/components/examples/resultOfPortfolioCompanies'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '415':
          $ref: '#/components/responses/415'
        '500':
          $ref: '#/components/responses/500'
  /funds/fundraising:
    get:
      summary: 'Retrieve the complete fundraising history for specified Private Equity or Venture Capital Funds.'
      description: "Provides detailed information on the **fundraising lifecycle** of one or more funds, including data on interim and **final closes**, the **total amount raised** (fund size), and the as-reported currency for each fundraising round.\n\nUse the `/universe` endpoint, set the `entityType` parameter to `VEN` (Venture Capital Fund), `PVF` (Private Equity Fund/Alt Investment), or `FAF` (Family of Funds (Venture Capital/Private Equity)). Submit the fund's name. The returned `entityId` is the required input value for this endpoint."
      operationId: 'getFundFundraising'
      tags:
        - 'Funds'
      parameters:
        - $ref: '#/components/parameters/fundraisingIds'
      responses:
        '200':
          description: 'Successful response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FundFundraisingResponse'
              examples:
                Fundraising:
                  $ref: '#/components/examples/resultOfFundraising'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '415':
          $ref: '#/components/responses/415'
        '500':
          $ref: '#/components/responses/500'
  /funds/cashflows:
    post:
      summary: 'Retrieve time-series cash flow data (contributions and distributions) for specified funds.'
      description: "Provides **quarterly** cash flow data for one or more funds, including **contributions** (capital calls) and **distributions** (payouts). This raw data is fundamental for calculating net cash flows and performance metrics like DPI, TVPI, and IRR.\n\nUse the `/universe` endpoint, set the `entityType` parameter to `VEN` (Venture Capital Fund), `PVF` (Private Equity Fund/Alt Investment), or `FAF` (Family of Funds (Venture Capital/Private Equity)). Submit the fund's name. The returned `entityId` is the required input value for this endpoint."
      operationId: 'getFundCashflows'
      tags:
        - 'Funds'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FundCashflowsRequest'
            examples:
              Fund Cashflows request for multiple funds:
                $ref: '#/components/examples/postFundCashflows'
      responses:
        '200':
          description: 'Successful response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FundCashflowsResponse'
              examples:
                Cashflows:
                  $ref: '#/components/examples/resultOfCashflows'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '415':
          $ref: '#/components/responses/415'
        '500':
          $ref: '#/components/responses/500'
  /general-partners:
    get:
      summary: 'Retrieves historical data for specified General Partner (GP) firms.'
      description: 'Retrieves the primary descriptive and profile information for one or more General Partner firms. This includes firm-level details such as the **Asset Under Management (AUM)** and a high-level overview of their **investment strategy** (e.g., target industry, geography).'
      operationId: 'getGP'
      tags:
        - 'General and Limited Partners'
      parameters:
        - $ref: '#/components/parameters/factsetGpEntityIds'
        - $ref: '#/components/parameters/asOfDate'
      responses:
        '200':
          description: 'Successful response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GPDetailsResponse'
              examples:
                General Partner Details:
                  $ref: '#/components/examples/resultOfGps'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '415':
          $ref: '#/components/responses/415'
        '500':
          $ref: '#/components/responses/500'
  /general-partners/funds:
    get:
      summary: 'Retrieve the list of all Private Equity and Venture Capital Funds managed by specified General Partners.'
      description: "Returns a list of all Private Equity and Venture Capital funds that are actively or historically managed by the specified General Partner firms. This provides a complete view of a GP's fund vintage and strategy history.\n\nUse the `/universe` endpoint and input the GP firm name, with `entityType` set to `HOL`. Only use `entityId` values whose `entityTypeCode` is `HOL` in your request."
      operationId: 'getGPFunds'
      tags:
        - 'General and Limited Partners'
      parameters:
        - $ref: '#/components/parameters/factsetGpEntityIds'
      responses:
        '200':
          description: 'Successful response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GPFundsResponse'
              examples:
                General Partner Managed Funds:
                  $ref: '#/components/examples/resultOfGpsFunds'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '415':
          $ref: '#/components/responses/415'
        '500':
          $ref: '#/components/responses/500'
  /limited-partners/funds:
    get:
      summary: 'Retrieve the Limited Partners (LPs) and their capital commitments to specific funds.'
      description: "Returns a list of **Limited Partners** (investors) associated with the specified funds, along with details of their **capital commitments** (investment amounts) and the **commit date**. This data is essential for understanding a fund's LP base.\n\nUse the `/universe` endpoint and input the fund's name, setting the `entityType` to the most appropriate type (e.g., VEN, FAF, PVF)."
      operationId: 'getFundLimitedPartners'
      tags:
        - 'General and Limited Partners'
      parameters:
        - $ref: '#/components/parameters/fundraisingIds'
      responses:
        '200':
          description: 'Successful response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FundLimitedPartnersResponse'
              examples:
                Limited Partners:
                  $ref: '#/components/examples/resultOfLimitedPartners'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '415':
          $ref: '#/components/responses/415'
        '500':
          $ref: '#/components/responses/500'
  /transactions:
    get:
      summary: 'Retrieve comprehensive details for a list of Private Equity or Venture Capital transactions.'
      description: 'Retrieves rich, fundamental data for one or more private investment transactions, such as a **Venture Capital funding round** or a **Private Equity buyout**. This includes the **deal size** (transaction amount), **transaction date**, participating **investors**, **security type** (e.g., common stock, preferred stock), and the round''s **stage**.'
      operationId: 'getTransaction'
      tags:
        - 'Transactions'
      parameters:
        - $ref: '#/components/parameters/transactionIds'
      responses:
        '200':
          description: 'Successful response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionDetailsResponse'
              examples:
                Transaction Details:
                  $ref: '#/components/examples/resultOfTransactions'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '415':
          $ref: '#/components/responses/415'
        '500':
          $ref: '#/components/responses/500'
  /transactions/search:
    post:
      summary: 'Search and filter the universe of transactions by deal size, date range, stage, and portfolio company.'
      description: 'Allows users to query the universe of private transactions using a set of powerful filters. Filters can include specific **portfolio companies**, **investment stages** (e.g., Seed, Growth, Late), **transaction date range**, and **minimum/maximum transaction amounts** in USD.'
      operationId: 'searchTransactions'
      tags:
        - 'Transactions'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionSearchRequest'
            examples:
              Transaction search request:
                $ref: '#/components/examples/postTransactionSearch'
      responses:
        '200':
          description: 'Successful response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionSearchResponse'
              examples:
                Transaction Search:
                  $ref: '#/components/examples/resultOfTransactionsSearch'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '415':
          $ref: '#/components/responses/415'
        '500':
          $ref: '#/components/responses/500'
  /transactions/ma-activity:
    get:
      summary: 'Retrieve detailed M&A advisory and investment information for specified transactions.'
      description: 'Provides specific details related to Mergers & Acquisitions (M&A) activity for a given transaction. This includes information on M&A **advisors** (e.g., financial, legal) and the specific **investments** made by General Partner and Limited Partner investors in the context of the M&A deal.'
      operationId: 'getTransactionMAActivity'
      tags:
        - 'Transactions'
      parameters:
        - $ref: '#/components/parameters/transactionIds'
      responses:
        '200':
          description: 'Successful response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionMaActivityResponse'
              examples:
                Transaction M&A Details:
                  $ref: '#/components/examples/resultOfTransactionsMaActivity'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '415':
          $ref: '#/components/responses/415'
        '500':
          $ref: '#/components/responses/500'
  /ipos:
    get:
      summary: 'Retrieve details of an Initial Public Offering (IPO) related to a portfolio company exit.'
      description: "Provides comprehensive details on the **Initial Public Offering (IPO)** process for portfolio companies, typically representing an exit for a fund. Information includes the **IPO size**, **pricing**, date, and other relevant capital markets data.\n\nUse the `/transactions/ma-activity` endpoint to find fund deal ids for your request."
      operationId: 'getIPO'
      tags:
        - 'IPOs'
      parameters:
        - $ref: '#/components/parameters/dealIds'
      responses:
        '200':
          description: 'Successful response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IPODetailsResponse'
              examples:
                IPO Details:
                  $ref: '#/components/examples/resultOfIpos'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '415':
          $ref: '#/components/responses/415'
        '500':
          $ref: '#/components/responses/500'
  /ipos/search:
    post:
      summary: 'Search and filter the universe of portfolio company IPOs by status, size, and date range.'
      description: 'Enables filtering of the IPO universe by criteria such as **IPO status** (e.g., Completed, Withdrawn), the **date range** of the IPO, and the minimum or maximum **offering size** in USD.'
      operationId: 'searchIPOs'
      tags:
        - 'IPOs'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IPOSearchRequest'
            examples:
              IPO search request:
                $ref: '#/components/examples/postIPOSearch'
      responses:
        '200':
          description: 'Successful response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IPOSearchResponse'
              examples:
                IPO Details:
                  $ref: '#/components/examples/resultOfIposSearch'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '415':
          $ref: '#/components/responses/415'
        '500':
          $ref: '#/components/responses/500'
  /entities/strategies:
    get:
      summary: 'Retrieve detailed investment strategy mandates for a specified fund or General Partner.'
      description: 'Provides a granular breakdown of the defined investment mandate for a fund or General Partner (GP). The strategy is multi-faceted, covering areas such as target **geographic exposure** (region, country, state), preferred **industry/sector** focus, targeted **investment instruments** (e.g., debt, equity, convertible notes), and **control criteria**.'
      operationId: 'getEntityStrategies'
      tags:
        - 'Strategies'
      parameters:
        - $ref: '#/components/parameters/ids'
      responses:
        '200':
          description: 'Successful response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityStrategiesResponse'
              examples:
                Entity Investment Strategies:
                  $ref: '#/components/examples/resultOfEntityStrategies'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '415':
          $ref: '#/components/responses/415'
        '500':
          $ref: '#/components/responses/500'
components:
  securitySchemes:
    FactSetOAuth2:
      type: 'oauth2'
      flows:
        clientCredentials:
          tokenUrl: 'https://auth.factset.com/as/token.oauth2'
          scopes: {}
    FactSetApiKey:
      type: 'http'
      scheme: 'basic'
  parameters:
    ids:
      name: 'ids'
      in: 'query'
      required: true
      description: 'A list of FactSet Permanent Entity Identifiers (FactSet IDs) for **Private Equity and Venture Capital Funds**. These IDs are in the format ''XXXXXX-E'' and are the primary input for most fund-related endpoints. These IDs can be retrieved from the /universe endpoint'
      schema:
        type: 'array'
        minItems: 1
        maxItems: 50
        example:
          - '001JYM-E'
          - '005GEM-E'
        items:
          type: 'string'
      allowEmptyValue: false
    portfolioCompaniesIds:
      name: 'ids'
      in: 'query'
      required: true
      description: 'A list of FactSet Permanent Entity Identifiers (FactSet IDs) for **Private Equity and Venture Capital Funds**. These IDs are in the format ''XXXXXX-E'' and are the primary input for most fund-related endpoints. These IDs can be retrieved from the /universe endpoint'
      schema:
        type: 'array'
        minItems: 1
        maxItems: 50
        example:
          - '0H7PQB-E'
          - '0JGJY6-E'
        items:
          type: 'string'
      allowEmptyValue: false
    fundraisingIds:
      name: 'ids'
      in: 'query'
      required: true
      description: 'A list of FactSet Permanent Entity Identifiers (FactSet IDs) for **Private Equity and Venture Capital Funds**. These IDs are in the format ''XXXXXX-E'' and are the primary input for most fund-related endpoints. These IDs can be retrieved from the /universe endpoint'
      schema:
        type: 'array'
        minItems: 1
        maxItems: 50
        example:
          - '0LC436-E'
        items:
          type: 'string'
      allowEmptyValue: false
    factsetGpEntityIds:
      name: 'ids'
      in: 'query'
      required: true
      description: 'A list of FactSet Permanent Entity Identifiers (FactSet IDs) for **General Partner (GP) firms**. These IDs are used to identify the management companies of the funds.'
      schema:
        type: 'array'
        minItems: 1
        maxItems: 50
        example:
          - '000BKX-E'
          - '000KCYH-E'
        items:
          type: 'string'
    transactionIds:
      name: 'ids'
      in: 'query'
      required: true
      description: 'A list of unique FactSet-generated identifiers for **Private Equity or Venture Capital transactions**. These IDs link to a single investment event, distinct from the main deal ID.'
      schema:
        type: 'array'
        minItems: 1
        maxItems: 50
        example:
          - 1000001
          - 1000002
        items:
          type: 'integer'
    dealIds:
      name: 'ids'
      in: 'query'
      required: true
      description: 'A list of unique FactSet-generated identifiers (Deal IDs) assigned to a **Merger & Acquisition (M&A) or Venture Capital (VC) deal**. This ID represents the main event being tracked.'
      schema:
        type: 'array'
        minItems: 1
        maxItems: 50
        example:
          - 23682
        items:
          type: 'integer'
    asOfDate:
      name: 'asOfDate'
      in: 'query'
      required: false
      schema:
        type: 'string'
        format: 'date'
      description: "The as-of date for the AUM data in **YYYY-MM-DD** format. Returns the AUM value as of the specified date.\n\nNote: \n- If omitted: The response will return the latest available AUM data.\n- Future dates (T+1) are not accepted in this endpoint.\n"
      example: '2023-08-27'
    name:
      name: 'name'
      description: "The proper name of a Private Equity/Venture Capital firm, Fund, or Portfolio Company to be matched against the FactSet entity universe.<br/>  <p>***max length** =  200 per request*</p>\n"
      in: 'query'
      schema:
        type: 'string'
        minLength: 1
        maxLength: 200
      required: true
      example: 'Alto Pharmacy'
    country:
      name: 'country'
      description: 'The two-character ISO2 country code corresponding to the entity''s primary location. Providing this code helps to narrow the entity match candidates, significantly improving the accuracy of the matching algorithm. For a list of ISO2 Country codes, visit [OA 8754](https://my.apps.factset.com/oa/pages/8754).'
      in: 'query'
      schema:
        type: 'string'
        maxLength: 2
        minLength: 2
      example: 'US'
    entityType:
      name: 'entityType'
      description: "Three-character FactSet entity type code used to filter candidates in order to determine the final match result.\n  |Entity Type Code|Entity Type Description|Entity Type Code|Entity Type Description|\n  |---|---|---|---|\n  |PVT|Private Company|SUB|Subsidiary|\n  |HOL|Holding Company|JVT|Joint Venture|\n  |NPO|Non-Profit Organization|\n  \n  |Entity Type Code|Entity Type Description|Entity Type Code|Entity Type Description|\n  |---|---|---|---|\n  |FAF|\tFamily of Funds (Venture Capital/Private Equity)|PVF|Private Equity Fund / Alternative Investment|\n  |VEN|Venture Capital Fund|"
      in: 'query'
      schema:
        type: 'array'
        items:
          type: 'string'
          maxLength: 3
          minLength: 3
          example: 'PVT'
  responses:
    '400':
      description: 'Bad Request. This can occur for several reasons. Please review the "message" for more details.'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            Bad Request - Date Format:
              $ref: '#/components/examples/badRequestDateFormat'
            Bad Request - Missing Required Parameter:
              $ref: '#/components/examples/badRequestRequiredParameter'
            Bad Request - Malformed JSON:
              $ref: '#/components/examples/badRequestMalformedJSON'
            Bad Request - Read Timeout:
              $ref: '#/components/examples/badRequestReadTimeout'
    '401':
      description: 'Unauthenticated USERNAME-SERIAL. Ensure you are logged in and have successfully generated an API KEY for the IP range you are connecting from. For more help, select the **Report Issue** in the top right corner of this Developer Portal specification card and choose Connectivity 401 or 403 Responses.'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            Bad Request - Date Format:
              $ref: '#/components/examples/unauthenticated'
    '403':
      description: 'The USERNAME-SERIAL attempted to request the endpoint is not authorized to access. The request was legal, but the server is refusing to respond. Please reach out to FactSet Account Team for assistance with authorization.'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            Bad Request - forbidden:
              $ref: '#/components/examples/forbidden'
    '415':
      description: 'Unsupported Media Type. This error may be returned when the caller sends a resource in a format that is not accepted by the server. This can be fixed by ensuring that the Content-Type header is set to the correct value. In this instance, "application/json" would be the appropriate value.'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
