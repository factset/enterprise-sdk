          example: 'Validation Error'
    EntityMatchesResponse:
      title: 'Entity Matches Response'
      description: 'The response object containing the results of the Entity Match request, which includes candidate entities and the final match decision.'
      type: 'object'
      properties:
        data:
          description: 'Candidate list of `Entity Match` objects.'
          type: 'array'
          items:
            $ref: '#/components/schemas/EntityMatch'
    EntityMatch:
      title: 'Entity Match'
      description: "An individual object representing a potential or actual match for a submitted entity name, providing the FactSet ID and related descriptive attributes.\n"
      type: 'object'
      properties:
        entityId:
          description: "The definitive **FactSet Permanent Entity Identifier** (FactSet ID) of the entity matched, typically in the format 'XXXXXX-E'. This is the key identifier used for subsequent data retrieval endpoints in the API. For more detail, visit [FactSet Permanent Security Identifier](https://oa.apps.factset.com/cms/oaAttachment/64c3213a-f415-4c27-a336-92c73a72deed/24881)\n"
          type: 'string'
          example: '0H3R4Y-E'
          nullable: true
        entityName:
          description: 'The full, standardized legal name corresponding to the matched entity as recorded in the FactSet database.'
          type: 'string'
          example: 'Alto Pharmacy LLC'
          nullable: true
        countryCode:
          description: 'The two-character ISO 3166-1 alpha-2 country code corresponding to the primary country of the matched entity.'
          type: 'string'
          example: 'US'
          nullable: true
        entityTypeCode:
          description: 'Code representing the entity type of the matched entity. See the related request parameter for a table of all Codes and their respective descriptions.'
          type: 'string'
          example: 'PVT'
          nullable: true
        matchFlag:
          description: 'A boolean flag indicating whether the `entityId` is a FactSet match based on the input name and country. When `true`, the FactSet `entityId` was confidently matched to the input name and country. When `false`, the FactSet `entityId` could not be confidently matched to the input name and country.'
