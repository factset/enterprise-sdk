openapi: 3.0.0
info:
  title: FactSet RBICS
  version: 1.4.0
  description: >
    FactSet Revere Business Industry Classification System (RBICS) is a
    comprehensive structured taxonomy to classify companies by what they
    primarily do. It delivers a granular view for investors by classifying
    companies using a bottom-up approach according to the products and services
    they provide. By combining this approach with a top-level grouping based on
    companies' behavior similarities and stock co-movement, FactSet RBICS
    delivers unprecedented precision for 1,400+ sector groups.


    RBICS Focus is a six level classification which highlights the companys main
    business. It is based on the company business line/s that stand for majority
    of a the revenue that the company generates. Updated monthly. For more
    details, visit [Online Assistant Page
    #20710](https://oa.apps.factset.com/pages/20710).<p><b>Rate limit is set to
    10 requests per second</b>.</p>
  contact:
    name: FactSet Research Systems
    email: api@factset.com
    url: https://developer.factset.com/contact
  license:
    name: Apache License, Version 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
externalDocs:
  description: API Documentation
  url: https://developer.factset.com/api-catalog/factset-rbics-api
security:
  - FactSetApiKey: []
  - FactSetOAuth2: []
tags:
  - name: Entity
    description: >-
      Retrieve RBICS classifications for companies. Includes either the primary
      'Focus' classification or a comprehensive revenue breakdown across all
      relevant RBICS industries.
  - name: Industry
    description: >-
      Screen for companies based on their RBICS classification. Includes
      endpoints to find companies with a specific 'Focus' or to find all
      companies with revenue exposure to an industry.
  - name: Structure
    description: >-
      Fetches the full RBICS Taxonomy Structure, including industry IDs, names,
      and historical changes.
  - name: TradeNames
    description: Fetches a company's associated tradeNames and product lines.
paths:
  /factset-rbics/v1/entity-focus:
    get:
      summary: Get RBICS classification for the Focus industry
      description: >
        Gets RBICS classifications for the Focus industry for a short list of
        companies. Full history is included if _date_ parameter is not
        specified.

          RBICS Focus offers a single-sector mapping of about 48,000 of the most liquid and publicly-traded companies based on their primary lines of business; it uses revenues as the key factor in determining a company’s primary line of business, by mapping a company to the lowest-level sector from which it derives 50% or more of its revenues.

          The RBICS Extended Universe – Industry Group is not currently supported through the RBICS API.
      tags:
        - Entity
      operationId: getRbicsEntityFocus
      parameters:
        - $ref: '#/components/parameters/ids'
        - $ref: '#/components/parameters/date'
        - $ref: '#/components/parameters/levels'
        - $ref: '#/components/parameters/includeNames'
      responses:
        '200':
          description: Successful Response producing an array of Entity Focus Objects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityFocusResponse'
              examples:
                RBICS Classifications for Single Id with Names:
                  $ref: '#/components/examples/rbicsAllLevels'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '415':
          $ref: '#/components/responses/415'
        '500':
          $ref: '#/components/responses/500'
    post:
      summary: Get RBICS classification for the Focus industry
      description: >
        Gets RBICS classifications for the Focus industry for a long list of
        companies. Full history is included if _date_ parameter is not
        specified.

          RBICS Focus offers a single-sector mapping of about 48,000 of the most liquid and publicly-traded companies based on their primary lines of business; it uses revenues as the key factor in determining a company’s primary line of business, by mapping a company to the lowest-level sector from which it derives 50% or more of its revenues.

          The RBICS Extended Universe – Industry Group is not currently supported through the RBICS API.
      tags:
        - Entity
      operationId: getRbicsEntityFocusForList
      requestBody:
        required: true
        description: Request Body to request a list of RBICS Entity Focus objects.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntityFocusRequest'
            examples:
              rbicsEntityFocusRequest:
                $ref: '#/components/examples/rbicsEntityFocusRequest'
      responses:
        '200':
          description: Successful Response producing an array of Entity Focus Objects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityFocusResponse'
              examples:
                RBICS Classifications for Single Id with Names:
                  $ref: '#/components/examples/rbicsAllLevels'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '415':
          $ref: '#/components/responses/415'
        '500':
          $ref: '#/components/responses/500'
  /factset-rbics/v1/entity/revenue:
    get:
      tags:
        - Entity
      summary: Get a company's revenue breakdown by RBICS classification.
      operationId: getRbicsEntityRevenue
      description: >
        Access a comprehensive, hierarchical breakdown of a company's revenue
        according to each RBICS industry classification. This endpoint aligns a
        company's reported business segment revenues with the complete,
        multi-level RBICS taxonomy, offering the percentage of total revenue
        attributed to each industry.


        For Mutual Funds and ETFs we only have data from L1-L4 and requires
        additional access to get this data. Note that, the response time can
        exceed 20+ seconds when querying for more than one year of data.  As
        such we do not recommend requesting for more than 1 ID at a time for
        history.
         
        Use the `level` parameter to control the depth of the returned taxonomy,
        from Economy (L1) down to Sub-Industry (L6).
      parameters:
        - $ref: '#/components/parameters/ids'
        - $ref: '#/components/parameters/startDate'
        - $ref: '#/components/parameters/endDate'
        - $ref: '#/components/parameters/level'
      responses:
        '200':
          description: >-
            Successful response returning a company's revenue breakdown by RBICS
            classification.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityResponse'
              examples:
                Entity revenue response:
                  $ref: '#/components/examples/EntitiesResponse'
        '400':
          $ref: '#/components/responses/400Response'
        '401':
          $ref: '#/components/responses/401Response'
        '403':
          $ref: '#/components/responses/403Response'
        '415':
          $ref: '#/components/responses/415Response'
        '500':
          $ref: '#/components/responses/500Response'
    post:
      tags:
        - Entity
      summary: Get a company's revenue breakdown by RBICS classification.
      operationId: getRbicsEntityRevenueForList
      description: >
        Access a comprehensive, hierarchical breakdown of a company's revenue
        according to each RBICS industry classification. This endpoint aligns a
        company's reported business segment revenues with the complete,
        multi-level RBICS taxonomy, offering the percentage of total revenue
        attributed to each industry.


        For Mutual Funds and ETFs we only have data from L1-L4 and requires
        additional access to get this data. Note that, the response time can
        exceed 20+ seconds when querying for more than one year of data.  As
        such we do not recommend requesting for more than 1 ID at a time for
        history.


        Use the `level` parameter to control the depth of the returned taxonomy,
        from Economy (L1) down to Sub-Industry (L6). Use the POST method for
        large lists of identifiers.
      requestBody:
        required: true
        description: Request Body to request a list of Entity Revenue objects.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntityRequest'
            examples:
              Entity Revenue Request:
                $ref: '#/components/examples/rbicsEntityRequest'
      responses:
        '200':
          description: >-
            Successful response returning a company's revenue breakdown by RBICS
            classification.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityResponse'
              examples:
                Entity revenue response:
                  $ref: '#/components/examples/EntitiesResponse'
        '400':
          $ref: '#/components/responses/400Response'
        '401':
          $ref: '#/components/responses/401Response'
        '403':
          $ref: '#/components/responses/403Response'
        '415':
          $ref: '#/components/responses/415Response'
        '500':
          $ref: '#/components/responses/500Response'
  /factset-rbics/v1/industry/focus:
    get:
      tags:
        - Industry
      summary: Get the list of companies with a specific RBICS Focus classification.
      operationId: getRbicsIndustryFocus
      description: >
        Identify all companies whose primary business falls within a specific
        RBICS industry. This endpoint screens your universe based on the RBICS
        Focus classification.

         A company's Focus is the lowest-level (Level 6) RBICS sub-industry from which it derives 50% or more of its annual revenue.

         Provide a list of one or more RBICS IDs (up to Level 6) to retrieve the list of companies whose primary business line falls within those sectors. A complete list of valid RBICS IDs can be retrieved using the `/structure` endpoints. Use the `startDate` and `endDate` parameters to screen for companies that held this classification during a specific historical period.
      parameters:
        - $ref: '#/components/parameters/rbicsIndustryIds'
        - $ref: '#/components/parameters/startDate'
        - $ref: '#/components/parameters/endDate'
      responses:
        '200':
          description: >-
            Successful response returning a list of companies with a specific
            RBICS Focus classification.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IndustryFocusResponse'
              examples:
                Industry Focus response:
                  $ref: '#/components/examples/IndustriesFocusResponse'
        '400':
          $ref: '#/components/responses/400Response'
        '401':
          $ref: '#/components/responses/401Response'
        '403':
          $ref: '#/components/responses/403Response'
        '415':
          $ref: '#/components/responses/415Response'
        '500':
          $ref: '#/components/responses/500Response'
    post:
      tags:
        - Industry
      summary: Get the list of companies with a specific Industry Focus classification.
      operationId: getRbicsIndustryFocusForList
      description: >
        Identify all companies whose primary business falls within a specific
        RBICS industry. This endpoint screens your universe based on the RBICS
        Focus classification.


        A company's Focus is the lowest-level (Level 6) RBICS sub-industry from
        which it derives 50% or more of its annual revenue.


        Provide a list of one or more RBICS IDs (up to Level 6) to retrieve the
        list of companies whose primary business line falls within those
        sectors. Use the `startDate` and `endDate` parameters to screen for
        companies that held this classification during a specific historical
        period.
      requestBody:
        required: true
        description: Request Body to request a list of Industry Focus objects.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IndustryRequest'
            examples:
              Industry Focus Request:
                $ref: '#/components/examples/rbicsIndustryFocusRequest'
      responses:
        '200':
          description: >-
            Successful response returning a list of companies with a specific
            RBICS Focus classification.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IndustryFocusResponse'
              examples:
                Industry Focus response:
                  $ref: '#/components/examples/IndustriesFocusResponse'
        '400':
          $ref: '#/components/responses/400Response'
        '401':
          $ref: '#/components/responses/401Response'
        '403':
          $ref: '#/components/responses/403Response'
        '415':
          $ref: '#/components/responses/415Response'
        '500':
          $ref: '#/components/responses/500Response'
  /factset-rbics/v1/industry/revenue:
    get:
      tags:
        - Industry
      summary: >-
        Get companies and their revenue exposure to a specific RBICS L6
        Sub-Industry.
      operationId: getRbicsIndustryRevenue
      description: >
        Screen for companies with revenue exposure to a specific RBICS Level 6
        Sub-Industry. This endpoint identifies all companies that derive revenue
        from a specified sub-industry and returns the percentage of their total
        revenue attributable to that industry.

        This is a powerful tool for understanding the competitive landscape and
        supply chains at a granular level, beyond a company's primary
        classification.

        **Note:** The `rbicsIds` parameter for this endpoint must be a valid
        Level 6 Sub-Industry ID. Use the `startDate` and `endDate` parameters to
        control the time period for the underlying revenue reports.
      parameters:
        - $ref: '#/components/parameters/rbicsL6Ids'
        - $ref: '#/components/parameters/startDate'
        - $ref: '#/components/parameters/endDate'
      responses:
        '200':
          description: >-
            Successful response returning a list of companies and their revenue
            exposure to the requested RBICS Level 6 Sub-Industry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IndustryRevenueResponse'
              examples:
                Industry revenue response:
                  $ref: '#/components/examples/IndustriesRevenueResponse'
        '400':
          $ref: '#/components/responses/400Response'
        '401':
          $ref: '#/components/responses/401Response'
        '403':
          $ref: '#/components/responses/403Response'
        '415':
          $ref: '#/components/responses/415Response'
        '500':
          $ref: '#/components/responses/500Response'
    post:
      tags:
        - Industry
      summary: >-
        Get companies and their revenue exposure to a specific RBICS L6
        Sub-Industry.
      operationId: getRbicsIndustryRevenueForList
      description: >
        Screen for companies with revenue exposure to a specific RBICS Level 6
        Sub-Industry. This endpoint identifies all companies that derive revenue
        from a specified sub-industry and returns the percentage of their total
        revenue attributable to that industry.

        This is a powerful tool for understanding the competitive landscape and
        supply chains at a granular level, beyond a company's primary
        classification.

        **Note:** The `rbicsIds` parameter for this endpoint must be a valid
        Level 6 Sub-Industry ID. Use the `startDate` and `endDate` parameters to
        control the time period for the underlying revenue reports. Use the POST
        method for large lists of `rbicsIds`.
      requestBody:
        required: true
        description: >-
          Request Body to screen for companies with revenue exposure to a
          specific RBICS L6 Sub-Industry.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IndustryRevenueRequest'
            examples:
              Industry Revenue Request:
                $ref: '#/components/examples/rbicsIndustryRevenueRequest'
      responses:
        '200':
          description: >-
            Successful response returning a list of companies and their revenue
            exposure to the requested RBICS Level 6 Sub-Industry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IndustryRevenueResponse'
              examples:
                Industry revenue response:
                  $ref: '#/components/examples/IndustriesRevenueResponse'
        '400':
          $ref: '#/components/responses/400Response'
        '401':
          $ref: '#/components/responses/401Response'
        '403':
          $ref: '#/components/responses/403Response'
        '415':
          $ref: '#/components/responses/415Response'
        '500':
          $ref: '#/components/responses/500Response'
  /factset-rbics/v1/structure:
    get:
      summary: Get the full RBICS Taxonomy Structure Ids, Names, and effective periods.
      description: >
        Understand the full RBICS Taxonomy Structure through time to help
        organize your analysis or facilitate the use of RBICS in application
        development.


        Designed to overcome disparate and non-standardized company disclosures,
        the RBICS taxonomy is a normalized global industry classification
        consisting of a fourteen-by-six matrix. There are twelve economies with
        two specialty sectors, each with six incremental detailed layers,
        resulting in over 1,600 sector groups.


        The top-levels' market-defined approach groups companies based on their
        behavioral similarities and stock price co-movement, while the patented
        product-based approach used in the lower levels enables the necessary
        precision to capture the specialty sectors of global markets.
      tags:
        - Structure
      operationId: getRbicsStructure
      parameters:
        - $ref: '#/components/parameters/rbicsIds'
        - $ref: '#/components/parameters/levelStructure'
        - $ref: '#/components/parameters/includeNames'
        - $ref: '#/components/parameters/date'
      responses:
        '200':
          description: Successful Response producing an array of Entity Focus Objects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructureResponse'
              examples:
                RBICS Classifications for Single Level with Names:
                  $ref: '#/components/examples/rbicsStructureLevel'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '415':
          $ref: '#/components/responses/415'
        '500':
          $ref: '#/components/responses/500'
    post:
      summary: Get the full RBICS Taxonomy Structure Ids, Names, and effective periods.
      description: >
        Get the full RBICS Taxonomy Structure Ids, Names, and effective periods.
        POST method is optimal for requesting large lists of `rbicsIds`.
      tags:
        - Structure
      operationId: getRbicsStructureForList
      requestBody:
        required: true
        description: Request Body to request a list of RBICS Structure objects.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StructureRequest'
            examples:
              Structure Request:
                $ref: '#/components/examples/rbicsStructureRequest'
      responses:
        '200':
          description: Successful Response producing an array of RBICS Structure Objects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructureResponse'
              examples:
                RBICS Classifications for Single Level with Names:
                  $ref: '#/components/examples/rbicsStructureLevel'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '415':
          $ref: '#/components/responses/415'
        '500':
          $ref: '#/components/responses/500'
  /factset-rbics/v1/trade-names:
    post:
      summary: Get a company's associated tradeNames and product lines.
      description: >
        RBICS with TradeNames maps over 260,000 products, services and brands
        (a.k.a. TradeNames) to the granular sectors of the FactSet Revere
        Business Industry Classification System taxonomy, resulting in a
        multi-sector participation map for each company. 


        Whereas RBICS with Revenue offers quantified multi-sector exposure based
        on a company’s segment disclosures, RBICS with TradeNames provides a
        comprehensive view of sector participation at the product level.
      tags:
        - TradeNames
      operationId: getTradeNamesForList
      requestBody:
        required: true
        description: Request Body to request a list of tradeName objects.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TradeNamesRequest'
            examples:
              Structure Request:
                $ref: '#/components/examples/rbicsTradeNameRequest'
      responses:
        '200':
          description: Successful Response producing an array of RBICS Tradename Objects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradeNamesResponse'
              examples:
                RBICS TradeNames:
                  $ref: '#/components/examples/rbicsTradeNames'
                RBICS TradeNames multiple L6:
                  $ref: '#/components/examples/rbicsTradeNamesMultiple'
        '400':
          $ref: '#/components/responses/400Response'
        '401':
          $ref: '#/components/responses/401Response'
        '403':
          $ref: '#/components/responses/403Response'
        '415':
          $ref: '#/components/responses/415Response'
        '500':
          $ref: '#/components/responses/500Response'
servers:
  - url: https://api.factset.com/content
components:
  securitySchemes:
    FactSetOAuth2:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://auth.factset.com/as/token.oauth2
          scopes: {}
    FactSetApiKey:
      type: http
      scheme: basic
  parameters:
    ids:
      name: ids
      description: >
        List of Company identifiers. Accepted identifiers include
        Ticker-Exchange, Ticker-Regions, CUSIPs, ISINs, SEDOLs, or FactSet
        Permanent Ids, such as -R, -L, or -E.<p>**ids limit = 2500 per
        request**</p> 
          Make note, GET Method URL request lines are also limited to a total length of 8192 bytes (8KB). In cases where the service allows for thousands of ids, which may lead to exceeding this request line limit of 8KB, its advised for any requests with large request lines to be requested through the respective "POST" method.</p>
      in: query
      required: true
      schema:
        type: array
        items:
          type: string
          example: IBM-US
        minItems: 1
        maxItems: 2500
      explode: false
      example:
        - AAPL-US
        - 0FPWZZ-E
        - TSLA-US
    rbicsIds:
      name: rbicsIds
      description: >
        RBICS Taxonomy Id Filter. Use to lookup the structure details for the Id
        requested, or to screen for companies by industry.
      in: query
      required: false
      schema:
        type: array
        items:
          type: string
          minLength: 2
          maxLength: 12
        maxItems: 2500
      explode: false
      example:
        - '101010000000'
        - '55'
    rbicsIndustryIds:
      name: rbicsIds
      in: query
      description: >
        A list of RBICS industry classification identifiers. These are used to
        filter the results to specific industries. IDs can range from Level 1
        (Economy) to Level 6 (Sub-Industry). A complete list of valid RBICS IDs
        can be retrieved using the `/structure` endpoints.
      required: true
      schema:
        type: array
        items:
          type: string
          minLength: 2
          maxLength: 12
        maxItems: 2500
      explode: false
      example:
        - '101010000000'
        - '55'
    rbicsL6Ids:
      name: rbicsIds
      in: query
      description: >
        List of RBICS Level 6 Sub-Industry IDs to screen for companies by
        revenue exposure. **Note:** Only Level 6 IDs are supported for this
        endpoint. A complete list of valid Level 6 IDs can be retrieved using
        the `/structure` endpoints.
      required: true
      schema:
        type: array
        items:
          type: string
          minLength: 12
          maxLength: 12
        maxItems: 2500
      explode: false
      example:
        - '551515453010'
    startDate:
      name: startDate
      in: query
      description: >
        Specifies the start date for the requested date range, formatted as
        **YYYY-MM-DD**. The data returned will be reflective of the
        classifications or revenue data as of this date and forward. The
        `startDate` must be equal to or before the `endDate`. Future dates (T+1)
        are not accepted in this endpoint.


        Note: 

        - If omitted while `endDate` is specified: Data will be fetched from the
        earliest available record up to the specified end date.

        - If both `startDate` and `endDate` are omitted: The response will
        return the latest available data.
      required: false
      schema:
        type: string
        format: date
      example: '2021-08-27'
    endDate:
      name: endDate
      in: query
      description: >
        Specifies the end date for the requested date range, formatted as
        **YYYY-MM-DD**. The data returned will be reflective of the
        classifications or revenue data as of this date and earlier. The
        `endDate` must be equal to or after the `startDate`. Future dates (T+1)
        are not accepted in this endpoint.


        Note:

        - If omitted (with `startDate` specified): Data will be returned from
        the specified start date up to the most recent available date.

        - If both `startDate` and `endDate` are omitted: The response will
        return the latest available data.
      required: false
      schema:
        type: string
        format: date
      example: '2022-08-27'
    date:
      name: date
      description: >-
        Effective date for data expressed in YYYY-MM-DD format. If no date is
        requested, the default behavior is to return the full history for the
        requested entity.
      in: query
      example: '2017-07-24'
      schema:
        type: string
    levels:
      name: levels
      description: >-
        List of RBICS industry levels to include in the response. **By default
        if left blank, all levels are returned.**
      in: query
      explode: false
      schema:
        type: array
        items:
          type: integer
          minimum: 1
          maximum: 6
        maxItems: 6
        uniqueItems: true
      example:
        - 1
        - 3
        - 6
    includeNames:
      name: includeNames
      in: query
      description: >-
        Option to include or exclude industry Names and the L6 Description. true
        = Include Names; false = Exclude Names.
      schema:
        type: boolean
        default: true
    level:
      name: level
      in: query
      description: >
        Specifies the deepest level of the RBICS taxonomy to be included in the
        revenue breakdown. The response will include all levels from 1 up to the
        specified level. For example, a value of '3' will return revenue
        percentages for Economy (L1), Sector (L2), and Sub-Sector (L3). The
        default behavior is to return all 6 levels.
          |Level|Description|Number of Groups|
          |---|---|---|
          |1|Economy|14|
          |2|Sector|37|
          |3|Sub-Sector|109|
          |4|Industry Group|366|
          |5|Industry|901|
          |6|Sub-Industry|1629|
      schema:
        type: integer
        minimum: 1
        maximum: 6
      example: 6
    levelStructure:
      name: level
      description: >
        RBICS industry levels to include in the response. All levels from 1-N
        will be returned. For example, '3' returns all levels 1,2 and 3. To
        request all levels, request level=6. Level 1 is returned by default.
          |Level|Description|Number of Groups|
          |---|---|---|
          |1|Economy|14|
          |2|Sector|37|
          |3|Sub-Sector|109|
          |4|Industry Group|366|
          |5|Industry|901|
          |6|Sub-Industry|1629|
      in: query
      explode: false
      schema:
        type: integer
        minimum: 1
        maximum: 6
      example: 1
  schemas:
    ErrorObjectResponse:
      type: object
      nullable: true
      description: error
      properties:
        code:
          description: status
          type: string
          example: GenericError
        title:
          description: The plain text error message
          type: string
          example: Validation Error
        detail:
          description: Error details explanation
          type: string
          example: Validation Error
    EntityFocusRequest:
      title: Entity Focus Request
      description: Entity Focus Request Body
      type: object
      properties:
        ids:
          $ref: '#/components/schemas/Ids'
        date:
          $ref: '#/components/schemas/EffectiveDate'
        levels:
          $ref: '#/components/schemas/Levels'
        includeNames:
          $ref: '#/components/schemas/IncludeNames'
    EntityFocusResponse:
      title: Entity Focus Response
      type: object
      description: Entity Focus Response
      properties:
        data:
          description: Array of Entity Focus Objects
          type: array
          items:
            $ref: '#/components/schemas/EntityFocus'
    EntityFocus:
      title: Entity Focus
      type: object
      properties:
        requestId:
          description: Company identifier used in request.
          type: string
          example: AAPL
        fsymId:
          description: FactSet Company identifier being classified.
          type: string
          example: 000C7F-E
          nullable: true
        firstDate:
          description: First date of the classification.
          type: string
          format: date-time
          example: '2008-08-26T00:00:00.000Z'
          nullable: true
        lastDate:
          description: Date when the classification became no longer valid.
          type: string
          format: date-time
          example: '2016-09-07T14:00:00.000Z'
          nullable: true
      additionalProperties: true
      required:
        - requestId
        - fsymId
        - firstDate
        - lastDate
    TradeNamesRequest:
      title: tradeNames Request
      description: TradeNames Request Body
      type: object
      properties:
        data:
          $ref: '#/components/schemas/TradeNamesRequestBody'
      required:
        - data
    TradeNamesRequestBody:
      title: tradeNames Request
      description: TradeNames Request Body
      type: object
      properties:
        ids:
          $ref: '#/components/schemas/TradeNamesIds'
        asOfDate:
          $ref: '#/components/schemas/AsOfDate'
      required:
        - ids
    TradeNamesResponse:
      title: TradeNames Response
      type: object
      description: TradeNames Response
      properties:
        data:
          description: Array of Tradename Objects
          type: array
          items:
            $ref: '#/components/schemas/TradeName'
    TradeName:
      title: TradeNames
      type: object
      properties:
        asOfDate:
          type: string
          format: date
          description: Date of the tradeName data snapshot (YYYY-MM-DD)
          nullable: true
          example: '2024-12-31'
        factsetEntityId:
          type: string
          description: FactSet Entity Identifier
          nullable: true
          example: 000C7F-E
        requestId:
          type: string
          description: Original identifier from request (ticker, CUSIP, entity ID, etc.)
          example: AAPL-US
          nullable: true
        tradeNames:
          type: array
          description: List of tradeNames for the entity on this date
          nullable: true
          items:
            $ref: '#/components/schemas/TradeNames'
        error:
          $ref: '#/components/schemas/ErrorObjectResponse'
      additionalProperties: true
    TradeNames:
      type: object
      nullable: true
      required:
        - tradeId
        - productId
        - productName
        - shortProductName
      properties:
        tradeId:
          type: string
          description: Unique identifier for the product participation mapping
          nullable: true
          example: '100000191'
        productId:
          type: integer
          format: int64
          description: Unique identifier for the product
          nullable: true
          example: 99996362
        productName:
          type: string
          description: >
            Full name of the product/tradeName/brand. An asterisk (*) suffix
            indicates 

            an in-licensing agreement.
          nullable: true
          example: iPhone
        shortProductName:
          type: string
          description: Shortened product name with extraneous company metadata removed
          nullable: true
          example: iPhone
        l6Id:
          type: number
          description: >-
            Unique identifier for the RBICS Level 6 sector to which the product
            is assigned
          nullable: true
          example: 501515151520
        l6Name:
          description: The descriptive name for the Level 6 sector classification
          type: string
          example: Smart Phone Manufacturing
          nullable: true
        startDate:
          type: string
          format: date
          description: Date the record was first published
          nullable: true
          example: '2021-12-31'
        endDate:
          type: string
          format: date
          description: >-
            Date the record was terminated. The end date may sometimes be null,
            indicating that the tradeName is currently active.
          nullable: true
          example: '2024-12-31'
    StructureRequest:
      title: Structure Request
      description: Structure Request Body
      type: object
      properties:
        rbicsIds:
          $ref: '#/components/schemas/RbicsIds'
        level:
          $ref: '#/components/schemas/LevelStructure'
        includeNames:
          $ref: '#/components/schemas/IncludeNames'
        date:
          $ref: '#/components/schemas/EffectiveDate'
    StructureResponse:
      title: Structure Response
      type: object
      description: Structure Response Array
      properties:
        data:
          description: Array of Structure Objects
          type: array
          items:
            $ref: '#/components/schemas/Structure'
    Structure:
      title: Structure
      type: object
      properties:
        rbicsId:
          description: RBICS Code for the classification.
          type: string
          example: '101010101010'
          nullable: true
        firstDate:
          description: First date of the classification.
          type: string
          format: date-time
          example: '1945-01-01T00:00:00.000Z'
          nullable: true
        lastDate:
          description: >-
            Date when the classification became no longer valid. If `null`, the
            classification is still valid.
          type: string
          format: date-time
          example: null
          nullable: true
      additionalProperties: true
    Ids:
      title: ids
      description: >
        Security or Entity identifiers. FactSet Identifiers, tickers, CUSIP and
        SEDOL are accepted input. Max Ids of 2500.
      type: array
      items:
        type: string
      minItems: 1
      maxItems: 2500
      example:
        - FDS-US
        - 0FPWZZ-E
        - TSLA-US
    TradeNamesIds:
      title: ids
      description: >
        Security or Entity identifiers. FactSet Identifiers, tickers, CUSIP and
        SEDOL are accepted input. Max Ids of 500.
      type: array
      items:
        type: string
      minItems: 1
      maxItems: 500
      example:
        - FDS-US
        - 0FPWZZ-E
        - TSLA-US
    RbicsIds:
      title: ids
      description: >
        RBICS Taxonomy Id Filter. Use to lookup the structure details for the Id
        requested.
      type: array
      maxItems: 2500
      example:
        - '101010000000'
        - '55'
      items:
        type: string
        maxLength: 12
        minLength: 2
    RbicsIndustryIds:
      title: rbicsIds
      description: >-
        A list of RBICS industry classification identifiers. These are used to
        filter the results to specific industries. IDs can range from Level 1
        (Economy) to Level 6 (Sub-Industry). A complete list of valid RBICS IDs
        can be retrieved using the `/structure` endpoints.
      type: array
      maxItems: 2500
      items:
        type: string
        maxLength: 12
        minLength: 2
      example:
        - '101010000000'
        - '55'
    RbicsL6Ids:
      title: rbicsL6Ids
      description: >-
        RBICS Level 6 Sub-Industry ID Filter. **Note**: Only Level 6 IDs are
        supported for this endpoint. A complete list of valid Level 6 IDs can be
        retrieved using the `/structure` endpoints.
      type: array
      maxItems: 2500
      items:
        type: string
        maxLength: 12
        minLength: 12
      example:
        - '551515453010'
    StartDate:
      title: startDate
      type: string
      format: date
      description: >-
        Specifies the start date for the requested date range, formatted as
        **YYYY-MM-DD**. The data returned will be reflective of the
        classifications or revenue data as of this date and forward. The
        `startDate` must be equal to or before the `endDate`. Future dates (T+1)
        are not accepted in this endpoint. <br> Note: <br> - If omitted while
        `endDate` is specified: Data will be fetched from the earliest available
        record up to the specified end date. <br> - If both `startDate` and
        `endDate` are omitted: The response will return the latest available
        data.
      example: '2021-08-27'
    EndDate:
      title: endDate
      type: string
      format: date
      description: >-
        Specifies the end date for the requested date range, formatted as
        **YYYY-MM-DD**. The data returned will be reflective of the
        classifications or revenue data as of this date and earlier. The
        `endDate` must be equal to or after the `startDate`. Future dates (T+1)
        are not accepted in this endpoint. <br> Note: <br> - If omitted (with
        `startDate` specified): Data will be returned from the specified start
        date up to the most recent available date. <br> - If both `startDate`
        and `endDate` are omitted: The response will return the latest available
        data.
      example: '2021-08-27'
    Level:
      title: level
      description: >-
        Specifies the deepest level of the RBICS taxonomy to be included in the
        revenue breakdown. The response will include all levels from 1 up to the
        specified level. For example, a value of '3' will return revenue
        percentages for Economy (L1), Sector (L2), and Sub-Sector (L3). The
        default behavior is to return all 6 levels.
      type: integer
      minimum: 1
      maximum: 6
      example: 6
    EffectiveDate:
      type: string
      format: date
      description: >
        Effective date for data expressed in YYYY-MM-DD format. If no date is
        requested, the default behavior is to return the full history for the
        requested entity.
      example: '2020-09-30'
    AsOfDate:
      type: string
      format: date
      description: >
        Effective date for data expressed in YYYY-MM-DD format. This means the
        as of date will be in between the start and end date returned. Note that
        it's possible the end date returned can be null, meaning the tradeName
        is still active. If no date is requested, the default behavior is to
        return the latest active data.
      example: '2020-09-30'
    Levels:
      type: array
      minItems: 0
      maxItems: 6
      uniqueItems: true
      items:
        type: integer
        minimum: 1
        maximum: 6
      description: >
        List of RBICS industry levels to include in the response. **By default
        if left blank, all levels are returned.**
      example:
        - 1
        - 3
        - 6
    LevelStructure:
      type: integer
      minimum: 1
      maximum: 6
      description: >
        RBICS industry levels to include in the response. All levels from 1-N
        will be returned. For example, '3' returns all levels 1,2 and 3. To
        request all levels, request level=6. Level 1 is returned by default.
          |Level|Description|Number of Groups|
          |---|---|---|
          |1|Economy|14|
          |2|Sector|37|
          |3|Sub-Sector|109|
          |4|Industry Group|366|
          |5|Industry|901|
          |6|Sub-Industry|1629|
      example: 3
    IncludeNames:
      type: boolean
      description: >
        Option to include or exclude industry Names and the L6 Description. True
        = Include Names; False = Exclude Names.
      example: true
      default: true
    IndustryRequest:
      title: Industry Request
      description: Industry Request Body
      type: object
      properties:
        rbicsIds:
          $ref: '#/components/schemas/RbicsIndustryIds'
        startDate:
          $ref: '#/components/schemas/StartDate'
        endDate:
          $ref: '#/components/schemas/EndDate'
      required:
        - rbicsIds
    IndustryRevenueRequest:
      title: Industry Revenue Request
      description: Industry Revenue Request Body
      type: object
      properties:
        rbicsIds:
          $ref: '#/components/schemas/RbicsL6Ids'
        startDate:
          $ref: '#/components/schemas/StartDate'
        endDate:
          $ref: '#/components/schemas/EndDate'
      required:
        - rbicsIds
    IndustryFocusResponse:
      type: object
      title: Industry Focus Response
      properties:
        data:
          description: Array of Industry Objects
          type: array
          items:
            $ref: '#/components/schemas/Industries'
    Industries:
      title: Industry Object
      type: object
      properties:
        fsymId:
          description: >-
            FactSet Permanent Entity Identifier. Six alpha-numeric characters,
            excluding vowels, with an -E suffix (XXXXXX-E).
          type: string
          example: 000KYG-E
          nullable: true
        requestId:
          description: >-
            The RBICS industry classification identifier submitted in the
            request.
          type: string
          example: '20'
        companyName:
          description: >-
            The official legal name of the company. This provides a
            human-readable identifier for the entity.
          type: string
          example: Arcimoto, Inc.
          nullable: true
        date:
          description: >-
            The specific date on which the company held the specified RBICS
            Focus classification.
          type: string
          format: date
          example: '2021-08-27'
          nullable: true
        ticker:
          description: The primary stock ticker symbol of the company.
          type: string
          example: FUV-US
        l1Id:
          description: The RBICS ID for the Level 1 (Economy) classification.
          type: number
          example: 20
          nullable: true
        l1Name:
          description: The descriptive name for the Level 1 (Economy) classification.
          type: string
          example: Consumer Cyclicals
          nullable: true
        l2Id:
          description: The RBICS ID for the Level 2 (Sector) classification.
          type: number
          example: 2020
          nullable: true
        l2Name:
          description: The descriptive name for the Level 2 (Sector) classification.
          type: string
          example: Consumer Vehicles and Parts
          nullable: true
        l3Id:
          description: The RBICS ID for the Level 3 (Sub-Sector) classification.
          type: number
          example: 202010
          nullable: true
        l3Name:
          description: The descriptive name for the Level 3 (Sub-Sector) classification.
          type: string
          example: Consumer Vehicles and Parts
          nullable: true
        l4Id:
          description: The RBICS ID for the Level 4 (Industry Group) classification.
          type: number
          example: 20201015
          nullable: true
        l4Name:
          description: >-
            The descriptive name for the Level 4 (Industry Group)
            classification.
          type: string
          example: Consumer Vehicle Manufacturing
          nullable: true
        l5Id:
          description: The RBICS ID for the Level 5 (Industry) classification.
          type: number
          example: 2020101510
          nullable: true
        l5Name:
          description: The descriptive name for the Level 5 (Industry) classification.
          type: string
          example: Car Manufacturers
          nullable: true
        l6Id:
          description: The RBICS ID for the Level 6 (Sub-Industry) classification.
          type: number
          example: 202010000000
          nullable: true
        l6Name:
          description: The descriptive name for the Level 6 (Sub-Industry) classification.
          type: string
          example: Alternative Energy Car Manufacturers
          nullable: true
        error:
          $ref: '#/components/schemas/ErrorObjectResponse'
    IndustryRevenueResponse:
      type: object
      title: Industry Revenue Response
      properties:
        data:
          description: Array of Industry Revenue Objects
          type: array
          items:
            $ref: '#/components/schemas/IndustriesRevenue'
    IndustriesRevenue:
      title: Industry Revenue Object
      type: object
      properties:
        fsymId:
          description: >-
            FactSet Permanent Entity Identifier. Six alpha-numeric characters,
            excluding vowels, with an -E suffix (XXXXXX-E).
          type: string
          example: 06Y1MJ-E
          nullable: true
        requestId:
          description: The RBICS Level 6 Sub-Industry identifier submitted in the request.
          type: string
          example: '551515453010'
        companyName:
          description: >-
            The official legal name of the company. This provides a
            human-readable identifier for the entity.
          type: string
          example: Alpha Professional Holdings Ltd.
          nullable: true
        asOfDate:
          description: >-
            The date of the company's financial report or filing from which the
            revenue data was sourced.
          type: string
          format: date
          example: '2021-04-15'
          nullable: true
        periodEndDate:
          description: >-
            The end date of the fiscal period (e.g., quarter or year) to which
            the reported revenue corresponds.
          type: string
          format: date
          example: '2020-03-31'
          nullable: true
        totalPercent:
          description: >-
            The percentage of the company's total revenue that is attributable
            to the specified sector, based on the most recent reported data
            within the requested time frame.
          type: number
          example: 79.323329
        l6Id:
          description: >-
            The RBICS ID for the Level 6 (Sub-Industry) classification to which
            the revenue is attributed. This is the most granular level in the
            RBICS hierarchy.
          type: number
          example: 551515000000
          nullable: true
        l6Name:
          description: The descriptive name for the Level 6 (Sub-Industry) classification.
          type: string
          example: Smart Phone Manufacturing
          nullable: true
        error:
          $ref: '#/components/schemas/ErrorObjectResponse'
    EntityRequest:
      title: Entity Revenue Request
      description: Entity Revenue Request Body
      type: object
      properties:
        ids:
          $ref: '#/components/schemas/Ids'
        startDate:
          $ref: '#/components/schemas/StartDate'
        endDate:
          $ref: '#/components/schemas/EndDate'
        level:
          $ref: '#/components/schemas/Level'
      required:
        - ids
    EntityResponse:
      type: object
      title: Entity Revenue Response
      properties:
        data:
          description: Array of Entity Objects
          type: array
          items:
            $ref: '#/components/schemas/Entities'
    Entities:
      title: Entity Object
      type: object
      properties:
        fsymId:
          description: >-
            FactSet Permanent Entity Identifier. Six alpha-numeric characters,
            excluding vowels, with an -E suffix (XXXXXX-E).
          type: string
          example: 000KYG-E
          nullable: true
        requestId:
          description: >-
            The company identifier submitted in the request, which corresponds
            to the returned revenue breakdown.
          type: string
          example: GE-US
        date:
          description: Effective date for data expressed in YYYY-MM-DD format.
          type: string
          format: date
          example: '2025-08-29'
          nullable: true
        l1:
          type: array
          items:
            $ref: '#/components/schemas/Economy'
        error:
          $ref: '#/components/schemas/ErrorObjectResponse'
    RevenuePercent:
      type: number
      description: >-
        Represents the percentage proportion of the company's total revenue that
        is generated from a specific sector or industry.
      example: 75.41
    Economy:
      title: Economy Object
      type: object
      properties:
        l1Name:
          type: string
          description: >-
            The name of the RBICS Level 1 (Economy) classification. This is the
            highest level of the taxonomy.
          example: Technology
        revenuePercent:
          $ref: '#/components/schemas/RevenuePercent'
        l2:
          type: array
          items:
            $ref: '#/components/schemas/Sector'
    Sector:
      title: Sector Object
      type: object
      properties:
        l2Name:
          type: string
          description: The name of the RBICS Level 2 (Sector) classification.
          example: Hardware
        revenuePercent:
          $ref: '#/components/schemas/RevenuePercent'
        l3:
          type: array
          items:
            $ref: '#/components/schemas/SubSector'
    SubSector:
      title: Sub-Sector Object
      type: object
      properties:
        l3Name:
          type: string
          description: The name of the RBICS Level 3 (Sub-Sector) classification.
          example: Communications Equipment
        revenuePercent:
          $ref: '#/components/schemas/RevenuePercent'
        l4:
          type: array
          items:
            $ref: '#/components/schemas/IndustryGroup'
    IndustryGroup:
      title: Industry-Group Object
      type: object
      properties:
        l4Name:
          type: string
          description: The name of the RBICS Level 4 (Industry Group) classification.
          example: Wireless Mobile Equipment
        revenuePercent:
          $ref: '#/components/schemas/RevenuePercent'
        l5:
          type: array
          items:
            $ref: '#/components/schemas/Industry'
    Industry:
      title: Industry Object
      type: object
      properties:
        l5Name:
          type: string
          description: The name of the RBICS Level 5 (Industry) classification.
          example: Smart Phone Manufacturing
        revenuePercent:
          $ref: '#/components/schemas/RevenuePercent'
        l6:
          type: array
          items:
            $ref: '#/components/schemas/SubIndustry'
    SubIndustry:
      type: object
      properties:
        l6Name:
          type: string
          description: >-
            The name of the RBICS Level 6 (Sub-Industry) classification. This is
            the most detailed and granular level in the RBICS taxonomy.
          example: Smart Phone Manufacturing
        revenuePercent:
          $ref: '#/components/schemas/RevenuePercent'
    ErrorResponse:
      type: object
      description: error description
      title: Error Response
      properties:
        status:
          description: status
          type: string
          example: Bad Request
        timestamp:
          description: timestamp in YYYY-MM-DD HH:MM:SS.SSS
          type: string
          example: '2019-11-01T11:09:41.918Z'
          format: date-time
        path:
          description: The Endpoint path {package}/version/{endpoint}
          type: string
          example: /factset-rbics/v1/{end-point}
        message:
          description: The plain text error message
          type: string
          example: Validation Error
        subErrors:
          description: subErrors related to the error message. Null if not applicable.
          type: object
          nullable: true
          properties:
            object:
              description: the operation ID
              type: string
            field:
              description: Parameter Field Name
              type: string
            message:
              description: Error message
              type: string
            rejectedValue:
              description: Rejected Values in an Array
              type: array
              items:
                type: string
    ErrorsResponse:
      type: object
      description: Error Response Object
      properties:
        errors:
          type: array
          description: Errors Array Object
          items:
            $ref: '#/components/schemas/Error'
    Error:
      type: object
      description: Error Example Object
      properties:
        code:
          description: Specifies the error code.
          type: string
        title:
          description: Specifies the error message
          type: string
        id:
          description: Specifies the id.
          type: string
        detail:
          description: Specifies the error message in detail.
          type: string
  responses:
    '400':
      description: >-
        Bad Request. This can occur for several reasons. Please review the
        "message" for more details.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            Bad Request - Date Format:
              $ref: '#/components/examples/badRequestDateFormat'
            Bad Request - Missing Required Parameter:
              $ref: '#/components/examples/badRequestRequiredParameter'
            Bad Request - Invalid Parameter:
              $ref: '#/components/examples/badRequestInvalidParameters'
            Bad Request - Malformed JSON:
              $ref: '#/components/examples/badRequestMalformedJSON'
            Bad Request - Read Timeout:
              $ref: '#/components/examples/badRequestReadTimeout'
    '401':
      description: >-
        Unauthenticated USERNAME-SERIAL. Ensure you are logged in and have
        successfully generated an API KEY for the IP range you are connecting
        from. For more help, select the **Report Issue** in the top right corner
        of this Developer Portal specification card and choose Connectivity 401
        or 403 Responses.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            Bad Request - Date Format:
              $ref: '#/components/examples/unauthenticated'
    '403':
      description: >-
        The USERNAME-SERIAL attempted to request the endpoint is not authorized
        to access. The request was a legal request, but the server is refusing
        to respond. Please reach out to FactSet Account Team for assistance with
        authorization.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            Bad Request - forbidden:
              $ref: '#/components/examples/forbidden'
    '415':
      description: >-
        Unsupported Media Type. This error may be returned when the caller sends
        a resource in a format that is not accepted by the server. This can be
        fixed by ensuring that Content-Type header is set to the correct value.
        In this instance, "application/json" would be the appropriate value.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            Bad Request - Unsupported Media Type:
              $ref: '#/components/examples/unsupportedMediaType'
    '500':
      description: Internal Server Error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            Internal Server Error - Not Writable:
              $ref: '#/components/examples/notWritable'
            Internal Server Error - General Exception:
              $ref: '#/components/examples/generalException'
    400Response:
      description: Bad request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorsResponse'
          examples:
            default400ResponseExample:
              $ref: '#/components/examples/ErrorDetails'
    401Response:
      description: >-
        Unauthenticated USERNAME-SERIAL. Ensure you are logged in and have
        successfully generated an API KEY for the IP range you are connecting
        from. For more help, select the Report Issue in the top right corner of
        this Developer Portal specification card and choose Connectivity 401 or
        403 Responses.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorsResponse'
          examples:
            default401ResponseExample:
              $ref: '#/components/examples/AuthErrorDetails'
    403Response:
      description: >-
