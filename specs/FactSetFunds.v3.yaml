        '415':
          $ref: '#/components/responses/415'
        '422':
          $ref: '#/components/responses/422'
        '500':
          $ref: '#/components/responses/500'
  /aum:
    get:
      tags:
        - Summary, Segments and Stats
      summary: Get Fund AUM for a requested date range and list of IDs
      operationId: getFundsAum
      description: >-
        Get the Fund Level or Share Class Level Assets Under Management (AUM).
        <p>NOTE - AUM can be accessed on a five-day calendar. If a vendor does
        not provide NAV and shares outstanding on a market holiday, the previous
        trading day value is used. If a vendor does provide data on a market
        holiday, that value will be presented, and then fund flows and AUM will
        be calculated. When you are manually calculating actual AUM on a market
        holiday or a rolled date, it will differ from the value shown in the
        FactSet workstation. This is due to the previous day's NAV being used in
        the manual AUM calculation.</p>
      parameters:
        - $ref: '#/components/parameters/ids'
        - $ref: '#/components/parameters/startDate'
        - $ref: '#/components/parameters/endDate'
        - $ref: '#/components/parameters/frequencyAum'
        - $ref: '#/components/parameters/currency'
        - $ref: '#/components/parameters/dataType'
        - $ref: '#/components/parameters/paginationLimit'
        - $ref: '#/components/parameters/paginationOffset'
      responses:
        '200':
          description: The AUM response object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AumResponse'
              examples:
                FundAum:
                  $ref: '#/components/examples/fundAum'
        '400':
          $ref: '#/components/responses/400'
        '401':
