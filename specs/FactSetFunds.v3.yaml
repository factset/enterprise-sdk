          $ref: '#/components/schemas/JoinType'
      required:
        - contentSets
    Meta:
      type: object
      description: >-
        Object defining the sorting and pagination attributes for an endpoint
        request.
      properties:
        sort:
          type: array
          description: Fields to be used for sorting the response.
          items:
            $ref: '#/components/schemas/SortField'
          maxItems: 10
        pagination:
          type: object
          description: Object defining the pagination attributes for an endpoint request.
          properties:
            limit:
              type: integer
              format: int32
              description: The maximum number of records to return. The default is 20.
              example: 100
              minimum: 1
              maximum: 500
              default: 20
            offset:
              type: integer
              format: int32
              description: >-
                The number of records to skip before the first record to return.
                The default is 0.
              example: 0
              default: 0
    DistinctCountMeta:
      type: object
      description: >-
        Object defining the sorting and pagination attributes for an endpoint
