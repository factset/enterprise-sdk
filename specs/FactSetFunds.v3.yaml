    PortfolioStatistics:
      title: Portfolio Statistics Details
      description: >-
        Portfolio statistics including concentration, dividend yield, valuation
        ratios (P/E, P/B, P/S, P/CF), and weighted average market cap
      allOf:
        - $ref: '#/components/schemas/IdentifierResponseFields'
