        week, one month, YTD, and annualized returns
      type: object
      allOf:
        - $ref: '#/components/schemas/IdentifierResponseFields'
        - type: object
          additionalProperties: true
          properties:
            error:
              $ref: '#/components/schemas/FundsErrorObject'
            date:
              description: The date of the return in YYYY-MM-DD format.
              type: string
              format: date
              example: '2025-03-30'
              nullable: true
            oneWeek:
              description: >-
                The one-week return for the requested ID and date. The return
                type is determined by including or excluding dividends through
                the `dividendAdjust` parameter.
              type: number
              format: double
              example: 2.38777459407833
              nullable: true
            oneMonth:
              description: >-
                The one-month return for the requested ID and date. The return
                type is determined by including or excluding dividends through
                the `dividendAdjust` parameter.
              type: number
              format: double
              example: 7.52256770310935
              nullable: true
            threeMonth:
              description: >-
                The three-month return for the requested ID and date. The return
                type is determined by including or excluding dividends through
                the `dividendAdjust` parameter.
              type: number
              format: double
              example: 13.8004246284501
              nullable: true
            yearToDate:
              description: >-
                The year-to-date return for the requested ID and date. The
                return type is determined by including or excluding dividends
                through the `dividendAdjust` parameter.
              type: number
              format: double
              example: 13.1398416886544
              nullable: true
            oneYear:
              description: >-
                The one-year return for the requested ID and date. The return
                type is determined by including or excluding dividends through
                the `dividendAdjust` parameter.
              type: number
              format: double
              example: 40.2223675604972
              nullable: true
            threeYear:
              description: >-
                The three-year return for the requested ID and date. The return
                type is determined by including or excluding dividends through
                the `dividendAdjust` parameter.
              type: number
              format: double
              example: 24.6364116295611
              nullable: true
            threeYearAnnualized:
              description: >-
                The three-year annualized return for the requested ID and date.
                The return type is determined by including or excluding
                dividends through the `dividendAdjust` parameter.
              type: number
              format: double
              example: 7.6171894
              nullable: true
            fiveYear:
              description: >-
                The five-year return for the requested ID and date. The return
                type is determined by including or excluding dividends through
                the `dividendAdjust` parameter.
              type: number
              format: double
              example: 25.2970433246628
              nullable: true
            fiveYearAnnualized:
              description: >-
                The five year annualized return for the requested ID and date.
                The return type is determined by including or excluding
                dividends through the `dividendAdjust` parameter.
              type: number
              format: double
              example: 9.351808
              nullable: true
            tenYear:
              description: >-
                The ten-year return for the requested ID and date. The return
                type is determined by including or excluding dividends through
                the `dividendAdjust` parameter.
              type: number
              format: double
              example: 113.246193627327
              nullable: true
            tenYearAnnualized:
              description: >-
                The ten year annualized return for the requested ID and date.
                The return type is determined by including or excluding
                dividends through the `dividendAdjust` parameter.
              type: number
              format: double
              example: 7.86688289207509
              nullable: true
            sinceInceptionAnnualized:
              description: >-
                The average annual rate of return since the fund's inception
                date, calculated using compounding. This is always a total
                return (dividends are included) and is not affected by the
                `dividendAdjust` parameter.
              type: number
              format: double
              example: 7.86688289207509
              nullable: true
