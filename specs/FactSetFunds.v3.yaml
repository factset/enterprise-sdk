        fieldName:
          type: string
          description: The name of the field.
          example: FF_SALES
        displayName:
          type: string
          description: The display name of the field.
          example: Sales
      required:
        - fieldName
        - displayName
    CreateContentSetResponse:
      title: Create Content Set Response
      description: Create Content Set Response
      type: object
      properties:
        data:
          type: object
          description: The response for the request.
          properties:
            id:
              description: a unique content set name for the query requested
              type: string
              example: contentset
    DistinctCountRequest:
      title: Distinct Count Request
      description: Distinct Count Request
      type: object
      properties:
        data:
          $ref: '#/components/schemas/DistinctCountRequestBody'
