                Percentage of the aggregate that is composed of Mid-cap
                holdings. Mid cap is defined as having a company market value
                greater than 2.7 billion USD but less than 12.9 billion USD.
              type: number
              format: double
              example: 19.35
              nullable: true
            smallCapPercent:
              description: >-
                Percentage of the aggregate that is composed of Small-cap
                holdings. Small cap is defined as having a company market value
                greater than 600 million USD but less than 2.7 billion USD
              type: number
              format: double
              example: 0.01
              nullable: true
            microCapPercent:
              description: >-
                Percentage of the aggregate that is composed of Micro-cap
                holdings. Micro cap is defined as having a company market value
                less than 600 million USD.
              type: number
              format: double
              example: 0.01
              nullable: true
    AssetAllocation:
      title: Asset Allocation
      description: >-
        Portfolio asset allocation showing weight distribution across asset
        types such as equity, bonds, and cash
      type: object
      allOf:
        - $ref: '#/components/schemas/IdentifierResponseFields'
        - $ref: '#/components/schemas/DateResponseField'
        - type: object
          required:
            - analyticsType
          additionalProperties: true
          properties:
            analyticsType:
              $ref: '#/components/schemas/AssetAllocationType'
            error:
              $ref: '#/components/schemas/FundsErrorObject'
            assetAllocationName:
              description: >-
                Returns the asset type in the fund's portfolio. Data is returned
                for both Mutual Funds and ETFs.
              type: string
              example: Equity
              nullable: true
            assetAllocationWeight:
              description: >-
                Returns the asset type's weight in the fund's portfolio. Data is
                returned for both Mutual Funds and ETFs
              type: number
              format: double
              example: 0.26
              nullable: true
    RiskMeasures:
      title: Risk Measures
      description: >-
        Risk measurement indicators including fund vs benchmark comparison, SRI
        PRIIPS, and SRRI UCITS ratings
      type: object
      allOf:
        - $ref: '#/components/schemas/IdentifierResponseFields'
        - $ref: '#/components/schemas/DateResponseField'
        - type: object
          required:
            - taxItemsType
          additionalProperties: true
          properties:
            error:
              $ref: '#/components/schemas/FundsErrorObject'
            taxItemsType:
              $ref: '#/components/schemas/RiskMeasuresType'
            fundVsSegmentBenchmark:
              $ref: '#/components/schemas/FundVsSegmentBenchmark'
            fund:
              $ref: '#/components/schemas/Fund'
            sriPriips:
              description: >-
                The SRI (Summary Risk Indicator) illustrates PRIIPs' risk and
                reward profile by measuring the market and credit risk level.
                Returns 1 for low risk up to 7 for higher risk.
              type: integer
              minimum: 1
              maximum: 7
              example: 3
              nullable: true
            srriUcits:
              description: >-
                Synthetic Risk and Reward Indicator illustrates a UCITS or NURS
                (Non-UCITS Retail Scheme) fund's risk and reward profile by
                measuring the market risk level. Returns 1 for low risk up to 7
                for high risk.
              type: integer
              minimum: 1
              maximum: 7
              example: 5
              nullable: true
    CreditRisk:
      title: Credit Risk
      description: >-
        Credit risk analytics including option-adjusted spread (OAS) and its
        breakdown distribution
      type: object
      allOf:
        - $ref: '#/components/schemas/IdentifierResponseFields'
        - type: object
          required:
            - riskType
          additionalProperties: true
          properties:
            error:
              $ref: '#/components/schemas/FundsErrorObject'
            riskType:
              $ref: '#/components/schemas/CreditRiskType'
            optionAdjustedSpreadBreakdown:
              description: The Option Adjusted Spread Breakdown for the fund.
              type: array
              items:
                $ref: '#/components/schemas/OAS'
    OAS:
      type: object
      description: Option-adjusted spread breakdown showing distribution by OAS range
      properties:
        date:
          type: string
          description: The date in YYYY-MM-DD format.
          format: date
          example: '2025-12-01'
        optionAdjustedSpread:
          description: The Option Adjusted Spread for the fund.
          type: number
          format: double
          example: 26.9150588258592
          nullable: true
        oasBreakdownLabel:
          type: string
          description: OAS Breakdown Label
          example: 0-100
        oasBreakdownPercent:
          type: number
          format: double
          description: OAS Breakdown Percentage
          example: 94.56
    RateRisk:
      title: Rate Risk
      description: >-
        Interest rate risk analytics including effective duration and weighted
        average life (WAL) with breakdown
      type: object
      allOf:
        - $ref: '#/components/schemas/IdentifierResponseFields'
        - type: object
          required:
            - riskType
          additionalProperties: true
          properties:
            error:
              $ref: '#/components/schemas/FundsErrorObject'
            riskType:
              $ref: '#/components/schemas/RateRiskType'
            weightedAverageLifeBreakdown:
              description: The Weighted Average Life(WAL)  Breakdown for the fund.
              type: array
              items:
                $ref: '#/components/schemas/WAL'
    WAL:
      type: object
      description: >-
        Weighted average life breakdown showing distribution by time period
        ranges
