        date:
          type: string
          description: The date in YYYY-MM-DD format.
          format: date
          example: '2025-12-01'
        effectiveDuration:
          description: The effective duration (in years) for the fund.
          type: number
          format: double
          example: 5.78407825634928
          nullable: true
        weightedAverageLife:
          description: The Weighted Average Life (in years) for the fund.
          type: number
          format: double
          example: 28.01722890487987
          nullable: true
        walBreakdownLabel:
          type: string
          description: Weighted Average Life (in years)  Label for the fund
          example: 0-1Year
        walBreakdownPercent:
          type: number
          format: double
          description: Weighted Average Life (in years)  Percentage for the fund
          example: 3.74
    FundVsSegmentBenchmark:
      title: Fund vs Segment Benchmark
      description: >-
        Fund performance metrics relative to its segment benchmark including
        R-squared, alpha, and beta
      type: object
      properties:
        oneYearFundRSquare:
          description: >-
            Returns the fund's rsquare measured against its segment
            benchmark.Uses one year total returns and segment benchmark from the
            start date. This data item is available only with the Analytics
            product package. If the product is not enabled, the field will be
            omitted from the response.
          type: number
          example: 0.9
          nullable: true
        oneYearFundAlpha:
          description: >-
            Returns the fund's alpha measured against its segment benchmark.Uses
            one year total returns and segment benchmark from the start date.
            This data item is available only with the Analytics product package.
            If the product is not enabled, the field will be omitted from the
            response.
          type: number
          example: 0.06
          nullable: true
        oneYearFundBeta:
          description: >-
            Returns the fund's beta measured against its segment benchmark.Uses
            one year total returns and segment benchmark from the start date.
            This data item is available only with the Analytics product package.
            If the product is not enabled, the field will be omitted from the
            response.
          type: number
          example: 0.06
          nullable: true
    Fund:
      title: Fund Risk Measures Object
      description: Fund risk statistics including standard deviation measurements
      type: object
      properties:
        oneYearStdDeviation:
          description: >-
            Returns the fund's standard deviation. Uses one year of total
            returns. This data item is available only with the Analytics product
            package. If the product is not enabled, the field will be omitted
            from the response.
          type: number
          example: 0.17
          nullable: true
    Classifications:
      title: Classifications Object
      description: >-
        Fund classification details including asset class, category, geographic
        and economic focus, and ETF-specific attributes
      type: object
      allOf:
        - $ref: '#/components/schemas/IdentifierResponseFields'
        - type: object
          required:
            - structureType
          additionalProperties: true
          properties:
            error:
              $ref: '#/components/schemas/FundsErrorObject'
            structureType:
              $ref: '#/components/schemas/ClassificationsType'
            assetClass:
              description: >-
                Returns the asset class description from FactSet's fund
                classification system. Asset class designates the fund's
                underlying holding type, e.g. equity, fixed-income, etc. For
                more information, see [FactSet Fund Classification
                System](https://my.apps.factset.com/oa/pages/23362).
              type: string
              example: Equity
              nullable: true
            categoryClass:
              description: >-
                Returns the asset class category description from FactSet's fund
                classification system. The asset class category is the
                first-tier subcategory within the fund's asset class, e.g. size
                & style, sector, precious metals, etc. For more information, see
                [FactSet Fund Classification
                System](https://my.apps.factset.com/oa/pages/23362).
              type: string
              example: Size and Style
              nullable: true
            economicDevelopmentClass:
              description: >-
                Returns the fund's economic development description from
                FactSet's fund classification system. This description refers to
                the development level for the fund's geographic region of focus,
                e.g. developed, emerging, etc. For more information, see
                [FactSet Fund Classification
                System](https://my.apps.factset.com/oa/pages/23362).
              type: string
              example: Developed Markets
              nullable: true
            focusClass:
              description: >-
                Returns the fund's focus description from FactSet's fund
                classification system. The fund's focus is the second-tier
                subcategory within the fund's asset class, e.g. small cap,
                energy, etc. For more information, see [FactSet Fund
                Classification
                System](https://my.apps.factset.com/oa/pages/23362).
              type: string
              example: Total Market
              nullable: true
            geographicClass:
              description: >-
                Returns the fund's specific geography description from FactSet's
                fund classification system. Specific geography refers to the
                fund's particular geographic focus within the region, e.g.
                Chile, BRICs, etc. For more information, see [FactSet Fund
                Classification
                System](https://my.apps.factset.com/oa/pages/23362).
              type: string
              example: U.S.
              nullable: true
            nicheClass:
              description: >-
                Returns the fund's niche description from FactSet's fund
                classification system. The fund's niche is the third-tier
                subcategory with the fund's asset class, e.g. growth, coal, etc.
                For more information, see [FactSet Fund Classification
                System](https://my.apps.factset.com/oa/pages/23362).
              type: string
              example: Value
              nullable: true
            regionClass:
              description: >-
                Returns the fund's region description from FactSet's fund
                classification system. Refers to the broad regional exposure of
                the fund's holdings, e.g. Latin America, Asia-Pacific, etc. For
                more information, see [FactSet Fund Classification
                System](https://my.apps.factset.com/oa/pages/23362).
              type: string
              example: North America
              nullable: true
            selectionCriteria:
              description: >-
                Returns ETF selection criteria. Data available only for ETFs.
                For more information, see [FactSet Fund Classification
                System](https://my.apps.factset.com/oa/pages/23362).
              type: string
              example: Committee
              nullable: true
            weightingScheme:
              description: >-
                Returns weighting scheme data. Data available only for ETFs. For
                more information, see [FactSet Fund Classification
                System](https://my.apps.factset.com/oa/pages/23362).
              type: string
              example: Market Cap
              nullable: true
            strategy:
              description: >-
                Returns ETF Strategy. Data available only for ETFs. For more
                information, see [FactSet Fund Classification
                System](https://my.apps.factset.com/oa/pages/23362).
              type: string
              example: Vanilla
              nullable: true
    BenchmarkDetails:
      title: Benchmark Details Object
      description: >-
        Benchmark and segment information including identifiers, names,
        currencies, and change history
      type: object
      allOf:
        - $ref: '#/components/schemas/IdentifierResponseFields'
        - type: object
          required:
            - structureType
          additionalProperties: true
          properties:
            error:
              $ref: '#/components/schemas/FundsErrorObject'
            structureType:
              $ref: '#/components/schemas/BenchmarkDetailsType'
            benchmarkId:
              description: The Fund's primary Benchmark Identifier.
              type: string
              example: R.1000
              nullable: true
            benchmarkName:
              description: The proper name of the Benchmark Id.
              type: string
              example: Russell 1000 Index
              nullable: true
            isCompositeBenchmark:
              description: >-
                Binary flag to indicate whether the fund has a composite
                benchmark.
              type: boolean
              example: false
              nullable: true
            benchmarkChangeDate:
              description: >-
                The date in which the benchmark changed for the requested fund
                in YYYY-MM-DD. If no benchmark changes occurred, the response
                value will be null.
              type: string
              format: date
              example: '2025-12-03'
              nullable: true
            segment:
              description: The segment of the respective segment benchmark ID.
              type: string
              example: 'Equity: U.S. - Total Market Value'
              nullable: true
            segmentBenchmarkId:
              description: >-
                Segment Benchmark Identifier. Funds in the same segment match on
                all seven levels of FactSet's fund classification system.
              type: string
              example: MS664292
              nullable: true
            segmentBenchmarkName:
              description: >-
                The segment benchmark's name in proper format. Funds in the same
                segment match on all seven levels of FactSet's fund
                classification system.
              type: string
              example: MSCI USA IMI Value Index
              nullable: true
            segmentBenchmarkCurrency:
              description: >-
                The Segment Benchmark's currency in ISO3. Funds in the same
                segment match on all seven levels of FactSet's fund
                classification system.For a list of currency ISO codes, visit
                Online Assistant Page
                [OA1470](https://my.apps.factset.com/oa/pages/1470)'
              type: string
              example: USD
              nullable: true
            segmentBenchmarkReturnType:
              description: >-
                The Segment benchmarks return type. Funds in the same segment
                match on all seven levels of FactSet's fund classification
                system.
              type: string
              example: GROSS_RETURN
              nullable: true
    CostsFeesRequest:
      title: Cost and Fees Request
      description: Cost and Fees Request
      type: object
      properties:
        data:
          description: >-
            Request payload containing fund identifiers and optional date and
            currency parameters for costs and fees data
          type: object
          properties:
            ids:
              $ref: '#/components/schemas/Ids'
            date:
              $ref: '#/components/schemas/DateSchema'
            currency:
              $ref: '#/components/schemas/Currency'
          required:
            - ids
      required:
        - data
    CostsFeesResponse:
      type: object
      title: Cost and Fees Response
      description: Response containing an array of fund costs and fees information
      properties:
        data:
          description: Array of Costs and Fees Objects
          type: array
          items:
            $ref: '#/components/schemas/CostsFees'
    CostsFees:
      title: Costs and Fees Object
      description: >-
        Detailed fund costs and fees including management expenses, entry/exit
        fees, expense ratios, and investment minimums
      allOf:
        - $ref: '#/components/schemas/IdentifierResponseFields'
        - $ref: '#/components/schemas/DateResponseField'
        - $ref: '#/components/schemas/CurrencyResponseField'
        - type: object
          additionalProperties: true
          properties:
            error:
              $ref: '#/components/schemas/FundsErrorObject'
            managementFee:
              description: >-
                The management fee, or maintenance fee, is charged by the fund
                manager. This cost is usually between 0.5% and 2% of assets on
                average and is a periodic fee.
              type: number
              format: double
              example: 0.42
              nullable: true
            entryFee:
              description: >-
                The transaction entry fee or purchase fee collected from
                investors when they join or leave a scheme. The fee is paid to
                the fund
              type: number
              format: double
              example: 3.75
              nullable: true
            exitFee:
              description: >-
                The transaction exit fee is charged to investors when they
                redeem shares from a fund.
              type: number
              format: double
              example: 0.01
              nullable: true
            maxFrontLoadFee:
              description: >-
                The Maximum sales load or initial Sales Fee is a reduction made
                from each investment in the fund, the maximum paid is dependent
                on the size of the purchase, it decreases as the investment
                increases. Often associated with class 'A' shares of a mutual
                fund it is also known as Sales Charge, this is a fee paid when
                shares are purchased. Also known as a "front-end load", this fee
                typically goes to the brokers that sell the fund's shares. 
                (Under the Investment Company Act of 1940 is 9%. The maximum
                sales load under NASD Rules is 81⁄2%)."
              type: number
              format: double
              example: 3.75
              nullable: true
            max12B1Fee:
              description: The Back Expense Maximum
              type: number
              format: double
              example: 0.25
              nullable: true
            backendLoad:
              description: >
                Backend load is one of the fee and expense types reported for
                the specified share class, expressed as a percentage of assets
                under management.
              type: number
              format: double
              example: 0.75
              nullable: true
            expenseRatio:
              description: The Expense Ratio
              type: number
              format: double
              example: 0.53
              nullable: true
            expenseRatioGross:
              description: The Gross Expense Ratio
              type: number
              format: double
              example: 0.53
              nullable: true
            initialInvestmentMinimum:
              description: The Initial Investment Minimum
              type: number
              format: double
              example: 2000000.45
              nullable: true
            initialInvestmentIRA:
              description: The Initial Investment Individual Retirement Accounts
              type: number
              format: double
              example: 1000.01
              nullable: true
            swingPrice:
              description: >-
                Swing Price. Swing pricing occurs when a fund provider adjusts
                the net asset value (NAV) of a fund in order to pass on trading
                costs to purchasing or redeeming shareholders. This
                anti-dilution technique is used to protect long-term
                shareholder's interests.
              type: number
              format: double
              example: 1.399161
              nullable: true
            swingPriceDate:
              description: >-
                Swing Price Date. Swing pricing occurs when a fund provider
                adjusts the net asset value (NAV) of a fund in order to pass on
                trading costs to purchasing or redeeming shareholders. This
                anti-dilution technique is used to protect long-term
                shareholder's interests.
              type: string
              format: date
              example: '2026-03-24'
              nullable: true
            performanceFee:
              description: >-
                Represents fees made to an investment manager as a percentage of
                investment profits for generating positive returns.
              type: number
              format: double
              example: 0.12
              nullable: true
            tradingExpenseRatio:
              description: >-
                Represents the amount of trading commissions incurred to manage
                the portfolio as a percentage of the total assets of the fund.
              type: number
              format: double
              example: 0.28
              nullable: true
            medianTrackingDifferencePercent:
              description: >-
                Returns median tracking difference. Median, upside, and downside
                are calculated by a rolling 12-month difference between NAV and
                index returns. This data item is available only with the
                Analytics product package. If the product is not enabled, the
                field will be omitted from the response.
              type: number
              format: double
              example: -0.12
              nullable: true
            maxUpsideDeviationPercent:
              description: >-
                Returns Maximum Upside Deviation. Median, upside, and downside
                are calculated by a rolling 12-month difference between NAV and
                index returns. This data item is available only with the
                Analytics product package. If the product is not enabled, the
                field will be omitted from the response.
              type: number
              format: double
              example: -0.09
              nullable: true
            maxDownSideDeviationPercent:
              description: >-
                Returns Maximum Down Side Deviation. Median, upside, and
                downside are calculated by a rolling 12-month difference between
                NAV and index returns. This data item is available only with the
                Analytics product package. If the product is not enabled, the
                field will be omitted from the response.
              type: number
              format: double
              example: -0.15
              nullable: true
            fundClosureRisk:
              description: >-
                Returns the fund closure risk. This data item is available only
                with the Analytics product package. If the product is not
                enabled, the field will be omitted from the response.
              type: string
              example: 'No'
              nullable: true
            etnCounterpartyRisk:
              description: >-
                Returns the ETN CounterParty Risk. This data item is available
                only with the Analytics product package. If the product is not
                enabled, the field will be omitted from the response.
              type: string
              example: Low
              nullable: true
    SimilarFunds:
