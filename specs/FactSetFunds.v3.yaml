                Returns a qualitative concentration label for the fund based on
                its R-squared value measured against its segment benchmark. Uses
                one-year total returns and segment benchmark from the start
                date. The label is assigned according to the R-squared value:

                - **Low:** for R-squared < 0.02
                  
                - **'Medium'** for R-squared < 0.04

                - **'High'** for R-squared > 0.04
              type: string
              example: Low
              enum:
                - Low
                - Medium
                - High
              nullable: true
            dividendYield:
              description: >-
                Returns the fund's Dividend Yield provides an aggregate measure
                of dividends paid out relative to share prices.
              type: number
              format: double
              example: 1.59
              nullable: true
            priceToBookRatio:
              description: >-
                Returns the fund's Price to Book Value Ratio provides a measure
                of how cheap or expensive an aggregate is.
              type: number
              format: double
              example: 3.38
              nullable: true
            priceToCashFlowRatio:
