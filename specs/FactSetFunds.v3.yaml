components:
  securitySchemes:
    FactSetOAuth2:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://auth.factset.com/as/token.oauth2
          scopes: {}
    FactSetApiKey:
      type: http
      scheme: basic
  schemas:
    IdentifierResponseFields:
      title: Common Identifier Response Fields
      description: >-
        Reusable component containing standard identifier fields (`fsymId` and
        `requestId`) used in response objects
      type: object
      additionalProperties: true
      properties:
        fsymId:
          description: >-
            FactSet Security Identifier. Six alpha-numeric characters, excluding
            vowels, with a -S suffix (XXXXXX-S), resolved from the `requestId`
            of the Fund requested.
          type: string
          example: FNK7XP-S
          nullable: true
        requestId:
          description: The requested Id sent as input.
          type: string
          example: MABAX
    DateResponseField:
      title: Date Response Field Component
      description: Reusable component for date field in time-series response objects
      type: object
      additionalProperties: true
      properties:
        date:
          description: The date in YYYY-MM-DD format.
          type: string
          format: date
          example: '2025-02-26'
          nullable: true
    CurrencyResponseField:
      title: Currency Response Field Component
      description: Reusable component for currency field in response objects
      type: object
      additionalProperties: true
      properties:
        currency:
          description: >-
            ISO3 Currency. For a list of currency ISO codes, visit Online
            Assistant Page [OA1470](https://my.apps.factset.com/oa/pages/1470)'
          type: string
          example: USD
          nullable: true
    SummariesRequest:
      title: Summaries Request
      description: Summaries Request
      type: object
      properties:
        data:
          description: >-
            Request payload containing the list of fund identifiers and optional
            language parameter
          type: object
          properties:
            ids:
              $ref: '#/components/schemas/Ids'
            lang:
              $ref: '#/components/schemas/Lang'
          required:
            - ids
      required:
        - data
    SummariesResponse:
      type: object
      title: Summaries Response
      description: Response containing an array of fund summary objects
      properties:
        data:
          description: Array of Summaries Objects
          type: array
          items:
            $ref: '#/components/schemas/Summaries'
    Summaries:
      title: Funds Summary Object
      description: >-
        Comprehensive summary information for a fund including identifiers,
        status, names, descriptions, and key attributes
      allOf:
        - $ref: '#/components/schemas/IdentifierResponseFields'
        - type: object
          additionalProperties: true
          properties:
            error:
              $ref: '#/components/schemas/FundsErrorObject'
            fsymEntityId:
              description: >-
                FactSet Entity Identifier. Six alpha-numeric characters,
                excluding vowels, with a -E suffix (XXXXXX-E), resolved from the
                `requestId` of the Fund requested.
              type: string
              example: 04BFG7-E
              nullable: true
            fsymRegionalId:
              description: >-
                FactSet Regional Identifier. Six alpha-numeric characters,
                excluding vowels, with a -R suffix (XXXXXX-R), resolved from
                the`requestId` of the Fund requested.
              type: string
              example: SJY03Z-R
              nullable: true
            fsymTickerRegion:
              description: FactSet Ticker-Region for the requested fund.
              type: string
              example: MABAX-US
              nullable: true
            fsymUltimateParentId:
              description: >-
                The FactSet Ultimate Parent Entity Identifier, with a -E suffix
                (XXXXXX-E).
              type: string
              example: 002HJD-E
              nullable: true
            name:
              description: The Fund security's name in proper format.
              type: string
              example: BlackRock Basic Value Fund Incorporated
              nullable: true
            isin:
              description: >-
                Unique 12-character identifier for the requested fund, as per
                the International Securities Identification Number (ISIN)
                standard.
              type: string
              example: US09251G5071
              nullable: true
            cusip:
              description: >-
                Unique 9-character identifier for the requested fund, as per the
                CUSIP Numbering System.
              type: string
              example: 09251G507
              nullable: true
            sedol:
              description: Sedol Identifier
              type: string
              example: '2580964'
              nullable: true
            wkn:
              description: WKN
              type: string
              example: A1J47F
              nullable: true
            valoren:
              description: Valoren
              type: string
              example: '2730688'
              nullable: true
            issuerId:
              description: The Issuer Identifier.
              type: string
              example: 004B8C-E
              nullable: true
            issuerName:
              description: The Issuer Name in proper format.
              type: string
              example: BlackRock Inc.
              nullable: true
            activeFlag:
              description: >-
                Boolean flag to indicate whether the fund is currently active or
                not.
              type: boolean
              example: true
              nullable: true
            activelyManagedFlag:
              description: Boolean flag of whether the fund is actively managed or not.
              type: boolean
              example: true
              nullable: true
            brand:
              description: The Funds Brand Name in proper format.
              type: string
              example: BlackRock
              nullable: true
            fundDomicile:
              description: >-
                Returns the fund's country of domicile in ISO2 format. Only
                available for Mutual Funds.
              type: string
              example: US
              nullable: true
            currency:
              description: >-
                ISO3 Currency. For a list of currency ISO codes, visit Online
                Assistant Page
                [OA1470](https://my.apps.factset.com/oa/pages/1470)'
              type: string
              example: USD
              nullable: true
            currencyHedged:
              description: Returns selected ETF currency hedge information.
              type: boolean
              example: false
              nullable: true
            shareClass:
              description: The Funds Share class type name in proper format.
              example: Institutional Class
              type: string
              nullable: true
            shareClassName:
              description: The specified share class name for the fund in proper format.
              type: string
              example: BlackRock Basic Value I
              nullable: true
            shareClassActiveFlag:
              description: >-
                Returns a binary indicator of whether the specified share class
                is currently active, where 1 is active and 0 is inactive.
              type: boolean
              example: true
              nullable: true
            shareClassActivelyManagedFlag:
              description: >-
                Returns a binary indicator of whether the specified share class
                is actively managed, where 1 is active and 0 is inactive.
              type: boolean
              example: true
              nullable: true
            shareClassCurrency:
              description: >-
                The currency for the specified share class. ISO3 Currency. For a
                list of currency ISO codes, visit Online Assistant Page
                [OA1470](https://my.apps.factset.com/oa/pages/1470)'
              type: string
              example: USD
              nullable: true
            isOldestShareClass:
              type: boolean
              nullable: true
              example: true
              description: >-
                Returns a flag to indicate whether the specified ID is the
                oldest share class. Data is returned for Mutual Funds only.
            descInfo:
              description: >-
                The Fund's Investment Strategy short description.  For the
                long-form description, see `insight`.
              type: string
              example: >-
                The investment objective of the BlackRock Basic Value Fund, Inc.
                (the Fund) is to seek capital appreciation and, secondarily,
                income by investing in securities, primarily equity securities,
                that management of the Fund believes are undervalued and
                therefore represent basic investment value.
              nullable: true
            priceFirstDate:
              description: >-
                The fund's first available date for prices (NAV) in YYYY-MM-DD
                format. This can be used to fetch the first available price from
                FactSet. *NOTE: This is not the inception date of fund.*
              type: string
              format: date
              example: '2025-04-18'
              nullable: true
            priceRecentDate:
              description: >-
                The fund's most recent available date for prices (NAV) in
                YYYY-MM-DD format.
              type: string
              format: date
              example: '2026-03-26'
            insight:
              description: >-
                The fund's investment strategy long description. Use `descInfo`
                if needing short description.
              type: string
              example: >
                AGG`s all-in cost is low and more predictable than its rivals.
                In a segment where there are a handful of similar funds tracking
                essentially the same underlying index, holding and trading costs
                are the driving factors. AGG delivers its underlying index`s
                returns with precision and consistency. The fund also has a
                history of massive trading volume and tight spreads. AGG tracks
                our segment benchmark, providing excellent exposure to the US
                investment-grade bond market. Note that the fund employs a
                careful optimization strategy, holding just a fraction of the
                names in its index, a near-necessity among bond-market ETFs.
              nullable: true
            legalStructure:
              description: >-
                The legal structure of the fund, e.g. Open-Ended Fund,
                close-ended fund
              type: string
              example: Open-Ended Fund
              nullable: true
            inceptionDate:
              description: The fund's inception date in YYYY-MM-DD format.
              type: string
              format: date
              example: '1977-07-01'
              nullable: true
            shareClassLaunchDate:
              description: >-
                The specified share class's inception date in YYYY-MM-DD format.
                Available only for Mutual Funds
              type: string
              format: date
              example: '1977-07-01'
              nullable: true
            primaryExchange:
              description: >-
                Returns exchange information for the fund.  Exchange Name is
                available for Mutual Funds and ETFs, returns a short-form
                exchange code (e.g., "NYSE"), rather than the full exchange
                name.
              type: string
              example: NYSE
              nullable: true
            webSite:
              description: The URL of the Fund.
              type: string
              example: >-
                https://www.blackrock.com/investing/products/227716/blackrock-basic-value-class-a-fund
              nullable: true
            webSiteShareClass:
              type: string
              description: URL of the share class webpage.
              example: >-
                https://www.blackrock.com/us/individual/products/227716/blackrock-Large%20Cap%20Focus-value-class-a-fund
              nullable: true
            backing:
              description: >-
                Returns selected ETF structure backing information. Data items
                available are ETF type, legal structure, and disclosures.
              type: string
              example: physical
              nullable: true
            syntheticType:
              description: >-
                Returns selected ETF structure information. Data items available
                are ETF type, legal structure, and disclosures.
              type: string
              example: ''
              nullable: true
            underlyingIndex:
              description: >-
                Returns the name of the fund's benchmark. Data is returned for
                both Mutual Funds and ETFs.
              type: string
              example: Russell 1000 Value
              nullable: true
            broadBasedIndex:
              description: >-
                Returns the index that represents the overall market applicable
                to the fund, providing a broad measure of market performance.
                Data is returned for both Mutual Funds and ETFs.
              type: string
              example: Russell 1000 Index - TR
              nullable: true
            narrowBenchmark:
              description: >-
                Returns the fund's narrow benchmark data. Narrow Benchmark
                returns the primary benchmark for an actively managed fund,
                reflecting the specific market in which the fund primarily
                invests. It is a more focused measure compared to a broad-based
                index, offering a closer alignment with the fund’s investment
                strategy
              type: string
              example: Russell 1000 Index - TR
              nullable: true
            additionalNarrowBenchmark:
              description: >
                Returns the fund's additional narrow benchmark data.

                Narrow Benchmark returns the primary benchmark for an actively
                managed fund, reflecting the specific market in which the fund
                primarily invests.

                Additional Narrow Benchmark returns an additional benchmark for
                an actively managed fund that measures performance within a
                specific market segment, providing a more detailed comparison
                than the primary benchmark.

                Data is returned for both Mutual Funds and ETFs.
              type: string
              nullable: true
              example: null
            fundObjective:
              description: >
                Returns the fund's objective long description.

                National language returns French translations for US Mutual
                Funds and US and Canadian ETFs.

                Data is returned for both Mutual Funds and ETFs.
              type: string
              nullable: true
              example: >
                Under normal circumstances, the Fund seeks to invest at least
                80% of its net assets plus the amount of any borrowings for
                investment purposes in large cap equity securities and
                derivatives that have similar economic characteristics to such
                securities. For purposes of the Fund’s 80% policy, large cap
                equity securities are equity securities that at the time of
                purchase have a market capitalization within the range of
                companies included in the Russell 1000® Value Index (the
                “Russell 1000 Value Index”). The Russell 1000 Value Index is a
                capitalization-weighted index from a broad range of industries
                chosen for market size, liquidity and industry group
                representation. Equity securities consist of common stock and
                preferred stock, other financial instruments that are components
                of, or have characteristics similar to, the securities included
                in the Russell 1000 Value Index, and American Depositary
                Receipts (“ADRs”), which are receipts typically issued by an
                American bank or trust company that evidence underlying
                securities issued by a foreign company. The Fund may also
                purchase conver tible securities. The Fund invests primarily in
                equity securities that Fund management believes are undervalued,
                which means that their prices are less than Fund management
                believes they are wor th. Fund management places par ticular
                emphasis on companies with below average price/earnings ratios
                that may pay above average dividends. The Fund invests primarily
                in common stock of U.S. companies, but the Fund may invest up to
                25% of its total assets in the securities of foreign
            dualPriced:
              description: >
                Returns true if the fund is based on "dual pricing". These unit
                trusts have an offer (buying) price and a bid (selling) price.

                In such cases, Net Asset Value (NAV) is substituted with either
                a bid, offer, or mid price, as provided by the fund issuer.

                Data is returned for Mutual Funds only.
              type: boolean
              nullable: true
              example: false
            currencyHedgedFrom:
              description: >
                Returns ETF currency hedge source currency. Part of ETF hedge
                information including: - currency hedged flag - currency hedged
                from - currency hedged into ISO3 Currency. For a list of
                currency ISO codes, visit Online Assistant Page
                [OA1470](https://my.apps.factset.com/oa/pages/1470)'
              type: string
              nullable: true
              example: EUR
            currencyHedgedInto:
              description: >
                Returns ETF currency hedge target currency. Part of ETF hedge
                information including: - currency hedged flag - currency hedged
                from - currency hedged into ISO3 Currency. For a list of
                currency ISO codes, visit Online Assistant Page
                [OA1470](https://my.apps.factset.com/oa/pages/1470)'
              type: string
              nullable: true
              example: USD
            managers:
              description: >-
                Fetch basic Fund manager details, such as Title, Phone, Job Id
                and Name.
              type: array
              nullable: true
              items:
                $ref: '#/components/schemas/Managers'
    Managers:
      title: Managers Object
      description: >-
