    YieldsRequest:
      title: Funds Yields Request
      description: Request for fund yield data including SEC yields and yield to maturity
      type: object
      properties:
        data:
          description: >-
            Request payload containing fund identifiers and optional date range
            parameters for yields data
          type: object
          properties:
            ids:
              $ref: '#/components/schemas/Ids'
            startDate:
              $ref: '#/components/schemas/StartDate'
            endDate:
              $ref: '#/components/schemas/EndDate'
            frequency:
              $ref: '#/components/schemas/Frequency'
          required:
            - ids
        meta:
          $ref: '#/components/schemas/MetaRequest'
      required:
        - data
    YieldsResponse:
      type: object
      title: Yields Response
      description: >-
        Fund yield metrics including 30-day and 7-day SEC yields (net and
        gross), coupon rate, yield to maturity, yield to worst, and real yield
      properties:
        data:
          description: Array of Financial Key Items
          type: array
          items:
            $ref: '#/components/schemas/Yields'
        meta:
          $ref: '#/components/schemas/SearchMeta'
    Yields:
      title: Yields Response
      description: >-
        Fund yield metrics including 30-day and 7-day SEC yields (net and
        gross), coupon rate, yield to maturity, yield to worst, and real yield
      type: object
      allOf:
        - $ref: '#/components/schemas/IdentifierResponseFields'
        - $ref: '#/components/schemas/DateResponseField'
        - type: object
          additionalProperties: true
          properties:
            error:
              $ref: '#/components/schemas/FundsErrorObject'
            sec30DayYieldNet:
              description: >-
                30 Days Net SEC yield is the subsidized or after waivers. The
                Net will be bigger than the Gross if part of the fees are
                waived. If Gross and Net are equal, no fees were waived. SEC
                Yield for Mutual Funds is in percentage form while ETFs will
                depend on the fund. Available for US Funds Only
              type: number
              format: double
              example: 4.15
              nullable: true
            sec30DayYieldGross:
              description: >-
                30 Gross SEC yield is the unsubsidized or before waivers. The
                Net will be bigger than the Gross if part of the fees are
                waived. If Gross and Net are equal, no fees were waived. SEC
                Yield for Mutual Funds is in percentage form while ETFs will
                depend on the fund. Available for US Funds Only
              type: number
              format: double
              example: 1.16
              nullable: true
            sec7DayYieldNet:
              description: >-
                7 Days Net SEC yield is the subsidized or after waivers. The Net
                will be bigger than the Gross if part of the fees are waived. If
                Gross and Net are equal, no fees were waived. SEC Yield for
                Mutual Funds is in percentage form while ETFs will depend on the
                fund. Available for US Funds Only
              type: number
              format: double
              example: 4.15
              nullable: true
            sec7DayYieldGross:
              description: >-
                7 Gross SEC yield is the unsubsidized or before waivers. The Net
                will be bigger than the Gross if part of the fees are waived. If
                Gross and Net are equal, no fees were waived. SEC Yield for
                Mutual Funds is in percentage form while ETFs will depend on the
                fund. Available for US Funds Only.
              type: number
              format: double
              example: 1.16
              nullable: true
            couponRate:
              description: >-
                Coupon Rate for a given fund. This data item is available only
                with the Analytics product package. If the product is not
                enabled, the field will be omitted from the response.
              type: number
              format: double
              example: 3.75
              nullable: true
            yieldToMaturity:
              description: >-
                Yield to Maturity for a given fund. This data item is available
                only with the Analytics product package. If the product is not
                enabled, the field will be omitted from the response.
              type: number
              format: double
              example: 4.32
              nullable: true
            yieldToWorst:
              description: >-
                Yield to Worst for a given fund. This data item is available
                only with the Analytics product package. If the product is not
                enabled, the field will be omitted from the response.
              type: number
              format: double
              example: 4.3
              nullable: true
            realYield:
              description: >-
                Real Yield for a given fund. This data item is available only
                with the Analytics product package. If the product is not
                enabled, the field will be omitted from the response.
              type: number
              format: double
              example: 4.31
              nullable: true
