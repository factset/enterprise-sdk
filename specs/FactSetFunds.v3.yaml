  /returns/range:
    get:
      tags:
        - Prices, Returns, and Distributions
      summary: Get Fund Returns for a user-defined date range
      operationId: getFundsReturnsRange
      description: >-
        Get Fund Returns between a specified `startDate` and `endDate`. The
        service will compute the return between those two periods to retrieve
        the single value and does not create a time-series. Control the return
        type to include or exclude dividends by using the `dividendAdjust`
        parameter.
