        title:
          description: The plain text error message
          type: string
          example: Invalid Parameter
        id:
          type: string
          description: Unique error instance identifier for tracking
        detail:
          description: Error details explanation
          type: string
          example: The parameter 'ids' should be valid and may not be empty.
        source:
          type: object
          description: Reference to error source
          properties:
            parameter:
              type: string
              description: Query parameter that caused the error (e.g., "ids[3]")
            pointer:
              type: string
              description: JSON Pointer to request body field that caused the error
            value:
              type: string
              description: The actual value that caused the error
    MetaRequest:
      type: object
      description: meta definition for pagination
      properties:
        pagination:
          $ref: '#/components/schemas/PaginationRequest'
    PaginationRequest:
      type: object
      description: Object defining the pagination attributes for an endpoint request.
      properties:
        limit:
          type: integer
          format: int32
          description: The maximum number of records to return. The default is 20.
          example: 100
          minimum: 1
          maximum: 500
          default: 20
        offset:
          type: integer
          format: int32
          description: >-
            The number of records to skip before the first record to return. The
            default is 0.
          minimum: 0
          maximum: 2147483147
          example: 0
          default: 0
  parameters:
    ids:
      name: ids
      in: query
      schema:
        type: array
        items:
          type: string
        minItems: 1
        maxItems: 10
      required: true
      explode: false
      description: >-
        The requested fund identifier. FactSet Identifiers, tickers, CUSIP,
        SEDOL, and ISIN are accepted inputs. <p>***IDs limit** =  10 per
        request*</p> *<p>Make note, GET Method URL request lines are also
        limited to a total length of 8192 bytes (8KB). In cases where the
        service allows for thousands of IDs, which may lead to exceeding this
        request line limit of 8KB, its advised for any requests with large
        request lines to be requested through the respective "POST" method.</p>*
      examples:
        oneId:
          summary: One Market Identifier
          value:
            - MABAX-US
        multipleIds:
          summary: Multiple Market Identifiers
          value:
            - MABAX-US
            - SPY-US
    paginationLimit:
      name: _paginationLimit
      in: query
      description: The maximum number of records to return. The default is 20.
      required: false
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 500
        default: 20
        example: 100
    paginationOffset:
      name: _paginationOffset
      in: query
      description: >-
        The number of records to skip before the first record to return. The
        default is 0.
      required: false
      schema:
        type: integer
        format: int32
        minimum: 0
        maximum: 2147483147
        default: 0
        example: 0
    lang:
      name: lang
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/Lang'
      description: >-
        Language to be returned for Description, Insight (Overview), and
        Objective attributes, where available. Currently French will be returned
        for U.S. funds when "FR" is passed.
      example: EN
    startDate:
      name: startDate
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/StartDate'
      description: >-
        The start date requested for a given date range in YYYY-MM-DD format. If
        left blank, the API will default to previous close.Future dates (T+1)
        are not accepted in this endpoint.
      example: '2025-01-01'
    endDate:
      name: endDate
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/EndDate'
      description: >-
        The end date requested for a given date range in YYYY-MM-DD format. If
        left blank, the API will default to previous close.Future dates (T+1)
        are not accepted in this endpoint
      example: '2025-12-31'
    frequency:
      name: frequency
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/Frequency'
      description: >
        Controls the display frequency of the data returned. The supported
        frequencies are:
          
        - **D**: Daily

        - **W**: Weekly, based on the last day of the week of the start date.

        - **M**: Monthly, based on the last trading day of the month.

        - **AM**: Monthly, based on the start date (e.g., if the start date is
        June 16, data is displayed for June 16, May 16, April 16, etc.).

        - **CQ**: Quarterly, based on the last trading day of the calendar
        quarter (March, June, September, or December).

        - **FQ**: Fiscal Quarter of the company.

        - **AY**: Actual Annual, based on the start date.

        - **CY**: Calendar Annual, based on the last trading day of the calendar
        year.

        - **FY**: Fiscal Annual, based on the last trading day of the company's
        fiscal year.
      example: M
    currency:
      name: currency
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/Currency'
      description: >-
        The ISO3 currency control for the requested fund. For a list of currency
        ISO codes, visit Online Assistant Page
        [OA1470](https://my.apps.factset.com/oa/pages/1470)
      example: USD
    dataType:
      name: dataType
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/NavDataType'
      description: The Data Type of the NAV expressed as Raw or Rolled values.
      example: ROLL
    splitAdjust:
      name: splitAdjust
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/SplitAdjust'
      description: |
        Controls the split adjustment of the Fund's NAV - 
          * **SPLIT** = Split ONLY Adjusted. This is used by default.
          * **UNSPLIT** = No Adjustments, Controls the split and dividend adjustments for the prices.
      example: SPLIT
    dividendAdjust:
      name: dividendAdjust
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/DividendAdjust'
      description: |
        Controls the dividend inclusion for the NAV returns calculations -
          * **DIV** = Include Dividends, Total Return
          * **NO_DIV** = Exclude Dividends, Simple Return
      example: DIV
    date:
      name: date
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/DateSchema'
      description: >-
        The date for costs and fees in YYYY-MM-DD format. Future dates (T+1) are
        not accepted in this endpoint.
      example: '2025-01-01'
    frequencyAum:
      name: frequency
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/FrequencyAum'
      description: >-
        Controls the display frequency of the data returned. Supported values
        are:

        - **MTD**: Month-To-Date

        - **M**: Monthly, based on the last trading day of the month

        - **CQTD**: Calendar Quarter-to-Date

        - **CQ**: Calendar Quarterly

        - **CYTD**: Calendar Year-to-Date

        - **CY**: Calendar Yearly
      example: M
    dateSnapshot:
      name: date
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/DateSnapshot'
      description: The date for snapshot data in YYYY-MM-DD format.
      example: '2025-01-01'
    keyItemsType:
      name: keyItemsType
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/KeyItemsType'
      description: The Key Items type report.
    contentSets:
      name: contentSets
      in: query
      required: true
      schema:
        type: array
        items:
          type: string
        minItems: 1
        maxItems: 10
      description: The content sets from which the fields are requested.
    structureType:
      name: structureType
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/StructureType'
      description: >
        Returns the type of data items requested, such as classification
        details, similar funds, segment (benchmark) details,

        or structure information (funds structure and advisor details).


        * **CLASSIFICATION**: Categorizes funds using a rules-based system that
        is derived from seven core classifications. This system evaluates the
        asset class, economic development level, and geographical region as
        described in each fund's prospectus and marketing materials. Fund
        exposure details are presented on successively granular levels-
        category, then focus, and then niche


        * **SIMILAR_FUNDS**: Returns the similar fund share classes

        * **SEGMENTS**: Returns the Fund's Benchmark and Segment Benchmark
        information.

        * **FUND_STRUCTURE**: Returns fund structure and advisor information
    taxItemsType:
      name: taxItemsType
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/TaxItemsType'
      description: Returns type of tax and risk information.
    riskType:
      name: riskType
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/RiskType'
      description: Type of risk analytics to return.
    analyticsType:
      name: analyticsType
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/AnalyticsType'
      description: >
        Type of portfolio analytics data items to be returned.


        * **ASSETALLOCATION**: Returns the asset types weights in the fund's
        portfolio.

        * **SECTOR_WEIGHTAGE**: Returns the weighted average percent of revenue
        derived from multiple industries for a universe of companies. Data is
        available for L1(Economy) level of the RBICS Classification. For more
        details, visit [Online Assistant Page
          #20710](https://oa.apps.factset.com/pages/20710)
        * **GEOGRAPHIC_REVENUE**: Returns an aggregated percent of revenue
        derived based on super region for a universe of companies. For more
        details, visit [Online Assistant Page
          #17555](https://oa.apps.factset.com/pages/17555)
        * **MARKET_CAPITALIZATION**: Returns the percentage of the aggregate
        that is composed of large-cap, mid-cap, small-cap and micro-cap holdings
    distributionType:
      name: distributionType
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/DistributionType'
      description: Selects whether to return current or historical distributions.
  responses:
    '400':
      description: >-
        Bad Request. This can occur for several reasons. Please review the
        "message" for more details.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            Bad Request - Date Format:
              $ref: '#/components/examples/badRequestDateFormat'
            Bad Request - Missing Required Parameter:
              $ref: '#/components/examples/badRequestRequiredParameter'
            Bad Request - Future Date:
              $ref: '#/components/examples/badRequestFutureDate'
            Bad Request - Invalid Parameter:
              $ref: '#/components/examples/badRequestInvalidParameters'
            Bad Request - Malformed JSON:
              $ref: '#/components/examples/badRequestMalformedJSON'
            Bad Request - Read Timeout:
              $ref: '#/components/examples/badRequestReadTimeout'
    '401':
      description: >-
        Unauthenticated USERNAME-SERIAL. Ensure you are logged in and have
        successfully generated an API KEY for the IP range you are connecting
        from. For more help, select the **Report Issue** in the top right corner
        of this Developer Portal specification card and choose Connectivity 401
        or 403 Responses.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            User Authentication - Failed:
              $ref: '#/components/examples/unauthenticated'
    '403':
      description: >-
        The USERNAME-SERIAL attempted to request the endpoint is not authorized
        to access. The request was a legal request, but the server is refusing
        to respond. Please reach out to FactSet Account Team for assistance with
        authorization.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            Forbidden:
              $ref: '#/components/examples/forbidden'
    '404':
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            Bad Request - Endpoint Not Found:
              $ref: '#/components/examples/notFound'
            Bad Request - Data Not Found:
              $ref: '#/components/examples/dataNotFound'
    '415':
      description: >-
        Unsupported Media Type. This error may be returned when the caller sends
        a resource in a format that is not accepted by the server. This can be
        fixed by ensuring that Content-Type header is set to the correct value.
        In this instance, "application/json" would be the appropriate value.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            Unsupported Media Type:
              $ref: '#/components/examples/unsupportedMediaType'
    '422':
      description: >
        Unprocessable Entity. Your request data was syntactically correct but
        semantically invalid.

        Check the required parameters and their value constraints.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            Validation Error:
              $ref: '#/components/examples/unprocessableEntity'
    '500':
      description: Internal Server Error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            Internal Server Error - Not Writable:
              $ref: '#/components/examples/notWritable'
            Internal Server Error - General Exception:
              $ref: '#/components/examples/generalException'
