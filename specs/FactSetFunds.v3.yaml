openapi: 3.0.0
info:
  version: 3.0.0
  title: FactSet Funds and ETF API
  contact:
    name: FactSet Research Systems
    email: api@factset.com
    url: https://developer.factset.com/contact
  description: >
    FactSet Mutual Funds and ETFs Reference provides fund-specific reference
    information as well as FactSet's proprietary classification system. It
    includes but is not limited to the following coverage 
      * Fund descriptions 
      * A seven-tier classification system
      * Leverage information
      * Fees and expenses 
      * Portfolio managers 
      
      FactSet Mutual Funds Time Series provides quantitative data items on a historical basis. It includes but is not limited to the following coverage 
      * Net asset value
      * Fund flows 
      * Assets under management
      * Total return 
      
     In addition to core reference and time series data, the API enables broader fund analytics and workflows, including: 
     * Fund summary and classification insights such as domicile, structure, segments, and similar funds  
     * Performance analytics including historical returns, snapshot returns across time horizons, and yield data 
     * Cost, fee, and risk metrics including expense ratios, regulatory/tax exposure, and risk measures 
     * Portfolio exposure and analytics including asset allocation, sector weightage, geographic exposure, and top holdings  
     * Trading and liquidity characteristics for evaluating tradability  
     * ETF-specific scoring and ratings to assess efficiency, tradability, and fit relative to benchmarks  
     * Distribution and income data for understanding payouts and investor returns 
     <p>This API is rate-limited to 10 requests per second and 10 concurrent requests per user.
  license:
    name: Apache License, Version 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
externalDocs:
  description: API Documentation
  url: https://developer.factset.com/api-catalog/factset-funds-api
servers:
  - url: https://api.factset.com/content/factset-funds/v3
    description: Production
security:
  - FactSetApiKey: []
  - FactSetOAuth2: []
tags:
  - name: Summary, Segments and Stats
    description: >-
      Fund summary information, classification, similar funds, segments, asset
      under management, and flows.
  - name: Prices, Returns, and Distributions
    description: Fund pricing, returns, distributions, and income data.
  - name: Taxes, Fees and Risks
    description: Fund costs, fees, tax exposure, regulatory compliance, and risk measures.
  - name: Portfolio Exposure and Analysis
    description: Fund portfolio composition, sector breakdown, risk analytics, holdings.
  - name: Scoring
    description: Get scoring details for ETF
  - name: Trading
    description: Trading-related characteristics for funds and ETFs
  - name: Screener Operations
    description: Screener-specific endpoints for managing and querying content sets.
paths:
  /summary:
    get:
      tags:
        - Summary, Segments and Stats
      summary: Get basic reference summary data for a Fund.
      operationId: getFundsSummary
      description: >
        Fetch basic reference data for the requested fund(s), including
        `fundDomicile`, `shareClass`, `shareClassLaunchDate`, etc. 
      parameters:
        - $ref: '#/components/parameters/ids'
        - $ref: '#/components/parameters/lang'
      responses:
        '200':
          description: The Fund Summaries response object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SummariesResponse'
              examples:
                Fund Summary details for MABAX-US:
                  $ref: '#/components/examples/summariesResponseExample'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '415':
          $ref: '#/components/responses/415'
        '422':
          $ref: '#/components/responses/422'
        '500':
          $ref: '#/components/responses/500'
    post:
      tags:
        - Summary, Segments and Stats
      summary: Get basic reference data for a large list of Fund IDs.
      description: >
        Fetch basic reference data for the requested fund(s), including
        `fundDomicile`, `shareClass`, `shareClassLaunchDate`, etc. 
      operationId: getFundsSummaryForList
      requestBody:
        required: true
        description: >-
          The Funds Summary request body, allowing the user to specify a list of
          IDs.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SummariesRequest'
            examples:
              Request for Fund Summary for MABAX and SPY:
                $ref: '#/components/examples/postSummary'
      responses:
        '200':
          description: The Funds Summary response object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SummariesResponse'
              examples:
                Fund Summary details for MABAX-US:
                  $ref: '#/components/examples/summariesResponseExample'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '415':
          $ref: '#/components/responses/415'
        '422':
          $ref: '#/components/responses/422'
        '500':
          $ref: '#/components/responses/500'
