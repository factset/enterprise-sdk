                determined by FactSet Market Aggregate Geographic Revenue
                (GeoRev) methodology. The revenue percentages are estimated
                using normalized company disclosures and FactSet’s proprietary
                algorithm, providing consistent, comparable country and
                region-level exposures for the fund or index.
              type: number
              format: double
              example: 72.09
              nullable: true
    MarketCapitalization:
