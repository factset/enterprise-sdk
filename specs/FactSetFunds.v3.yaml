              type: number
              format: double
              example: 14.61
              nullable: true
            priceToEarningsRatio:
              description: >-
                Returns the fund's Price to Earnings Ratio provides a measure of
                how cheap or expensive an aggregate is.
              type: number
              format: double
              example: 22.84
              nullable: true
            priceToSalesRatio:
              description: >-
                Returns the fund's Price to Sales Ratio provides a measure of
                how cheap or expensive an aggregate is.
              type: number
              format: double
              example: 22.84
              nullable: true
            weightedAverageMarketCap:
              description: Returns the weighted average company market value.
              type: number
              format: double
              example: 1419413.20301478
              nullable: true
