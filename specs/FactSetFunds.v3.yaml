              example: '2025-12-09'
              nullable: true
    RegulationsTaxDetails:
      title: Regulation Tax Detail
      description: >-
        Regulatory compliance details including UCITS, SFDR classification, UK
        SDR, tax reporting status, and availability by country
      type: object
      allOf:
        - $ref: '#/components/schemas/IdentifierResponseFields'
        - type: object
          required:
            - taxItemsType
          additionalProperties: true
          properties:
            error:
              $ref: '#/components/schemas/FundsErrorObject'
            taxItemsType:
              $ref: '#/components/schemas/RegulationsTaxDetailsType'
            regulatoryAuthority:
              description: >
                The regulatory authority supervising the fund or umbrella. Data
                is returned for Mutual Funds only.

                Possible values include—  
                  SEC, CONSOB, FCMC, CSSF, MFSA, AFM, NFSA, ASF, CNMV, FINMA, FCA, FRC, JFSC, FI (SE),
                  FIN-FSA, GFSC, FMA (LI), NBS, FME, MNB, CMB, FMA (AT), FMA (AU), SFSA, HANFA, EFSA,
                  ATVP, CNB, CMB, CMVM, KNF, CIMA, CCAF, FSMA, COVIP, IOMFSA, FI (EE), DFSA, AMF,
                  BaFin, HCMC, CBI
              type: string
              example: FCA
              nullable: true
            ucitsScheme:
              description: >-
                Determines whether the fund is regulated under the UCITS IV
                (Directive 2009/65/EC) or UCITS V (Directive 2014/91/EU). Data
                is returned for Mutual Funds only.
              type: string
              example: UCITS IV
              nullable: true
            ucitsCompliance:
              description: >-
                Determines whether the fund is regulated under the UCITS IV
                (Directive 2009/65/EC) or UCITS V (Directive 2014/91/EU). Data
                is returned for Mutual Funds only.
              type: boolean
              example: true
              nullable: true
            priipsEligible:
              description: >-
                Indicates if the fund has a published Key Information Document
                (KID) in the fund website. Data is returned for Mutual Funds
                only.
              type: boolean
              example: false
              nullable: true
            taxReportingStatusUK:
              description: >-
                UK Tax Reporting indicates if a fund has UK fund tax status
                which enables approved shares to provide favorable tax rates on
                any gain upon disposal of investor's investments. Data is
                returned for both Mutual Funds and ETFs.
              type: boolean
              example: true
              nullable: true
            srdComplianceFR:
              description: >-
                Returns 'True' if the fund is eligible for Deferred Settlement
                Service or Service à Réglement Différé (SRD) in France. Data is
                returned for Mutual Funds only.
              type: boolean
              example: true
              nullable: true
            isaUKCompliant:
              description: >-
                UK ISA Compliance indicates whether the fund is included in the
                UK ISA (Individual Savings Account) in-house tax free saving
                scheme. Data is returned for both Mutual Funds and ETFs
              type: boolean
              example: true
              nullable: true
            peaEligibleFr:
              description: >-
                Returns 'True' if the fund is eligible for the Plan d'Epargne en
                Action (PEA) or “shared savings plan” in France.It is a
                regulated savings product that allows the purchase of European
                equities or funds without capitalization constraints.Data is
                returned for Mutual Funds only.
              type: boolean
              example: true
              nullable: true
            navFrequency:
              description: >-
                Returns frequency at which the NAV is calculated. Data is
                returned for Mutual Funds only.
              type: string
              enum:
                - Daily
                - Bi-Monthly
                - Semi-Monthly
                - Bi-Weekly
                - Tri-Annually
                - Weekly
                - Semi-Weekly
                - Monthly
                - Quarterly
                - Semi-annual
                - Annually
                - Erratic
                - None
              example: Daily
              nullable: true
            transactionCutOffTime:
              description: >
                Returns the cut off time for transactions.

                The value is provided as a time string in the format "HH:mm z", 

                where HH:mm is the hour and minute, and z is the timezone
                abbreviation (e.g., "12:00 GMT").
              type: string
              example: 12:00 GMT
              nullable: true
            esgObjective:
              description: >-
                Determine if the fund is ESG compliant or not and returns the
                fund's ESG classification.
              type: boolean
              example: true
              nullable: true
            sfdrClassification:
              description: >
                Determines if the fund is ESG compliant and returns the fund's
                ESG classification according to the Sustainable Finance
                Disclosure Regulation (SFDR).

                Possible values:
                  - Article 8: Preferences for products having ESG Characteristics.
                  - Article 9: Preferences for products having Sustainable Objectives.
                  - Article 6: Fund is not ESG but makes disclosures on the integration of sustainable risks.
                  - Article 0: The type or structure of the fund is out of ESG requirements.
                  - NA:- No information available.
                Data is returned for both Mutual Funds and ETFs.
              type: string
              example: Article 9
              nullable: true
            ukSDR:
              description: >-
                Returns the fund's UK SDR. Data is returned for both Mutual
                Funds and ETFs
              type: string
              example: Sustainability Impact
              nullable: true
            availableForSaleIn:
              description: >-
                Returns where the fund is available for sale. Data is returned
                for both Mutual Funds and ETFs. Each entry is an ISO 3166-1
                alpha-2 country code.
              type: array
              items:
                type: string
              example:
                - AT
                - BE
                - US
              nullable: true
