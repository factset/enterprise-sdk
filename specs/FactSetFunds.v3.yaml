            descInfo: >
              The investment objective of the BlackRock Basic Value Fund, Inc.
              (the Fund) is to seek capital appreciation and, secondarily,
              income by investing in securities primarily equity securities that
              management believes are undervalued.
            fundObjective: >
              Under normal circumstances, the Fund seeks to invest at least 80%
              of its net assets plus the amount of any borrowings for investment
              purposes in large cap equity securities and derivatives that have
              similar economic characteristics to such securities. For purposes
              of the Fund’s 80% policy, large cap equity securities are equity
              securities that at the time of purchase have a market
              capitalization within the range of companies included in the
              Russell 1000® Value Index (the “Russell 1000 Value Index”). The
              Russell 1000 Value Index is a capitalization-weighted index from a
              broad range of industries chosen for market size, liquidity and
              industry group representation. Equity securities consist of common
              stock and preferred stock, other financial instruments that are
              components of, or have characteristics similar to, the securities
              included in the Russell 1000 Value Index, and American Depositary
              Receipts (“ADRs”), which are receipts typically issued by an
              American bank or trust company that evidence underlying securities
              issued by a foreign company. The Fund may also purchase
              convertible securities. The Fund invests primarily in equity
              securities that Fund management believes are undervalued, which
              means that their prices are less than Fund management believes
              they are worth. Fund management places particular emphasis on
              companies with below average price/earnings ratios that may pay
              above average dividends. The Fund invests primarily in common
              stock of U.S. companies, but the Fund may invest up to 25% of its
              total assets in the securities of foreign issuers.
            additionalNarrowBenchmark: null
            dualPriced: false
            priceFirstDate: '2018-04-18'
            priceRecentDate: '2025-03-26'
            insight: >
              AGG`s all-in cost is low and more predictable than its rivals. In
              a segment where there are a handful of similar funds tracking
              essentially the same underlying index, holding and trading costs
              are the driving factors. AGG delivers its underlying index`s
              returns with precision and consistency. The fund also has a
              history of massive trading volume and tight spreads. AGG tracks
              our segment benchmark, providing excellent exposure to the US
              investment-grade bond market. Note that the fund employs a careful
              optimization strategy, holding just a fraction of the names in its
              index, a near-necessity among bond-market ETFs.
