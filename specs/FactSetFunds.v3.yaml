    AumRequest:
      title: AUM Request
      description: AUM Request
      type: object
      properties:
        data:
          description: >-
            Request payload containing fund identifiers and optional date range,
            frequency, currency, and data type parameters for AUM data
          type: object
          properties:
            ids:
              $ref: '#/components/schemas/Ids'
            startDate:
              $ref: '#/components/schemas/StartDate'
            endDate:
              $ref: '#/components/schemas/EndDate'
            frequency:
              $ref: '#/components/schemas/FrequencyAum'
            currency:
              $ref: '#/components/schemas/Currency'
            dataType:
              $ref: '#/components/schemas/NavDataType'
          required:
            - ids
        meta:
          $ref: '#/components/schemas/MetaRequest'
      required:
        - data
    AumResponse:
      type: object
      title: AUM Response
      description: Response containing an array of assets under management data
      properties:
        data:
          description: Array of AUM Objects
          type: array
          items:
            $ref: '#/components/schemas/Aum'
        meta:
          $ref: '#/components/schemas/SearchMeta'
    Aum:
      title: AUM Object
      description: >-
        Assets under management data including fund-level AUM, share class
        reported AUM, and share class actual AUM
      type: object
      allOf:
        - $ref: '#/components/schemas/IdentifierResponseFields'
        - type: object
          additionalProperties: true
          properties:
            error:
              $ref: '#/components/schemas/FundsErrorObject'
            fundLevelAUM:
              description: >-
                Returns fund-level Assets Under Management (AUM) data.
                Fund-level AUM is the sum of the market values of the positions
                in the fund's portfolio. This represents all share classes.
              type: number
              format: double
              example: 1908934757.1935
              nullable: true
            shareClassAUMReported:
              description: >-
                As-Reported AUM. Calculated by using shares outstanding at
                previous close multiplied by NAV at previous close. This is
                typically the value seen on fund websites. As Reported AUM =
                (Shares Outstanding t0 * NAV t0).
              type: number
              format: double
              example: 902354605.39548
              nullable: true
            shareClassAUMActual:
              description: >-
                Actual AUM. Calculated by using shares outstanding at previous
                close multiplied by NAV of one day prior to close. This is the
                value used in calculating fund flows. Actual AUM = (Shares
                Outstanding t0 * NAV t-1)
              type: number
              format: double
              example: 914573047.89582
              nullable: true
            currency:
              description: >-
                The Currency of the AUM values. By default it will be in the
                Funds Currency, unless otherwise requested via the currency
                parameter. This will be in ISO3 Currency. For a list of currency
                ISO codes, visit Online Assistant Page
                [OA1470](https://my.apps.factset.com/oa/pages/1470)'
              type: string
              example: USD
              nullable: true
            numberOfSharesOutstanding:
              description: >
                Returns the last available number of shares outstanding for the
                security.
              type: number
              example: 33000000
              nullable: true
            date:
              description: The date of the AUM in YYYY-MM-DD format.
              type: string
              format: date
              example: '2025-02-28'
              nullable: true
    FlowsRequest:
      title: Flows Request
      description: Flows Request
      type: object
      properties:
        data:
          description: >-
            Request payload containing fund identifiers and optional date range,
            frequency, and currency parameters for flows data
          type: object
          properties:
            ids:
              $ref: '#/components/schemas/Ids'
            startDate:
              $ref: '#/components/schemas/StartDate'
            endDate:
              $ref: '#/components/schemas/EndDate'
            frequency:
              $ref: '#/components/schemas/Frequency'
            currency:
              $ref: '#/components/schemas/Currency'
          required:
            - ids
        meta:
          $ref: '#/components/schemas/MetaRequest'
      required:
        - data
    FlowsResponse:
      type: object
      title: Flows Response
      description: Response containing an array of fund flows data
      properties:
        data:
          description: Array of Flows Objects
          type: array
          items:
            $ref: '#/components/schemas/Flows'
        meta:
          $ref: '#/components/schemas/SearchMeta'
    Flows:
      title: Flows Object
      description: >-
        Fund flows data representing inflows and outflows for the specified
        share class
      type: object
      allOf:
        - $ref: '#/components/schemas/IdentifierResponseFields'
        - type: object
          additionalProperties: true
          properties:
            error:
              $ref: '#/components/schemas/FundsErrorObject'
            fundFlows:
              description: >-
                Fund flows data for the specified share class in raw units of
                the specified currency.
              type: number
              format: double
              example: 271971.16741002
              nullable: true
            currency:
              description: >-
                ISO3 Currency. For a list of currency ISO codes, visit Online
                Assistant Page
                [OA1470](https://my.apps.factset.com/oa/pages/1470)'
              type: string
              example: USD
              nullable: true
            date:
              description: The date of the AUM in YYYY-MM-DD format.
              type: string
              format: date
              example: '2025-02-26'
              nullable: true
    FundStructure:
      title: Funds Structure Object
      description: >-
        Fund structure details including fund type, advisors, custodian,
        derivatives holdings, and conversion status
      type: object
      allOf:
        - $ref: '#/components/schemas/IdentifierResponseFields'
        - type: object
          required:
            - structureType
          additionalProperties: true
          properties:
            error:
              $ref: '#/components/schemas/FundsErrorObject'
            structureType:
              $ref: '#/components/schemas/FundStructureType'
            fundType:
              description: >-
                Returns the type of the fund, e.g. Mutual Fund, Unit Investment
                Trust, ETF, etc.
              type: string
              example: Mutual Fund
              nullable: true
            fundOfFunds:
              description: >-
                The fund of fund's ID if applicable. Will provide plain Fund of
                Funds text.
              type: string
              example: Fund of funds
              nullable: true
            portfolioDisclosureFrequency:
              description: Returns the disclosure frequency
              type: string
              example: daily
              nullable: true
            holdsDerivatives:
              description: Flag to check if the funds holds derivatives
              type: boolean
              example: true
              nullable: true
            securitiesLendingActive:
              description: >-
                Indicates whether the fund has an active securities lending
                program.
              type: boolean
              example: true
              nullable: true
            etnCounterparty:
              description: Returns ETF counterparty information
              type: string
              example: Barclays Bank PLC
              nullable: true
            primaryAdvisor:
              description: The name of the fund's primary advisor.
              type: string
              example: BlackRock Advisors LLC
              nullable: true
            subAdvisor:
              description: The name of the fund's sub-advisor.
              type: string
              example: DWS Investment GmbH
              nullable: true
            custodian:
              description: >-
                Returns custodian data who is a third-party entity that holds
                and safeguards the securities that are mutually owned by the
                fund's investors. They can also perform accounting,
                administration and provide legal, compliance, and tax services.
              type: string
              example: The Bank of New York Mellon(New York)
              nullable: true
            convertedFundFlag:
              description: >-
                Returns conversion data for funds. Conversion Flag indicates if
                the ETF is a converted Mutual Fund. Data is returned for both
                Mutual Funds and ETFs.
              type: boolean
              example: false
              nullable: true
            conversionDisclaimer:
              description: >-
                Disclaimer returns information regarding the fund conversion.
                conversion date and the converted fund’s name and ticker. Data
                is returned for both Mutual Funds and ETFs.
              type: string
              example: >
                ETF performance prior to 5/23/22 is attributable to the
                Westfield Capital Dividend Growth Mutual Fund, Institutional
                Share class and/or Westfields private investment vehicle
                (WDIVX-US).
              nullable: true
            conversionTimeseriesStitchedFlag:
              description: >-
                TimeSeries Stitched indicates if the performance of the current
                active ETF is a continuation of the converted fund. Data is
                returned for both Mutual Funds and ETFs.
              type: boolean
              example: false
              nullable: true
    ErrorResponse:
      type: object
      title: Error Response
      description: Default Error Response
      properties:
        errors:
          type: array
          description: An array containing errors
          items:
            $ref: '#/components/schemas/FundsErrorObject'
    ContentSetsResponse:
      type: object
      title: Content sets Response
      description: Content sets Response
      properties:
        data:
          description: Array of Content sets permissioned for the user.
          type: array
          items:
            $ref: '#/components/schemas/ContentSet'
    ContentSet:
      type: object
      description: Content set object
      properties:
        name:
          type: string
          description: The content set name.
          example: Factset Fundamentals
        description:
          type: string
          description: The content set description.
          example: Fundamental data for companies
        custom:
          type: boolean
          description: >-
            Indicates whether the content set is a custom content set (`true`),
            or a default content set (`false`).
    FieldsResponse:
      type: object
      title: Screener Fields Response
      description: >-
        Response containing fields available for the requested screener content
        set(s)
      properties:
        data:
          description: Array of content sets with their available fields.
          type: array
          items:
            $ref: '#/components/schemas/FieldResponseObject'
    FieldResponseObject:
      title: Screener Content Set Fields
      type: object
      description: Container grouping fields by their content set name
      properties:
        contentSet:
          type: string
          description: The content set name.
          example: Factset Fundamentals
        fields:
          type: array
          items:
            $ref: '#/components/schemas/Field'
          description: Array of fields available in the content set.
    Field:
      title: Screener Field
      type: object
      description: Individual field definition available in a screener content set
      properties:
        fieldName:
          description: Field name.
          type: string
          example: Factset Fundamentals - FF_SALES
        displayName:
          description: >-
            Field display name as provided during the creation of the content
            set. This is returned only for custom content sets.
          type: string
          example: Sales
        type:
          description: |
            Field data type, where field datatype can be one of the following:
            * `text`  = String,
            * `float` = Floating point number,
            * `long`  = integer,
            * `date` = Date.
            * `boolean` = `true` or `false`. 
            <br>
          type: string
          example: text
          enum:
            - text
            - float
            - long
            - date
            - boolean
        description:
          description: Field description.
          type: string
          example: The sales of the company.
    CreateContentSetRequest:
      title: Create Content Set Request
