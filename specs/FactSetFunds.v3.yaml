          $ref: '#/components/schemas/DistinctCountMeta'
      required:
        - data
    DistinctCountRequestBody:
      title: Distinct count Request Body
      description: Distinct count Request Body
      type: object
      properties:
        contentSet:
          type: string
          description: The content set from which the input field is taken.
          example: Factset Fundamentals
        fieldName:
          $ref: '#/components/schemas/InputField'
        joinType:
          $ref: '#/components/schemas/JoinType'
        filters:
          type: array
          description: Filters to be applied to the request.
          items:
            $ref: '#/components/schemas/Filter'
          minItems: 0
          maxItems: 10
      required:
        - contentSet
        - fieldName
    CustomContentSets:
      type: array
      description: >
        The content sets from which the fields are requested, including the
        field names for each content set.
      items:
        $ref: '#/components/schemas/CustomContentSetItem'
      minItems: 1
      maxItems: 10
      example:
        - contentSet: Factset Fundamentals
          fields:
            - fieldName: FF_NET_INCOME
              displayName: Net Income
            - fieldName: FF_SALES
              displayName: Sales
        - contentSet: Factset Estimates
          fields:
            - fieldName: EST_EPS
              displayName: EPS
            - fieldName: EST_REVENUE
              displayName: Revenue
    CustomContentSetItem:
      type: object
      description: objects of custom content set items.
      required:
        - contentSet
        - fields
      properties:
        contentSet:
          type: string
          description: The name of the content set.
          example: Factset Fundamentals
        fields:
          type: array
          description: The fields to retrieve from this content set.
          items:
            $ref: '#/components/schemas/CreateRequestFieldObject'
    SearchContentSets:
      type: array
      items:
        $ref: '#/components/schemas/ContentSetItem'
      minItems: 1
      maxItems: 10
      description: >
        The content sets from which the fields are requested. For example:
        Factset Fundamentals, Factset Estimates, Partner Funds Fundata, etc.
      example:
        - contentSet: Factset Fundamentals
          fields:
            - ticker_region
            - FF_SALES
            - FF_EPS
        - contentSet: Factset Estimates
          fields:
            - EST_EPS
            - EST_REVENUE
    ContentSetItem:
      type: object
      description: objects of content set items.
      properties:
        contentSet:
          type: string
          description: >-
            The content set the field belongs to, e.g., "Factset Fundamentals"
            or "Factset Estimates".
          example: Factset Fundamentals
        fields:
          type: array
          description: >
            Fields to be returned in the response.


            Default fields are: `tickerRegion`, `fsymId`, `entityId`,
            `instrumentName`.


            Requesting any additional fields beyond these default fields will
            result in an error unless proper permissions are granted. 


            Please contact FactSet Support for access permissions to additional
            fields.
          items:
            $ref: '#/components/schemas/InputField'
          minItems: 1
          maxItems: 50
      required:
        - contentSet
        - fields
    SearchFilter:
      type: object
      description: Filter object
      properties:
        joinType:
          $ref: '#/components/schemas/JoinType'
        criteria:
          type: array
          description: Criteria to filter by
          items:
            $ref: '#/components/schemas/SearchCriterion'
          minItems: 1
          maxItems: 10
      required:
        - criteria
    SearchCriterion:
      type: object
      description: Criteria to filter by
      properties:
        contentSet:
          type: string
          description: >-
            The content set the field belongs to, e.g., "Factset Fundamentals"
            or "Factset Estimates".
          example: Factset Fundamentals
        fieldName:
          $ref: '#/components/schemas/InputField'
        operator:
          $ref: '#/components/schemas/Operator'
        values:
          type: array
          items:
            type: string
          description: The value to be used in the filter criteria.
          example:
            - Apple Inc.
      required:
        - contentSet
        - fieldName
        - operator
        - values
    Filter:
      type: object
      description: Filter object
      properties:
        joinType:
          $ref: '#/components/schemas/JoinType'
        criteria:
          type: array
          description: Criteria to filter by
          items:
            $ref: '#/components/schemas/Criterion'
          minItems: 1
          maxItems: 10
      required:
        - criteria
    Criterion:
      type: object
      description: Criteria to filter by
      properties:
        fieldName:
          $ref: '#/components/schemas/InputField'
        operator:
          $ref: '#/components/schemas/Operator'
        values:
          type: array
          items:
            type: string
          description: The value to be used in the filter criteria.
          example:
            - Apple Inc.
      required:
        - fieldName
        - operator
        - values
    Operator:
      type: string
      enum:
        - EQ
        - NE
        - CT
        - NOT_CT
        - IN
        - NOT_IN
        - LT
        - LTE
        - GT
        - GTE
      description: >
        The operator to be used in the filter criteria, where
          * **EQ**  = Equals,
          * **NE** = Not equals,
          * **CT**  = Contains returns values which contain given substring,
          * **NOT_CT** = Not Contains - returns values that **do not** contain the given substring,
          * **IN** = The "In" operator accepts an array of values and returns data that matches any of them,
          * **NOT_IN** = The "NOT_IN" operator accepts an array of values and returns data that matches none of them,
          * **LT** = Less than,
          * **LTE** = Less than or equal to,
          * **GT**  = Greater than,
          * **GTE** = Greater than or equal to.
          
          <br>
        **Note:** Both the `IN` and `NOT_IN` operators accept multiple values,
        while all other operators should be used with a single value.
      example: EQ
    JoinType:
      type: string
      enum:
        - AND
        - OR
      description: >-
        The join type to be used in the filter criteria. If the filter criteria
        array contains only one element, joinType has no effect.
      example: AND
      default: AND
    InputField:
      type: string
      description: >-
        The field name to be used in the filter criteria. For custom content
        sets, display name should be used as a field name. The inputField must
        be a member of the contentSet specified above.
      example: Company Name
    SortField:
      type: string
      description: >
        Represents a single sort field. Specify each field using the format
        `{prefix}{ContentSetName}:{FieldName}`.  

        Use a `-` prefix for descending order.
    DistinctCountResponse:
      type: object
      title: Distinct Count Response
      description: Distinct Count Response object
      properties:
        data:
          description: >-
            Number of records for a given field spread across all possible
            values.
          type: array
          items:
            $ref: '#/components/schemas/DistinctCountData'
    DistinctCountData:
      type: object
      description: Distinct Count Data
      properties:
        value:
          type: string
          description: The value of the field.
          example: Apple Inc.
        count:
          type: integer
          format: int64
          description: The number of records with the corresponding value.
          example: 100
    StatisticsRequest:
      title: Statistics Request
      description: Statistics Request
      type: object
      properties:
        data:
          $ref: '#/components/schemas/StatisticsRequestBody'
      required:
        - data
    StatisticsRequestBody:
      title: Statistics Request Body
      description: Statistics Request Body
      type: object
      properties:
        contentSet:
          type: string
          description: The content set from which the input field is taken.
          example: Factset Fundamentals
        fieldName:
          $ref: '#/components/schemas/InputField'
        histogram:
          type: boolean
          description: Flag to indicate if histogram data is required.
          example: true
        joinType:
          $ref: '#/components/schemas/JoinType'
        filters:
          type: array
          description: Filters to be applied to the request.
          items:
            $ref: '#/components/schemas/Filter'
          minItems: 0
          maxItems: 10
      required:
        - contentSet
        - fieldName
    StatisticsResponse:
      type: object
      title: Statistics Response
      description: Statistics Response object
      properties:
        data:
          description: >-
            Aggregate statistics for a given field within the specified content
            sets.
          type: object
          properties:
            minimum:
              type: number
              description: The minimum value of the field.
              example: -55.609
            maximum:
              type: number
              description: The maximum value of the field.
              example: 105.736
            average:
              type: number
              description: The average value of the field.
              example: 0.752
            sum:
              type: number
              description: The sum of the field values.
              example: 2910.85
            count:
              type: integer
              format: int64
              description: The number of records.
              example: 3869
            median:
              type: number
              description: The median value of the field.
              example: 0.752
            stdDev:
              type: number
              description: The standard deviation of the field values.
              example: 0.752
            histogram:
              type: array
              description: >-
                The histogram of the field values. The histogram is an array of
                10 bins, each bin containing the minimum, maximum, and count of
                records in that bin. The bins are equally spaced between the
                minimum and maximum values of the field.
              items:
                $ref: '#/components/schemas/HistogramData'
    HistogramData:
      type: object
      description: Histogram Data
      properties:
        minimum:
          type: number
          description: The minimum value of the bin.
          example: -55.609
        maximum:
          type: number
          description: The maximum value of the bin.
          example: 105.736
        count:
          type: integer
          format: int64
          description: The number of records in the bin.
          example: 3869
    SearchRequest:
      title: Search Request
