  /yields:
    get:
      tags:
        - Prices, Returns, and Distributions
      summary: Get Fund Yield for a user-defined date range for large list of IDs.
      operationId: getFundsYield
      description: >
        Returns SEC Yield of a fund.

        * Net SEC yield is the subsidized or after waivers.

        * Gross SEC yield is the unsubsidized or before waivers.

        * The Net will be bigger than the Gross if part of the fees are waived.
        If Gross and Net are equal, no fees were waived

        * SEC Yield for Mutual Funds is in percentage form while ETFs will
        depend on the fund.

        * Data is returned for both Mutual Funds and ETFs.
      parameters:
        - $ref: '#/components/parameters/ids'
        - $ref: '#/components/parameters/startDate'
        - $ref: '#/components/parameters/endDate'
        - $ref: '#/components/parameters/frequency'
        - $ref: '#/components/parameters/paginationLimit'
        - $ref: '#/components/parameters/paginationOffset'
      responses:
        '200':
          description: The Yields response object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/YieldsResponse'
              examples:
                Yield details for SPY-US:
                  $ref: '#/components/examples/yieldsExample'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '415':
          $ref: '#/components/responses/415'
        '422':
          $ref: '#/components/responses/422'
        '500':
          $ref: '#/components/responses/500'
    post:
      tags:
        - Prices, Returns, and Distributions
      summary: Get Fund Yield for a user-defined date range for large list of IDs.
      description: >
        Returns SEC Yield of a fund.

        * Net SEC yield is the subsidized or after waivers.

        * Gross SEC yield is the unsubsidized or before waivers.

        * The Net will be bigger than the Gross if part of the fees are waived.
        If Gross and Net are equal, no fees were waived

        * SEC Yield for Mutual Funds is in percentage form while ETFs will
        depend on the fund.

        * Data is returned for both Mutual Funds and ETFs.
      operationId: getFundsYieldForList
      requestBody:
        required: true
        description: >-
          The Yields request body, allowing the user to specify a list of IDs
          and date.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/YieldsRequest'
      responses:
        '200':
          description: The Yields response object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/YieldsResponse'
              examples:
                Yield details for SPY-US:
                  $ref: '#/components/examples/yieldsExample'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '415':
          $ref: '#/components/responses/415'
        '422':
          $ref: '#/components/responses/422'
        '500':
          $ref: '#/components/responses/500'
  /costs-fees:
    get:
      tags:
        - Taxes, Fees and Risks
      summary: Get the Fund's Costs, Investment minimums and Risk, and Fees.
      operationId: getFundsCostsFees
      description: >-
        Fetch the Fund's Costs, Investment minimums and Risk, and Fees. This
        subcategory includes management fees, 12b-1 fees, expense ratios, and
        several other data items. The value for each specified share class is
        expressed as a percentage of the AUM.
      parameters:
        - $ref: '#/components/parameters/ids'
        - $ref: '#/components/parameters/currency'
        - $ref: '#/components/parameters/date'
      responses:
        '200':
          description: The Costs and Fees response object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CostsFeesResponse'
              examples:
                Fund Costs Fees details for MABAX-US:
                  $ref: '#/components/examples/fundCostsFees'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '415':
          $ref: '#/components/responses/415'
        '422':
