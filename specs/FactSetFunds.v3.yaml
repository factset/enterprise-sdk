          description: Total number of records the API returns for a particular query.
          type: integer
          format: int64
        isEstimatedTotal:
          description: >-
            Boolean value that represents whether the total count of records
            returned is exact or an estimate. This is defaulted to False as the
            API should always return the exact count.
          type: boolean
    FieldValues:
      type: object
