            The name of the content set. Name should contain only alphanumeric
            characters, spaces, hyphens, and underscores.
          example: my-content-set
        description:
          type: string
          description: The description of the content set.
          example: Custom content set for my user
        contentSets:
          $ref: '#/components/schemas/CustomContentSets'
      required:
        - name
        - description
        - contentSets
    CreateRequestFieldObject:
      title: Field object for Create Request
