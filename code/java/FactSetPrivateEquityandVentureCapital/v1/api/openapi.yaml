  /funds/cashflows:
    post:
      description: |-
        Provides **quarterly** cash flow data for one or more funds, including **contributions** (capital calls) and **distributions** (payouts). This raw data is fundamental for calculating net cash flows and performance metrics like DPI, TVPI, and IRR.

        Use the `/universe` endpoint, set the `entityType` parameter to `VEN` (Venture Capital Fund), `PVF` (Private Equity Fund/Alt Investment), or `FAF` (Family of Funds (Venture Capital/Private Equity)). Submit the fund's name. The returned `entityId` is the required input value for this endpoint.
      operationId: getFundCashflows
      requestBody:
        content:
          application/json:
            examples:
              Fund Cashflows request for multiple funds:
                $ref: '#/components/examples/postFundCashflows'
            schema:
              $ref: '#/components/schemas/FundCashflowsRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              examples:
                Cashflows:
                  $ref: '#/components/examples/resultOfCashflows'
              schema:
                $ref: '#/components/schemas/FundCashflowsResponse'
          description: Successful response
        "400":
          content:
            application/json:
              examples:
                Bad Request - Date Format:
                  $ref: '#/components/examples/badRequestDateFormat'
                Bad Request - Missing Required Parameter:
                  $ref: '#/components/examples/badRequestRequiredParameter'
                Bad Request - Malformed JSON:
                  $ref: '#/components/examples/badRequestMalformedJSON'
                Bad Request - Read Timeout:
                  $ref: '#/components/examples/badRequestReadTimeout'
              schema:
