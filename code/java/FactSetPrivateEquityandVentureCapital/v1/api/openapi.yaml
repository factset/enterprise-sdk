          description: Bad Request. This can occur for several reasons. Please review
            the "message" for more details.
        "401":
          content:
            application/json:
              examples:
                Bad Request - Date Format:
                  $ref: '#/components/examples/unauthenticated'
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthenticated USERNAME-SERIAL. Ensure you are logged in and
            have successfully generated an API KEY for the IP range you are connecting
            from. For more help, select the **Report Issue** in the top right corner
            of this Developer Portal specification card and choose Connectivity 401
            or 403 Responses.
        "403":
          content:
            application/json:
              examples:
                Bad Request - forbidden:
                  $ref: '#/components/examples/forbidden'
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: The USERNAME-SERIAL attempted to request the endpoint is not
            authorized to access. The request was legal, but the server is refusing
            to respond. Please reach out to FactSet Account Team for assistance with
            authorization.
        "415":
          content:
            application/json:
              examples:
                Bad Request - Unsupported Media Type:
                  $ref: '#/components/examples/unsupportedMediaType'
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unsupported Media Type. This error may be returned when the
            caller sends a resource in a format that is not accepted by the server.
            This can be fixed by ensuring that the Content-Type header is set to the
            correct value. In this instance, "application/json" would be the appropriate
            value.
        "500":
          content:
            application/json:
              examples:
                Internal Server Error - Not Writable:
                  $ref: '#/components/examples/notWritable'
                Internal Server Error - General Exception:
                  $ref: '#/components/examples/generalException'
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal Server Error.
      summary: Retrieve time-series cash flow data (contributions and distributions)
        for specified funds.
      tags:
      - Funds
      x-contentType: application/json
      x-accepts: application/json
  /general-partners:
    get:
      description: Retrieves the primary descriptive and profile information for one
        or more General Partner firms. This includes firm-level details such as the
        **Asset Under Management (AUM)** and a high-level overview of their **investment
        strategy** (e.g., target industry, geography).
      operationId: getGP
      parameters:
      - description: A list of FactSet Permanent Entity Identifiers (FactSet IDs)
          for **General Partner (GP) firms**. These IDs are used to identify the management
          companies of the funds.
        explode: true
        in: query
        name: ids
        required: true
        schema:
          example:
          - 000BKX-E
          - 000KCYH-E
          items:
            type: string
          maxItems: 50
          minItems: 1
          type: array
        style: form
      - description: "The as-of date for the AUM data in **YYYY-MM-DD** format. Returns\
          \ the AUM value as of the specified date.\n\nNote: \n- If omitted: The response\
          \ will return the latest available AUM data.\n- Future dates (T+1) are not\
          \ accepted in this endpoint.\n"
        example: 2023-08-27
        explode: true
        in: query
        name: asOfDate
        required: false
        schema:
          format: date
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              examples:
                General Partner Details:
                  $ref: '#/components/examples/resultOfGps'
              schema:
                $ref: '#/components/schemas/GPDetailsResponse'
          description: Successful response
        "400":
          content:
            application/json:
              examples:
                Bad Request - Date Format:
                  $ref: '#/components/examples/badRequestDateFormat'
                Bad Request - Missing Required Parameter:
                  $ref: '#/components/examples/badRequestRequiredParameter'
                Bad Request - Malformed JSON:
                  $ref: '#/components/examples/badRequestMalformedJSON'
                Bad Request - Read Timeout:
                  $ref: '#/components/examples/badRequestReadTimeout'
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad Request. This can occur for several reasons. Please review
            the "message" for more details.
        "401":
          content:
            application/json:
              examples:
                Bad Request - Date Format:
                  $ref: '#/components/examples/unauthenticated'
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthenticated USERNAME-SERIAL. Ensure you are logged in and
            have successfully generated an API KEY for the IP range you are connecting
            from. For more help, select the **Report Issue** in the top right corner
            of this Developer Portal specification card and choose Connectivity 401
            or 403 Responses.
        "403":
          content:
            application/json:
              examples:
                Bad Request - forbidden:
                  $ref: '#/components/examples/forbidden'
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: The USERNAME-SERIAL attempted to request the endpoint is not
            authorized to access. The request was legal, but the server is refusing
            to respond. Please reach out to FactSet Account Team for assistance with
            authorization.
        "415":
          content:
            application/json:
              examples:
                Bad Request - Unsupported Media Type:
                  $ref: '#/components/examples/unsupportedMediaType'
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unsupported Media Type. This error may be returned when the
            caller sends a resource in a format that is not accepted by the server.
            This can be fixed by ensuring that the Content-Type header is set to the
            correct value. In this instance, "application/json" would be the appropriate
            value.
        "500":
          content:
            application/json:
              examples:
                Internal Server Error - Not Writable:
                  $ref: '#/components/examples/notWritable'
                Internal Server Error - General Exception:
                  $ref: '#/components/examples/generalException'
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal Server Error.
      summary: Retrieves historical data for specified General Partner (GP) firms.
      tags:
      - General and Limited Partners
      x-accepts: application/json
  /general-partners/funds:
    get:
      description: |-
        Returns a list of all Private Equity and Venture Capital funds that are actively or historically managed by the specified General Partner firms. This provides a complete view of a GP's fund vintage and strategy history.

        Use the `/universe` endpoint and input the GP firm name, with `entityType` set to `HOL`. Only use `entityId` values whose `entityTypeCode` is `HOL` in your request.
      operationId: getGPFunds
      parameters:
      - description: A list of FactSet Permanent Entity Identifiers (FactSet IDs)
          for **General Partner (GP) firms**. These IDs are used to identify the management
          companies of the funds.
        explode: true
        in: query
        name: ids
        required: true
        schema:
          example:
          - 000BKX-E
          - 000KCYH-E
          items:
            type: string
          maxItems: 50
          minItems: 1
          type: array
        style: form
