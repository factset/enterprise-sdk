            application/json:
              examples:
                Internal Server Error - Not Writable:
                  $ref: '#/components/examples/notWritable'
                Internal Server Error - General Exception:
                  $ref: '#/components/examples/generalException'
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal Server Error.
      summary: Retrieve the list of portfolio companies held by specified Private
        Equity or Venture Capital Funds.
      tags:
      - Funds
      x-accepts: application/json
  /funds/fundraising:
    get:
      description: |-
        Provides detailed information on the **fundraising lifecycle** of one or more funds, including data on interim and **final closes**, the **total amount raised** (fund size), and the as-reported currency for each fundraising round.

        Use the `/universe` endpoint, set the `entityType` parameter to `VEN` (Venture Capital Fund), `PVF` (Private Equity Fund/Alt Investment), or `FAF` (Family of Funds (Venture Capital/Private Equity)). Submit the fund's name. The returned `entityId` is the required input value for this endpoint.
      operationId: getFundFundraising
      parameters:
      - allowEmptyValue: false
        description: A list of FactSet Permanent Entity Identifiers (FactSet IDs)
          for **Private Equity and Venture Capital Funds**. These IDs are in the format
          'XXXXXX-E' and are the primary input for most fund-related endpoints. These
          IDs can be retrieved from the /universe endpoint
        explode: true
        in: query
        name: ids
        required: true
        schema:
          example:
          - 0LC436-E
          items:
            type: string
          maxItems: 50
          minItems: 1
          type: array
        style: form
      responses:
        "200":
          content:
            application/json:
              examples:
