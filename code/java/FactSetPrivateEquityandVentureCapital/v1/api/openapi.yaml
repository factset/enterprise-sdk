      description: A list of FactSet Permanent Entity Identifiers (FactSet IDs) for
        **Private Equity and Venture Capital Funds**. These IDs are in the format
        'XXXXXX-E' and are the primary input for most fund-related endpoints. These
        IDs can be retrieved from the /universe endpoint
      explode: true
      in: query
      name: ids
      required: true
      schema:
        example:
        - 0H7PQB-E
        - 0JGJY6-E
        items:
          type: string
        maxItems: 50
        minItems: 1
        type: array
      style: form
    fundraisingIds:
      allowEmptyValue: false
      description: A list of FactSet Permanent Entity Identifiers (FactSet IDs) for
        **Private Equity and Venture Capital Funds**. These IDs are in the format
        'XXXXXX-E' and are the primary input for most fund-related endpoints. These
        IDs can be retrieved from the /universe endpoint
      explode: true
      in: query
      name: ids
      required: true
      schema:
        example:
        - 0LC436-E
        items:
          type: string
        maxItems: 50
        minItems: 1
        type: array
      style: form
    factsetGpEntityIds:
      description: A list of FactSet Permanent Entity Identifiers (FactSet IDs) for
        **General Partner (GP) firms**. These IDs are used to identify the management
        companies of the funds.
      explode: true
      in: query
      name: ids
      required: true
      schema:
        example:
        - 000BKX-E
        - 000KCYH-E
        items:
          type: string
        maxItems: 50
        minItems: 1
        type: array
      style: form
    transactionIds:
      description: A list of unique FactSet-generated identifiers for **Private Equity
        or Venture Capital transactions**. These IDs link to a single investment event,
        distinct from the main deal ID.
      explode: true
      in: query
      name: ids
      required: true
      schema:
        example:
        - 1000001
        - 1000002
        items:
          type: integer
        maxItems: 50
        minItems: 1
        type: array
      style: form
    dealIds:
      description: A list of unique FactSet-generated identifiers (Deal IDs) assigned
        to a **Merger & Acquisition (M&A) or Venture Capital (VC) deal**. This ID
        represents the main event being tracked.
      explode: true
      in: query
      name: ids
      required: true
      schema:
        example:
        - 23682
        items:
          type: integer
        maxItems: 50
        minItems: 1
        type: array
      style: form
    asOfDate:
      description: "The as-of date for the AUM data in **YYYY-MM-DD** format. Returns\
        \ the AUM value as of the specified date.\n\nNote: \n- If omitted: The response\
        \ will return the latest available AUM data.\n- Future dates (T+1) are not\
        \ accepted in this endpoint.\n"
      example: 2023-08-27
      explode: true
      in: query
      name: asOfDate
      required: false
      schema:
        format: date
        type: string
      style: form
    name:
      description: |
        The proper name of a Private Equity/Venture Capital firm, Fund, or Portfolio Company to be matched against the FactSet entity universe.<br/>  <p>***max length** =  200 per request*</p>
      example: Alto Pharmacy
      explode: true
      in: query
      name: name
      required: true
      schema:
        maxLength: 200
        minLength: 1
        type: string
      style: form
    country:
      description: The two-character ISO2 country code corresponding to the entity's
        primary location. Providing this code helps to narrow the entity match candidates,
        significantly improving the accuracy of the matching algorithm. For a list
        of ISO2 Country codes, visit [OA 8754](https://my.apps.factset.com/oa/pages/8754).
      example: US
      explode: true
      in: query
      name: country
      required: false
      schema:
        maxLength: 2
        minLength: 2
        type: string
      style: form
    entityType:
      description: "Three-character FactSet entity type code used to filter candidates\
        \ in order to determine the final match result.\n  |Entity Type Code|Entity\
        \ Type Description|Entity Type Code|Entity Type Description|\n  |---|---|---|---|\n\
        \  |PVT|Private Company|SUB|Subsidiary|\n  |HOL|Holding Company|JVT|Joint\
        \ Venture|\n  |NPO|Non-Profit Organization|\n  \n  |Entity Type Code|Entity\
        \ Type Description|Entity Type Code|Entity Type Description|\n  |---|---|---|---|\n\
        \  |FAF|\tFamily of Funds (Venture Capital/Private Equity)|PVF|Private Equity\
        \ Fund / Alternative Investment|\n  |VEN|Venture Capital Fund|"
      explode: true
      in: query
      name: entityType
      required: false
      schema:
        items:
          example: PVT
          maxLength: 3
          minLength: 3
          type: string
        type: array
      style: form
  responses:
    "400":
      content:
        application/json:
          examples:
            Bad Request - Date Format:
              $ref: '#/components/examples/badRequestDateFormat'
            Bad Request - Missing Required Parameter:
              $ref: '#/components/examples/badRequestRequiredParameter'
            Bad Request - Malformed JSON:
              $ref: '#/components/examples/badRequestMalformedJSON'
            Bad Request - Read Timeout:
              $ref: '#/components/examples/badRequestReadTimeout'
          schema:
            $ref: '#/components/schemas/ErrorResponse'
      description: Bad Request. This can occur for several reasons. Please review
        the "message" for more details.
    "401":
      content:
        application/json:
          examples:
            Bad Request - Date Format:
              $ref: '#/components/examples/unauthenticated'
          schema:
            $ref: '#/components/schemas/ErrorResponse'
      description: Unauthenticated USERNAME-SERIAL. Ensure you are logged in and have
        successfully generated an API KEY for the IP range you are connecting from.
        For more help, select the **Report Issue** in the top right corner of this
        Developer Portal specification card and choose Connectivity 401 or 403 Responses.
    "403":
      content:
        application/json:
          examples:
            Bad Request - forbidden:
              $ref: '#/components/examples/forbidden'
          schema:
            $ref: '#/components/schemas/ErrorResponse'
      description: The USERNAME-SERIAL attempted to request the endpoint is not authorized
        to access. The request was legal, but the server is refusing to respond. Please
        reach out to FactSet Account Team for assistance with authorization.
    "415":
      content:
        application/json:
          examples:
            Bad Request - Unsupported Media Type:
              $ref: '#/components/examples/unsupportedMediaType'
          schema:
            $ref: '#/components/schemas/ErrorResponse'
      description: Unsupported Media Type. This error may be returned when the caller
        sends a resource in a format that is not accepted by the server. This can
        be fixed by ensuring that the Content-Type header is set to the correct value.
        In this instance, "application/json" would be the appropriate value.
    "500":
      content:
        application/json:
          examples:
            Internal Server Error - Not Writable:
              $ref: '#/components/examples/notWritable'
            Internal Server Error - General Exception:
              $ref: '#/components/examples/generalException'
          schema:
            $ref: '#/components/schemas/ErrorResponse'
      description: Internal Server Error.
  schemas:
    ErrorObjectResponse:
      description: error
      example:
        code: GenericError
        detail: Validation Error
        title: Validation Error
      nullable: true
      properties:
        code:
          description: status
          example: GenericError
          type: string
        title:
          description: The plain text error message
          example: Validation Error
          type: string
        detail:
          description: Error details explanation
          example: Validation Error
          type: string
      type: object
    EntityMatchesResponse:
      description: The response object containing the results of the Entity Match
        request, which includes candidate entities and the final match decision.
      example:
        data:
        - matchFlag: true
          entityName: Alto Pharmacy LLC
          countryCode: US
          entityTypeCode: PVT
          entityId: 0H3R4Y-E
        - matchFlag: true
          entityName: Alto Pharmacy LLC
          countryCode: US
          entityTypeCode: PVT
          entityId: 0H3R4Y-E
      properties:
        data:
          description: Candidate list of `Entity Match` objects.
          items:
            $ref: '#/components/schemas/EntityMatch'
          type: array
      title: Entity Matches Response
      type: object
    EntityMatch:
      description: |
        An individual object representing a potential or actual match for a submitted entity name, providing the FactSet ID and related descriptive attributes.
      example:
        matchFlag: true
        entityName: Alto Pharmacy LLC
        countryCode: US
        entityTypeCode: PVT
        entityId: 0H3R4Y-E
      properties:
        entityId:
          description: |
            The definitive **FactSet Permanent Entity Identifier** (FactSet ID) of the entity matched, typically in the format 'XXXXXX-E'. This is the key identifier used for subsequent data retrieval endpoints in the API. For more detail, visit [FactSet Permanent Security Identifier](https://oa.apps.factset.com/cms/oaAttachment/64c3213a-f415-4c27-a336-92c73a72deed/24881)
          example: 0H3R4Y-E
          nullable: true
          type: string
        entityName:
          description: The full, standardized legal name corresponding to the matched
            entity as recorded in the FactSet database.
          example: Alto Pharmacy LLC
          nullable: true
          type: string
        countryCode:
          description: The two-character ISO 3166-1 alpha-2 country code corresponding
            to the primary country of the matched entity.
          example: US
          nullable: true
          type: string
        entityTypeCode:
          description: Code representing the entity type of the matched entity. See
            the related request parameter for a table of all Codes and their respective
            descriptions.
          example: PVT
          nullable: true
          type: string
        matchFlag:
          description: A boolean flag indicating whether the `entityId` is a FactSet
            match based on the input name and country. When `true`, the FactSet `entityId`
            was confidently matched to the input name and country. When `false`, the
            FactSet `entityId` could not be confidently matched to the input name
            and country.
          example: true
          nullable: true
          type: boolean
      title: Entity Match
      type: object
    ErrorResponse:
      description: Error Default Response
      properties:
        errors:
          description: An array containing errors
          items:
            $ref: '#/components/schemas/ErrorObject'
          type: array
      title: Error Response
      type: object
    ErrorObject:
      properties:
        id:
          description: A UUID for this particular occurrence of the problem.
          example: adb01824-252f-4420-b0c6-35a1e3507ef5
          format: uuid
          type: string
        code:
          description: status
          example: Bad Request
          type: string
        links:
          $ref: '#/components/schemas/ErrorObject_links'
        title:
          description: The plain text error message
          example: Validation Error
          type: string
      type: object
