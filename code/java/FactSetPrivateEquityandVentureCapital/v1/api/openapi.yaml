openapi: 3.0.3
info:
  contact:
    email: api@factset.com
    name: FactSet Research Systems
    url: https://developer.factset.com/contact
  description: |
    Comprehensive API for accessing private equity and venture capital data including funds, general partners, transactions, and portfolio companies.
  license:
    name: Apache License, Version 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  title: Private Equity & Venture Capital API
  version: 1.0.0
externalDocs:
  description: API Documentation
  url: https://developer.factset.com/api-catalog/factset-pevc-api
servers:
- description: Production
  url: https://api.factset.com/content/factset-pevc/v1
security:
- FactSetApiKey: []
- FactSetOAuth2: []
tags:
- description: Returns Entity Candidates and Matches for a single name and attributes.
  name: Universe
- description: Access detailed information on Private Equity and Venture Capital funds,
    including fundraising history, cash flows, performance metrics, portfolio holdings,
    and associated Limited Partners.
  name: Funds
- description: Retrieve comprehensive data for General Partners (GP) and Limited Partners
    (LP), including firm profiles, managed funds, key contacts, and commitments.
  name: General and Limited Partners
- description: Detailed access to private transaction events like venture capital,
    private equity, and M&A activity for portfolio companies, including investment
    stage, amount, investors, and securities.
  name: Transactions
- description: Defines the investment strategy of a fund or General Partner, detailing
    geographic, sector, instrument, and control criteria focus.
  name: Strategies
- description: Provides information on the Initial Public Offerings (IPOs) of portfolio
    companies, including pricing, size, and status.
  name: IPOs
paths:
  /universe:
    get:
      description: |
        Finds the best candidate entities matching the given entity name. Country code can also be supplied to narrow the search.

        Returns a list of potential entity matches, along with a match indicator, to assist in identifying the correct entity within the FactSet universe.

        **Max of 1 Name permitted in a single request.**
      operationId: getUniverse
      parameters:
      - description: |
          The proper name of a Private Equity/Venture Capital firm, Fund, or Portfolio Company to be matched against the FactSet entity universe.<br/>  <p>***max length** =  200 per request*</p>
        example: Alto Pharmacy
        explode: true
        in: query
        name: name
        required: true
        schema:
          maxLength: 200
          minLength: 1
          type: string
        style: form
      - description: The two-character ISO2 country code corresponding to the entity's
          primary location. Providing this code helps to narrow the entity match candidates,
          significantly improving the accuracy of the matching algorithm. For a list
          of ISO2 Country codes, visit [OA 8754](https://my.apps.factset.com/oa/pages/8754).
        example: US
        explode: true
        in: query
        name: country
        required: false
        schema:
          maxLength: 2
          minLength: 2
          type: string
        style: form
      - description: "Three-character FactSet entity type code used to filter candidates\
          \ in order to determine the final match result.\n  |Entity Type Code|Entity\
          \ Type Description|Entity Type Code|Entity Type Description|\n  |---|---|---|---|\n\
          \  |PVT|Private Company|SUB|Subsidiary|\n  |HOL|Holding Company|JVT|Joint\
          \ Venture|\n  |NPO|Non-Profit Organization|\n  \n  |Entity Type Code|Entity\
          \ Type Description|Entity Type Code|Entity Type Description|\n  |---|---|---|---|\n\
          \  |FAF|\tFamily of Funds (Venture Capital/Private Equity)|PVF|Private Equity\
          \ Fund / Alternative Investment|\n  |VEN|Venture Capital Fund|"
        explode: true
        in: query
        name: entityType
        required: false
        schema:
          items:
            example: PVT
            maxLength: 3
            minLength: 3
            type: string
          type: array
        style: form
      responses:
        "200":
          content:
            application/json:
              examples:
                Entity Matches:
                  $ref: '#/components/examples/resultOfEntityMatches'
              schema:
                $ref: '#/components/schemas/EntityMatchesResponse'
          description: Response containing Entity Match results.
        "400":
          content:
            application/json:
              examples:
                Bad Request - Date Format:
                  $ref: '#/components/examples/badRequestDateFormat'
                Bad Request - Missing Required Parameter:
                  $ref: '#/components/examples/badRequestRequiredParameter'
                Bad Request - Malformed JSON:
                  $ref: '#/components/examples/badRequestMalformedJSON'
                Bad Request - Read Timeout:
                  $ref: '#/components/examples/badRequestReadTimeout'
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad Request. This can occur for several reasons. Please review
            the "message" for more details.
        "401":
          content:
            application/json:
              examples:
                Bad Request - Date Format:
                  $ref: '#/components/examples/unauthenticated'
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthenticated USERNAME-SERIAL. Ensure you are logged in and
            have successfully generated an API KEY for the IP range you are connecting
            from. For more help, select the **Report Issue** in the top right corner
            of this Developer Portal specification card and choose Connectivity 401
            or 403 Responses.
        "403":
          content:
            application/json:
              examples:
                Bad Request - forbidden:
                  $ref: '#/components/examples/forbidden'
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: The USERNAME-SERIAL attempted to request the endpoint is not
            authorized to access. The request was legal, but the server is refusing
            to respond. Please reach out to FactSet Account Team for assistance with
            authorization.
        "415":
          content:
            application/json:
              examples:
                Bad Request - Unsupported Media Type:
                  $ref: '#/components/examples/unsupportedMediaType'
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unsupported Media Type. This error may be returned when the
            caller sends a resource in a format that is not accepted by the server.
            This can be fixed by ensuring that the Content-Type header is set to the
            correct value. In this instance, "application/json" would be the appropriate
            value.
        "500":
          content:
            application/json:
              examples:
                Internal Server Error - Not Writable:
                  $ref: '#/components/examples/notWritable'
                Internal Server Error - General Exception:
                  $ref: '#/components/examples/generalException'
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal Server Error.
      summary: Returns Entity Candidates and Matches for a single name and attributes.
      tags:
      - Universe
      x-accepts: application/json
  /funds:
    get:
      description: |-
        Retrieves the main descriptive and profile information for one or more Private Equity or Venture Capital funds identified by their FactSet entity IDs. This includes key characteristics like fund status (e.g., Open, Closed), fund type (e.g., Venture, Buyout), vintage year, and high-level strategy details.

        Use the `/universe` endpoint, set the `entityType` parameter to `VEN` (Venture Capital Fund), `PVF` (Private Equity Fund/Alt Investment), or `FAF` (Family of Funds (Venture Capital/Private Equity)). Submit the fund's name. The returned `entityId` is the required input value for this endpoint.
      operationId: getFund
      parameters:
      - allowEmptyValue: false
        description: A list of FactSet Permanent Entity Identifiers (FactSet IDs)
          for **Private Equity and Venture Capital Funds**. These IDs are in the format
          'XXXXXX-E' and are the primary input for most fund-related endpoints. These
          IDs can be retrieved from the /universe endpoint
        explode: true
        in: query
        name: ids
        required: true
        schema:
          example:
          - 001JYM-E
          - 005GEM-E
          items:
            type: string
          maxItems: 50
          minItems: 1
          type: array
        style: form
      responses:
        "200":
          content:
            application/json:
              examples:
                Fund Details:
                  $ref: '#/components/examples/resultOfFunds'
              schema:
                $ref: '#/components/schemas/FundDetailsResponse'
          description: Successful response
        "400":
          content:
            application/json:
              examples:
                Bad Request - Date Format:
                  $ref: '#/components/examples/badRequestDateFormat'
                Bad Request - Missing Required Parameter:
                  $ref: '#/components/examples/badRequestRequiredParameter'
                Bad Request - Malformed JSON:
                  $ref: '#/components/examples/badRequestMalformedJSON'
                Bad Request - Read Timeout:
                  $ref: '#/components/examples/badRequestReadTimeout'
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad Request. This can occur for several reasons. Please review
            the "message" for more details.
        "401":
          content:
            application/json:
              examples:
                Bad Request - Date Format:
                  $ref: '#/components/examples/unauthenticated'
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthenticated USERNAME-SERIAL. Ensure you are logged in and
            have successfully generated an API KEY for the IP range you are connecting
            from. For more help, select the **Report Issue** in the top right corner
            of this Developer Portal specification card and choose Connectivity 401
            or 403 Responses.
        "403":
          content:
            application/json:
              examples:
                Bad Request - forbidden:
                  $ref: '#/components/examples/forbidden'
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: The USERNAME-SERIAL attempted to request the endpoint is not
            authorized to access. The request was legal, but the server is refusing
            to respond. Please reach out to FactSet Account Team for assistance with
            authorization.
        "415":
          content:
            application/json:
              examples:
                Bad Request - Unsupported Media Type:
                  $ref: '#/components/examples/unsupportedMediaType'
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unsupported Media Type. This error may be returned when the
            caller sends a resource in a format that is not accepted by the server.
            This can be fixed by ensuring that the Content-Type header is set to the
            correct value. In this instance, "application/json" would be the appropriate
            value.
        "500":
          content:
            application/json:
              examples:
                Internal Server Error - Not Writable:
                  $ref: '#/components/examples/notWritable'
                Internal Server Error - General Exception:
                  $ref: '#/components/examples/generalException'
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal Server Error.
      summary: Retrieve core profile and summary data for specified Private Equity
        or Venture Capital Funds.
      tags:
      - Funds
      x-accepts: application/json
  /funds/portfolio-companies:
    get:
      description: |-
        Provides a list of **FactSet entity identifiers** for the portfolio companies in which a specified fund has invested. This endpoint is key for analyzing a fund's holdings and exposure to different companies in the private market.

        Use the `/universe` endpoint, set the `entityType` parameter to `VEN` (Venture Capital Fund), `PVF` (Private Equity Fund/Alt Investment), or `FAF` (Family of Funds (Venture Capital/Private Equity)). Submit the fund's name. The returned `entityId` is the required input value for this endpoint.
      operationId: getFundPortfolioCompanies
      parameters:
      - allowEmptyValue: false
        description: A list of FactSet Permanent Entity Identifiers (FactSet IDs)
          for **Private Equity and Venture Capital Funds**. These IDs are in the format
          'XXXXXX-E' and are the primary input for most fund-related endpoints. These
          IDs can be retrieved from the /universe endpoint
        explode: true
        in: query
        name: ids
        required: true
        schema:
          example:
          - 0H7PQB-E
          - 0JGJY6-E
          items:
            type: string
          maxItems: 50
          minItems: 1
          type: array
        style: form
      responses:
        "200":
          content:
            application/json:
              examples:
