              schema:
                $ref: '#/components/schemas/ErrorsResponse'
          description: Unsupported Media Type
        "500":
          content:
            application/json:
              examples:
                default500ResponseExample:
                  $ref: '#/components/examples/ServerErrorDetails'
              schema:
                $ref: '#/components/schemas/ErrorsResponse'
          description: Internal Server Error
      summary: Get a company's revenue breakdown by RBICS classification.
      tags:
      - Entity
      x-contentType: application/json
      x-accepts: application/json
  /factset-rbics/v1/industry/focus:
    get:
      description: |
        Identify all companies whose primary business falls within a specific RBICS industry. This endpoint screens your universe based on the RBICS Focus classification.

         A company's Focus is the lowest-level (Level 6) RBICS sub-industry from which it derives 50% or more of its annual revenue.

         Provide a list of one or more RBICS IDs (up to Level 6) to retrieve the list of companies whose primary business line falls within those sectors. A complete list of valid RBICS IDs can be retrieved using the `/structure` endpoints. Use the `startDate` and `endDate` parameters to screen for companies that held this classification during a specific historical period.
      operationId: getRbicsIndustryFocus
      parameters:
      - description: |
          A list of RBICS industry classification identifiers. These are used to filter the results to specific industries. IDs can range from Level 1 (Economy) to Level 6 (Sub-Industry). A complete list of valid RBICS IDs can be retrieved using the `/structure` endpoints.
        example:
        - "101010000000"
        - "55"
        explode: false
        in: query
        name: rbicsIds
        required: true
        schema:
          items:
            maxLength: 12
            minLength: 2
            type: string
          maxItems: 2500
          type: array
        style: form
      - description: "Specifies the start date for the requested date range, formatted\
          \ as **YYYY-MM-DD**. The data returned will be reflective of the classifications\
          \ or revenue data as of this date and forward. The `startDate` must be equal\
          \ to or before the `endDate`. Future dates (T+1) are not accepted in this\
          \ endpoint.\n\nNote: \n- If omitted while `endDate` is specified: Data will\
          \ be fetched from the earliest available record up to the specified end\
          \ date.\n- If both `startDate` and `endDate` are omitted: The response will\
          \ return the latest available data.\n"
        example: 2021-08-27
        explode: true
        in: query
        name: startDate
        required: false
        schema:
          format: date
          type: string
        style: form
      - description: |
          Specifies the end date for the requested date range, formatted as **YYYY-MM-DD**. The data returned will be reflective of the classifications or revenue data as of this date and earlier. The `endDate` must be equal to or after the `startDate`. Future dates (T+1) are not accepted in this endpoint.

          Note:
          - If omitted (with `startDate` specified): Data will be returned from the specified start date up to the most recent available date.
          - If both `startDate` and `endDate` are omitted: The response will return the latest available data.
        example: 2022-08-27
        explode: true
        in: query
        name: endDate
        required: false
        schema:
          format: date
          type: string
        style: form
      responses:
