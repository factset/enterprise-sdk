  /factset-rbics/v1/industry/revenue:
    get:
      description: |
        Screen for companies with revenue exposure to a specific RBICS Level 6 Sub-Industry. This endpoint identifies all companies that derive revenue from a specified sub-industry and returns the percentage of their total revenue attributable to that industry.
        This is a powerful tool for understanding the competitive landscape and supply chains at a granular level, beyond a company's primary classification.
        **Note:** The `rbicsIds` parameter for this endpoint must be a valid Level 6 Sub-Industry ID. Use the `startDate` and `endDate` parameters to control the time period for the underlying revenue reports.
      operationId: getRbicsIndustryRevenue
      parameters:
      - description: |
          List of RBICS Level 6 Sub-Industry IDs to screen for companies by revenue exposure. **Note:** Only Level 6 IDs are supported for this endpoint. A complete list of valid Level 6 IDs can be retrieved using the `/structure` endpoints.
        example:
        - "551515453010"
        explode: false
        in: query
        name: rbicsIds
        required: true
        schema:
          items:
            maxLength: 12
            minLength: 12
            type: string
          maxItems: 2500
          type: array
        style: form
      - description: "Specifies the start date for the requested date range, formatted\
          \ as **YYYY-MM-DD**. The data returned will be reflective of the classifications\
          \ or revenue data as of this date and forward. The `startDate` must be equal\
          \ to or before the `endDate`. Future dates (T+1) are not accepted in this\
          \ endpoint.\n\nNote: \n- If omitted while `endDate` is specified: Data will\
          \ be fetched from the earliest available record up to the specified end\
          \ date.\n- If both `startDate` and `endDate` are omitted: The response will\
          \ return the latest available data.\n"
        example: 2021-08-27
        explode: true
        in: query
        name: startDate
        required: false
        schema:
          format: date
          type: string
        style: form
      - description: |
          Specifies the end date for the requested date range, formatted as **YYYY-MM-DD**. The data returned will be reflective of the classifications or revenue data as of this date and earlier. The `endDate` must be equal to or after the `startDate`. Future dates (T+1) are not accepted in this endpoint.

