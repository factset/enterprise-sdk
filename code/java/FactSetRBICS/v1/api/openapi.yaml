      type: object
    IndustriesRevenue:
      example:
        l6Id: 551515000000
        requestId: "551515453010"
        fsymId: 06Y1MJ-E
        companyName: Alpha Professional Holdings Ltd.
        asOfDate: 2021-04-15T00:00:00.000+0000
        totalPercent: 79.323329
        l6Name: Smart Phone Manufacturing
        error:
          code: GenericError
          detail: Validation Error
          title: Validation Error
        periodEndDate: 2020-03-31T00:00:00.000+0000
      properties:
        fsymId:
          description: FactSet Permanent Entity Identifier. Six alpha-numeric characters,
            excluding vowels, with an -E suffix (XXXXXX-E).
          example: 06Y1MJ-E
          nullable: true
          type: string
        requestId:
          description: The RBICS Level 6 Sub-Industry identifier submitted in the
            request.
          example: "551515453010"
          type: string
        companyName:
          description: The official legal name of the company. This provides a human-readable
            identifier for the entity.
          example: Alpha Professional Holdings Ltd.
          nullable: true
          type: string
        asOfDate:
          description: The date of the company's financial report or filing from which
            the revenue data was sourced.
          example: 2021-04-15
          format: date
          nullable: true
          type: string
        periodEndDate:
          description: The end date of the fiscal period (e.g., quarter or year) to
            which the reported revenue corresponds.
          example: 2020-03-31
          format: date
          nullable: true
          type: string
        totalPercent:
          description: The percentage of the company's total revenue that is attributable
            to the specified sector, based on the most recent reported data within
            the requested time frame.
          example: 79.323329
          type: number
        l6Id:
          description: The RBICS ID for the Level 6 (Sub-Industry) classification
            to which the revenue is attributed. This is the most granular level in
            the RBICS hierarchy.
          example: 551515000000
          nullable: true
          type: number
        l6Name:
          description: The descriptive name for the Level 6 (Sub-Industry) classification.
          example: Smart Phone Manufacturing
          nullable: true
          type: string
        error:
          $ref: '#/components/schemas/ErrorObjectResponse'
      title: Industry Revenue Object
      type: object
    EntityRequest:
      description: Entity Revenue Request Body
      example:
        endDate: 2021-08-27T00:00:00.000+0000
        level: 6
        ids:
        - FDS-US
        - 0FPWZZ-E
        - TSLA-US
        startDate: 2021-08-27T00:00:00.000+0000
      properties:
        ids:
          description: |
            Security or Entity identifiers. FactSet Identifiers, tickers, CUSIP and SEDOL are accepted input. Max Ids of 2500.
          example:
          - FDS-US
          - 0FPWZZ-E
          - TSLA-US
          items:
            type: string
          maxItems: 2500
          minItems: 1
          title: ids
          type: array
        startDate:
          description: 'Specifies the start date for the requested date range, formatted
            as **YYYY-MM-DD**. The data returned will be reflective of the classifications
            or revenue data as of this date and forward. The `startDate` must be equal
            to or before the `endDate`. Future dates (T+1) are not accepted in this
            endpoint. <br> Note: <br> - If omitted while `endDate` is specified: Data
            will be fetched from the earliest available record up to the specified
            end date. <br> - If both `startDate` and `endDate` are omitted: The response
            will return the latest available data.'
          example: 2021-08-27
          format: date
          title: startDate
          type: string
        endDate:
          description: 'Specifies the end date for the requested date range, formatted
            as **YYYY-MM-DD**. The data returned will be reflective of the classifications
            or revenue data as of this date and earlier. The `endDate` must be equal
            to or after the `startDate`. Future dates (T+1) are not accepted in this
            endpoint. <br> Note: <br> - If omitted (with `startDate` specified): Data
            will be returned from the specified start date up to the most recent available
            date. <br> - If both `startDate` and `endDate` are omitted: The response
            will return the latest available data.'
          example: 2021-08-27
          format: date
          title: endDate
          type: string
        level:
          description: Specifies the deepest level of the RBICS taxonomy to be included
            in the revenue breakdown. The response will include all levels from 1
            up to the specified level. For example, a value of '3' will return revenue
            percentages for Economy (L1), Sector (L2), and Sub-Sector (L3). The default
            behavior is to return all 6 levels.
          example: 6
          maximum: 6
          minimum: 1
          title: level
          type: integer
      required:
      - ids
      title: Entity Revenue Request
      type: object
