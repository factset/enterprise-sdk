  /factset-rbics/v1/entity/revenue:
    get:
      description: "Access a comprehensive, hierarchical breakdown of a company's\
        \ revenue according to each RBICS industry classification. This endpoint aligns\
        \ a company's reported business segment revenues with the complete, multi-level\
        \ RBICS taxonomy, offering the percentage of total revenue attributed to each\
        \ industry.\n\nFor Mutual Funds and ETFs we only have data from L1-L4 and\
        \ requires additional access to get this data. Note that, the response time\
        \ can exceed 20+ seconds when querying for more than one year of data.  As\
        \ such we do not recommend requesting for more than 1 ID at a time for history.\n\
        \ \nUse the `level` parameter to control the depth of the returned taxonomy,\
        \ from Economy (L1) down to Sub-Industry (L6).\n"
      operationId: getRbicsEntityRevenue
      parameters:
      - description: "List of Company identifiers. Accepted identifiers include Ticker-Exchange,\
          \ Ticker-Regions, CUSIPs, ISINs, SEDOLs, or FactSet Permanent Ids, such\
          \ as -R, -L, or -E.<p>**ids limit = 2500 per request**</p> \n  Make note,\
          \ GET Method URL request lines are also limited to a total length of 8192\
          \ bytes (8KB). In cases where the service allows for thousands of ids, which\
          \ may lead to exceeding this request line limit of 8KB, its advised for\
          \ any requests with large request lines to be requested through the respective\
          \ \"POST\" method.</p>\n"
        example:
        - AAPL-US
        - 0FPWZZ-E
        - TSLA-US
        explode: false
        in: query
        name: ids
        required: true
        schema:
          items:
            example: IBM-US
            type: string
          maxItems: 2500
          minItems: 1
          type: array
        style: form
      - description: "Specifies the start date for the requested date range, formatted\
          \ as **YYYY-MM-DD**. The data returned will be reflective of the classifications\
          \ or revenue data as of this date and forward. The `startDate` must be equal\
          \ to or before the `endDate`. Future dates (T+1) are not accepted in this\
          \ endpoint.\n\nNote: \n- If omitted while `endDate` is specified: Data will\
          \ be fetched from the earliest available record up to the specified end\
          \ date.\n- If both `startDate` and `endDate` are omitted: The response will\
          \ return the latest available data.\n"
        example: 2021-08-27
        explode: true
        in: query
        name: startDate
        required: false
        schema:
          format: date
          type: string
        style: form
      - description: |
          Specifies the end date for the requested date range, formatted as **YYYY-MM-DD**. The data returned will be reflective of the classifications or revenue data as of this date and earlier. The `endDate` must be equal to or after the `startDate`. Future dates (T+1) are not accepted in this endpoint.

          Note:
          - If omitted (with `startDate` specified): Data will be returned from the specified start date up to the most recent available date.
          - If both `startDate` and `endDate` are omitted: The response will return the latest available data.
        example: 2022-08-27
        explode: true
        in: query
        name: endDate
        required: false
        schema:
          format: date
          type: string
        style: form
      - description: |
          Specifies the deepest level of the RBICS taxonomy to be included in the revenue breakdown. The response will include all levels from 1 up to the specified level. For example, a value of '3' will return revenue percentages for Economy (L1), Sector (L2), and Sub-Sector (L3). The default behavior is to return all 6 levels.
            |Level|Description|Number of Groups|
            |---|---|---|
            |1|Economy|14|
            |2|Sector|37|
            |3|Sub-Sector|109|
            |4|Industry Group|366|
            |5|Industry|901|
            |6|Sub-Industry|1629|
        example: 6
        explode: true
        in: query
        name: level
        required: false
        schema:
          maximum: 6
          minimum: 1
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              examples:
                Entity revenue response:
                  $ref: '#/components/examples/EntitiesResponse'
              schema:
                $ref: '#/components/schemas/EntityResponse'
          description: Successful response returning a company's revenue breakdown
            by RBICS classification.
        "400":
          content:
            application/json:
              examples:
                default400ResponseExample:
                  $ref: '#/components/examples/ErrorDetails'
              schema:
                $ref: '#/components/schemas/ErrorsResponse'
          description: Bad request.
        "401":
          content:
            application/json:
              examples:
                default401ResponseExample:
                  $ref: '#/components/examples/AuthErrorDetails'
              schema:
                $ref: '#/components/schemas/ErrorsResponse'
          description: Unauthenticated USERNAME-SERIAL. Ensure you are logged in and
            have successfully generated an API KEY for the IP range you are connecting
            from. For more help, select the Report Issue in the top right corner of
            this Developer Portal specification card and choose Connectivity 401 or
            403 Responses.
        "403":
          content:
            application/json:
              examples:
                default403ResponseExample:
                  $ref: '#/components/examples/AuthorizationErrorDetails'
              schema:
                $ref: '#/components/schemas/ErrorsResponse'
          description: The USERNAME-SERIAL attempted to request the endpoint is not
            authorized to access. The request was a legal request, but the server
            is refusing to respond. Please reach out to FactSet Account Team for assistance
            with authorization.
        "415":
          content:
            application/json:
              examples:
                default500ResponseExample:
                  $ref: '#/components/examples/UnsupportedDetails'
              schema:
                $ref: '#/components/schemas/ErrorsResponse'
          description: Unsupported Media Type
        "500":
          content:
            application/json:
              examples:
                default500ResponseExample:
                  $ref: '#/components/examples/ServerErrorDetails'
              schema:
                $ref: '#/components/schemas/ErrorsResponse'
          description: Internal Server Error
      summary: Get a company's revenue breakdown by RBICS classification.
      tags:
      - Entity
      x-accepts: application/json
    post:
      description: |
        Access a comprehensive, hierarchical breakdown of a company's revenue according to each RBICS industry classification. This endpoint aligns a company's reported business segment revenues with the complete, multi-level RBICS taxonomy, offering the percentage of total revenue attributed to each industry.

        For Mutual Funds and ETFs we only have data from L1-L4 and requires additional access to get this data. Note that, the response time can exceed 20+ seconds when querying for more than one year of data.  As such we do not recommend requesting for more than 1 ID at a time for history.

        Use the `level` parameter to control the depth of the returned taxonomy, from Economy (L1) down to Sub-Industry (L6). Use the POST method for large lists of identifiers.
      operationId: getRbicsEntityRevenueForList
      requestBody:
        content:
          application/json:
            examples:
              Entity Revenue Request:
                $ref: '#/components/examples/rbicsEntityRequest'
