  parameters:
    ids:
      description: "List of Company identifiers. Accepted identifiers include Ticker-Exchange,\
        \ Ticker-Regions, CUSIPs, ISINs, SEDOLs, or FactSet Permanent Ids, such as\
        \ -R, -L, or -E.<p>**ids limit = 2500 per request**</p> \n  Make note, GET\
        \ Method URL request lines are also limited to a total length of 8192 bytes\
        \ (8KB). In cases where the service allows for thousands of ids, which may\
        \ lead to exceeding this request line limit of 8KB, its advised for any requests\
        \ with large request lines to be requested through the respective \"POST\"\
        \ method.</p>\n"
      example:
      - AAPL-US
      - 0FPWZZ-E
      - TSLA-US
      explode: false
      in: query
      name: ids
      required: true
      schema:
        items:
          example: IBM-US
          type: string
        maxItems: 2500
        minItems: 1
        type: array
      style: form
    rbicsIds:
      description: |
        RBICS Taxonomy Id Filter. Use to lookup the structure details for the Id requested, or to screen for companies by industry.
      example:
      - "101010000000"
      - "55"
      explode: false
      in: query
      name: rbicsIds
      required: false
      schema:
        items:
          maxLength: 12
          minLength: 2
          type: string
        maxItems: 2500
        type: array
      style: form
    rbicsIndustryIds:
      description: |
        A list of RBICS industry classification identifiers. These are used to filter the results to specific industries. IDs can range from Level 1 (Economy) to Level 6 (Sub-Industry). A complete list of valid RBICS IDs can be retrieved using the `/structure` endpoints.
      example:
      - "101010000000"
      - "55"
      explode: false
      in: query
      name: rbicsIds
      required: true
      schema:
        items:
          maxLength: 12
          minLength: 2
          type: string
        maxItems: 2500
        type: array
      style: form
    rbicsL6Ids:
      description: |
        List of RBICS Level 6 Sub-Industry IDs to screen for companies by revenue exposure. **Note:** Only Level 6 IDs are supported for this endpoint. A complete list of valid Level 6 IDs can be retrieved using the `/structure` endpoints.
      example:
      - "551515453010"
      explode: false
      in: query
      name: rbicsIds
      required: true
      schema:
        items:
          maxLength: 12
          minLength: 12
          type: string
        maxItems: 2500
        type: array
      style: form
    startDate:
      description: "Specifies the start date for the requested date range, formatted\
        \ as **YYYY-MM-DD**. The data returned will be reflective of the classifications\
        \ or revenue data as of this date and forward. The `startDate` must be equal\
        \ to or before the `endDate`. Future dates (T+1) are not accepted in this\
        \ endpoint.\n\nNote: \n- If omitted while `endDate` is specified: Data will\
        \ be fetched from the earliest available record up to the specified end date.\n\
        - If both `startDate` and `endDate` are omitted: The response will return\
        \ the latest available data.\n"
      example: 2021-08-27
      explode: true
      in: query
      name: startDate
      required: false
      schema:
        format: date
        type: string
      style: form
    endDate:
      description: |
        Specifies the end date for the requested date range, formatted as **YYYY-MM-DD**. The data returned will be reflective of the classifications or revenue data as of this date and earlier. The `endDate` must be equal to or after the `startDate`. Future dates (T+1) are not accepted in this endpoint.

        Note:
        - If omitted (with `startDate` specified): Data will be returned from the specified start date up to the most recent available date.
        - If both `startDate` and `endDate` are omitted: The response will return the latest available data.
      example: 2022-08-27
      explode: true
      in: query
      name: endDate
      required: false
      schema:
        format: date
        type: string
      style: form
    date:
      description: Effective date for data expressed in YYYY-MM-DD format. If no date
        is requested, the default behavior is to return the full history for the requested
        entity.
      example: 2017-07-24
      explode: true
      in: query
      name: date
      required: false
      schema:
        type: string
      style: form
    levels:
      description: List of RBICS industry levels to include in the response. **By
        default if left blank, all levels are returned.**
      example:
      - 1
      - 3
      - 6
      explode: false
      in: query
      name: levels
      required: false
      schema:
        items:
          maximum: 6
          minimum: 1
          type: integer
        maxItems: 6
        type: array
        uniqueItems: true
      style: form
    includeNames:
      description: Option to include or exclude industry Names and the L6 Description.
        true = Include Names; false = Exclude Names.
      explode: true
      in: query
      name: includeNames
      required: false
      schema:
        default: true
        type: boolean
      style: form
    level:
      description: |
        Specifies the deepest level of the RBICS taxonomy to be included in the revenue breakdown. The response will include all levels from 1 up to the specified level. For example, a value of '3' will return revenue percentages for Economy (L1), Sector (L2), and Sub-Sector (L3). The default behavior is to return all 6 levels.
          |Level|Description|Number of Groups|
          |---|---|---|
          |1|Economy|14|
          |2|Sector|37|
          |3|Sub-Sector|109|
          |4|Industry Group|366|
          |5|Industry|901|
          |6|Sub-Industry|1629|
      example: 6
      explode: true
      in: query
      name: level
      required: false
      schema:
        maximum: 6
        minimum: 1
        type: integer
      style: form
    levelStructure:
      description: |
        RBICS industry levels to include in the response. All levels from 1-N will be returned. For example, '3' returns all levels 1,2 and 3. To request all levels, request level=6. Level 1 is returned by default.
          |Level|Description|Number of Groups|
          |---|---|---|
          |1|Economy|14|
          |2|Sector|37|
          |3|Sub-Sector|109|
          |4|Industry Group|366|
          |5|Industry|901|
          |6|Sub-Industry|1629|
      example: 1
      explode: false
      in: query
      name: level
      required: false
      schema:
        maximum: 6
        minimum: 1
        type: integer
      style: form
