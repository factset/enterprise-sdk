    PostCompanyLogoRequest_data_identifier:
      description: Set of identifiers and their type.
      example:
        values:
        - FDS-US
        type: tickerRegion
      properties:
        values:
          description: |
            Set of identifiers to resolve. ***values*** limit = 100 per request.
          example:
          - FDS-US
          items:
            example: FDS-US
            exclusiveMaximum: false
            exclusiveMinimum: false
            maxLength: 50
            maximum: 1
            minLength: 1
            minimum: 1
            pattern: ^[B-DF-HJ-NP-TV-Z0-9]{6}-[SLR]$|^[A-Z0-9.#&*+]{1,47}-[A-Z0-9]{2,4}$|^[0-9]{3,20}$|^[B-DF-HJ-NP-TV-Z0-9]{6}[0-9]$|^[A-Z]{2}[A-Z0-9]{9}[0-9]$|^[A-Z1-9][A-Z0-9]{5}$|^[0-9]{1,9}$|^[A-Z0-9]{8}[0-9]$|^[-A-Za-z0-9.#:]{1,25}$
            type: string
          maxItems: 100
          minItems: 1
          nullable: false
          type: array
          uniqueItems: true
        type:
          description: |
            Type of the identifier. Accepted values types include:
             * **idInstrument** - MDG identifier of an instrument.
             * **idNotation** - MDG identifier of a listing.
             * **fdsPermanentIdentifierSecurity** - FactSet Permanent Identifier on security level.
             * **fdsPermanentIdentifierListing** - FactSet Permanent Identifier on listing level.
             * **fdsPermanentIdentifierRegional** - Regional FactSet Permanent Identifier.
             * **tickerExchange** - FactSet market symbol of a listing.
             * **tickerRegion** - Regional FactSet ticker symbol.
             * **sedol** - SEDOL or IDII of a listing.
             * **isin** - ISIN of an instrument.
             * **wkn** - WKN of an instrument.
             * **valor** - Valor number of an instrument.
             * **cusip** - CUSIP or CINS identifier of an instrument
             * **symbol** - Symbol of a listing
          enum:
          - idInstrument
          - idNotation
          - fdsPermanentIdentifierSecurity
          - fdsPermanentIdentifierListing
          - fdsPermanentIdentifierRegional
          - tickerExchange
          - tickerRegion
          - sedol
          - isin
          - wkn
          - valor
          - cusip
          - symbol
          example: tickerRegion
          type: string
      required:
      - type
      - values
      type: object
    PostCompanyLogoRequest_data_size_custom:
      description: |
        Custom pixel-based size for the logo. Custom-sized logos are downscaled when possible; otherwise upscaled from the size-wise closest available logo. Regardless of the selected pixel width and height, the aspect ratio of the original logo is preserved without distortion.
      example:
        width: 25.21573561875922
        height: 124.52166747833766
      properties:
        width:
          description: Width of the logo in pixels.
          exclusiveMaximum: false
          exclusiveMinimum: false
          format: int32
          maximum: 200
          minimum: 10
          type: number
        height:
          description: Height of the logo in pixels.
          exclusiveMaximum: false
          exclusiveMinimum: false
          format: int32
          maximum: 200
          minimum: 10
          type: number
      required:
      - height
      - width
      type: object
    PostCompanyLogoRequest_data_size:
      description: Standard or custom-size for the logo. Either a predefined size
        from the available options must be selected, or a custom size in pixels must
        be provided.
      example:
        custom:
          width: 25.21573561875922
          height: 124.52166747833766
        predefined:
        - small
        - small
      properties:
        predefined:
          description: |
            Set of predefined sizes for logos. Accepted sizes are:
             * **small** - Rectangular logo maximum width of 88 pixels and maximum height of 31 pixels. Square logo 31 x 31 pixels.
             * **medium** - Small logo scaled up by 200%.
             * **large** - Small logo scaled up by 300%.
             * **vector** - Can be rendered at any size.
          items:
            enum:
            - small
            - medium
            - large
            - vector
            type: string
          nullable: false
          type: array
          uniqueItems: true
        custom:
          $ref: '#/components/schemas/PostCompanyLogoRequest_data_size_custom'
      type: object
