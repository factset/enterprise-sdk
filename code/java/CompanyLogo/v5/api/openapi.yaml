openapi: 3.0.0
info:
  contact:
    email: api@factset.com
    name: FactSet Research Systems
    url: https://developer.factset.com/contact
  description: "Consume FactSet collected company logos through an API that seamlessly\
    \ integrates with company fundamentals and estimates data\n(listed equities data\
    \ available via the stocks API), quotes, time series, and other Digital APIs.\n\
    \nThe Company Logo API provides access to logos for a global universe of listed\
    \ companies. The logos can be accessed by using national and\ninternational identifiers\
    \ like ISIN, CUSIP, WKN, Valor, etc. and are a nice feature for comprehensive\
    \ visualizations of equities\non overview pages (factsheets).\n\nLogo collection\
    \ and maintenance takes into account IPOs, M&A notifications, and further consistency\
    \ check mechanisms.\n\nThe Company Logo API seamlessly integrates with the [Stocks\
    \ API](https://developer.factset.com/api-catalog/stocks-api-digital-portals)\n\
    for equities and estimates data and the [Quotes API](https://developer.factset.com/api-catalog/real-time-quotes-api),\
    \ allowing\naccess to detailed price and performance information of listings.\
    \ The [Quotes API](https://developer.factset.com/api-catalog/real-time-quotes-api)\n\
    also supports basic security identifier cross-reference.\nFor direct access to\
    \ price histories for charting, please refer to the\n[Real-Time Time Series API](https://developer.factset.com/api-catalog/real-time-time-series-api).\n\
    \ \n"
  license:
    name: Apache License, Version 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  title: Company Logo API
  version: 5.0.0
externalDocs:
  description: API Documentation
  url: https://developer.factset.com/api-catalog/
servers:
- url: https://api.factset.com/wealth/v5
security:
- FactSetApiKey: []
- FactSetOAuth2: []
tags:
- description: Retrieve logos for companies.
  name: Company logos
paths:
  /company/logo:
    post:
      description: 'Retrieves high-quality logos for one or more publicly traded companies
        using standard identifiers (e.g., ticker symbols, ISIN). Logos are available
        in a selection of predefined sizes or can be generated on-the-fly to custom
        dimensions. The endpoint accepts up to 100 identifiers per request. Note:
        Requesting a large number of logos in a single call may result in increased
        response times.'
      operationId: postCompanyLogo
      parameters: []
      requestBody:
        content:
          application/json:
            examples:
              Single identifier with multiple predefined sizes:
                value:
                  data:
                    identifier:
                      values:
                      - FDS-US
                      type: tickerRegion
                    format: square
                    size:
                      predefined:
                      - small
                      - medium
                      - large
                      - vector
              Multiple identifiers with a predefined size vector:
                value:
                  data:
                    identifier:
                      values:
                      - NVDA-US
                      - AAPL-US
                      - MSFT-US
                      - AMZN-US
                      type: tickerRegion
                    format: rectangular
                    size:
                      predefined:
                      - vector
                    mimeType: image/svg+xml
              Single identifier and custom size:
                value:
                  data:
                    identifier:
                      values:
                      - FDS-US
                      type: tickerRegion
                    format: rectangular
                    size:
                      custom:
                        width: 150
                        height: 150
              Multiple identifiers with a predefined size:
                value:
                  data:
                    identifier:
                      values:
                      - US3030751057
                      - US67066G1040
                      type: isin
                    size:
                      predefined:
                      - large
                      - vector
                    format: rectangular
            schema:
              $ref: '#/components/schemas/PostCompanyLogoRequest'
        description: Request Body
        required: false
      responses:
        "200":
          content:
            application/json:
              examples:
