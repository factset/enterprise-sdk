openapi: 3.0.0
info:
  contact:
    email: api@factset.com
    name: FactSet Research Systems
    url: https://developer.factset.com/contact
  description: |+
    Documentation on all available end points in the Proposal Generation API

  license:
    name: Apache License, Version 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  title: Proposal Generation Engine API
  version: 0.0.1
externalDocs:
  description: API Documentation
  url: https://developer.factset.com/api-catalog/proposal-generation-api
servers:
- description: Production
  url: https://api.factset.com/analytics/engines/proposal-generation/v0
- description: Staging
  url: https://api.uat.factset.com/analytics/engines/proposal-generation/v0
security:
- FactSetApiKey: []
- FactSetOAuth2: []
tags:
- description: Ex-Post Endpoints.
  name: Ex-Post
- description: Metadata Endpoints.
  name: Lookup
paths:
  /portfolios/ex-post/stats:
    post:
      description: Notes:<br> * id 'Cash proxy' can be used in order to set cash amount
        for the portfolio
      operationId: calculateExPostStats
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExPostStats'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExPostStatsResponse'
          description: Status 200
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
          description: Bad request
      summary: calculate ex-post stats (on portfolio or holdings level)
      tags:
      - Ex-Post
      x-contentType: application/json
      x-accepts: application/json
  /portfolios/ex-post/stats/rolling:
    post:
      description: Notes:<br> * id 'Cash proxy' can be used in order to set cash amount
        for the portfolio
      operationId: calculateExPostRollingStats
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExPostStatsRolling'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExPostStatsRollingResponse'
          description: Status 200
        "501":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
          description: Server is unable to process your request
      summary: calculate rolling stats (for ex-post data)
      tags:
      - Ex-Post
      x-contentType: application/json
      x-accepts: application/json
  /portfolios/ex-post/stats/correlations:
    post:
      description: Notes:<br> * id 'Cash proxy' can be used in order to set cash amount
        for the portfolio
      operationId: calculateExPostCorrelationsStats
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExPostStatsCorrelations'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExPostStatsCorrelationsResponse'
          description: Status 200
        "501":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
          description: Server is unable to process your request
      summary: calculate portfolio vs benchmark correlation and correlation between
        portfolio holdings
      tags:
      - Ex-Post
      x-contentType: application/json
      x-accepts: application/json
  /portfolios/ex-post/stats/factor-exposure:
    post:
      description: Ex-Post factor-exposure Stats
      operationId: calculateExPostFactorExposureStats
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExPostStatsFactorExposure'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExPostStatsFactorExposureResponse'
          description: Status 200
        "501":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
          description: Server is unable to process your request
      summary: Create portfolio and return risk factor contribution
      tags:
      - Ex-Post
      x-contentType: application/json
      x-accepts: application/json
  /portfolios/ex-post/series:
    post:
      description: Notes:<br> * id 'Cash proxy' can be used in order to set cash amount
        for the portfolio
      operationId: calculateExPostSeries
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExPostSeries'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExPostSeriesResponse'
          description: Successful request
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
          description: Bad request
      summary: retrieve portfolio and benchmark data series, generated from the underlying
        holdings data series
      tags:
      - Ex-Post
      x-contentType: application/json
      x-accepts: application/json
  /portfolios/ex-post/series/rolling:
    post:
      description: Notes:<br> * id 'Cash proxy' can be used in order to set cash amount
        for the portfolio
      operationId: calculateExPostRollingSeries
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExPostSeriesRolling'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExPostSeriesRollingResponse'
          description: Status 200
        "501":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
          description: Server is unable to process your request
      summary: retrieve series of rolling stats for the portfolio
      tags:
      - Ex-Post
      x-contentType: application/json
      x-accepts: application/json
  /securities:
    get:
      description: search for securities within the security universe for the user/client
      operationId: getSecurities
      parameters:
      - description: search by (part of) security name
        example: Amazon
        explode: true
        in: query
        name: name
        required: false
        schema:
          type: string
        style: form
      - description: search by security identifier (e.g. cusip or tradingSymbol).
        example: AMZN
        explode: true
        in: query
        name: identifier
        required: false
        schema:
          type: string
        style: form
      - description: search only within valid securities for the specified asOfDate.
          The value should be in YYYY-MM-DD format. A special wildcard value 'latestMonthEnd'
          is supported as well
        example: latestMonthEnd
        explode: true
        in: query
        name: asOfDate
        required: false
        schema:
          type: string
        style: form
      - description: specify list of UDFs to retrieve for every security in the result
        example: maxFrontLoad,assetAllocation
        explode: true
        in: query
        name: udfs
        required: false
        schema:
          type: string
        style: form
      - description: Specifies the starting index for pagination.
        example: 500
        explode: true
        in: query
        name: _paginationOffset
        required: false
        schema:
          type: integer
        style: form
      - description: Specifies the maximum number of results to return
        explode: true
        in: query
        name: _paginationLimit
        required: false
        schema:
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedSecurities'
          description: List of investments
      tags:
      - Lookup
      x-accepts: application/json
components:
  schemas:
    Errors:
      properties:
        errors:
          items:
            $ref: '#/components/schemas/Error'
          type: array
      type: object
    Error:
      properties:
        id:
          type: string
        title:
          description: This general error structure is used throughout this API.
          example: 'Bad query parameter [size]: Invalid integer value [abc]'
          type: string
        code:
          type: string
      required:
      - code
      - id
      - title
      type: object
    ExPostStats:
      example:
        data: {}
      properties:
        data:
          $ref: '#/components/schemas/ExPostStats_data'
      required:
      - data
      type: object
    ExPostStatsResponse:
      example:
        data:
          holdings:
          - null
          - null
          errors:
          - errors
          - errors
        meta: {}
      properties:
        data:
          $ref: '#/components/schemas/ExPostStatsResponseData'
        meta:
          $ref: '#/components/schemas/ExPostStatsResponse_meta'
      type: object
    ExPostSeries:
      example:
