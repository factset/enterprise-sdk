        data: {}
      properties:
        data:
          $ref: '#/components/schemas/ExPostSeriesRolling_data'
      required:
      - data
      type: object
    ExPostSeriesRollingResponse:
      example:
        data: {}
        meta: {}
      properties:
        data:
          $ref: '#/components/schemas/ExPostSeriesRollingResponse_data'
        meta:
          $ref: '#/components/schemas/ExPostSeriesRollingResponse_meta'
      required:
      - data
      type: object
    Entity:
      properties:
        id:
          description: unique id of the entity
          example: sample_ID
          type: string
      type: object
    PortfolioEntity:
      properties:
        id:
          description: unique id of the entity
          example: sample_ID
          type: string
        details:
          $ref: '#/components/schemas/PortfolioEntity_details'
      type: object
    PortfolioWithRollingStats:
      allOf:
      - $ref: '#/components/schemas/PortfolioEntity'
      - $ref: '#/components/schemas/PortfolioWithRollingStats_allOf'
    PortfolioWithRollingSeries:
      allOf:
      - $ref: '#/components/schemas/PortfolioEntity'
      - $ref: '#/components/schemas/PortfolioWithRollingSeries_allOf'
    Portfolio:
      allOf:
      - $ref: '#/components/schemas/PortfolioEntity'
      - $ref: '#/components/schemas/Portfolio_allOf'
    ExPostPortfolio:
      allOf:
      - $ref: '#/components/schemas/Portfolio'
      - $ref: '#/components/schemas/ExPostPortfolio_allOf'
    TransactionRule:
      properties:
        type:
          enum:
          - fee
          - contribution
          - withrawal
          type: string
        amount:
          description: absolute value in case the type is cash or percentage in the
            other 2 cases
          type: number
        amountType:
          enum:
          - cash
          - percentagePV
          - percentagePVGrowth
          type: string
        amountGrowth:
          description: apply growth rate to the amount for each period expressed in
            percentage
          type: number
        amountGrowthType:
          enum:
          - absolute
          - percentage
          type: string
        amountGrowthFrequency:
          enum:
          - 1
          - 2
          - 4
          - 6
          - 12
          type: integer
        allowPartialAmount:
          default: false
          type: boolean
        startDate:
          description: initial date when the rule is applied
          format: date
          type: string
        endDate:
          description: last date when the rule is applied
          format: date
          type: string
        frequency:
          description: monthly - 12, yearly - 1, quarterly - 4; only once = endPeriod
            should be equal to startPeriod
          type: number
        frequencyAlignment:
          enum:
          - 1
          - 2
          - 4
          - 6
          - 12
          type: number
      type: object
    PortfolioInvestment:
      properties:
        id:
          description: the unique id of the investment - e.g. FactSet id
          type: string
        weight:
          description: the weight of the investment in hte portfolio
          example: 1
          type: number
      required:
      - id
      - weight
      type: object
    ExPostPortfolioInvestment:
      allOf:
      - $ref: '#/components/schemas/PortfolioInvestment'
      - $ref: '#/components/schemas/ExPostPortfolioInvestment_allOf'
    ExPostPortfolioInvestmentResponse:
      allOf:
      - $ref: '#/components/schemas/ExPostPortfolioInvestment'
      - $ref: '#/components/schemas/ExPostPortfolioInvestmentResponse_allOf'
    BackfillData:
      properties:
        backfilled:
          type: boolean
        realData:
          type: integer
        backfilledData:
          type: integer
      type: object
    ExPostPortfolioInvestmentSeriesResponse:
      allOf:
      - $ref: '#/components/schemas/ExPostPortfolioInvestment'
      - $ref: '#/components/schemas/ExPostPortfolioInvestmentSeriesResponse_allOf'
    Investment:
      allOf:
      - $ref: '#/components/schemas/Entity'
      - $ref: '#/components/schemas/Investment_allOf'
    Rebalancing:
      properties:
        frequency:
          example: 12
          type: number
        frequencyAlignment:
          enum:
          - start
          - calendar
          type: string
        rebalanceAtStart:
          type: boolean
      type: object
    BaseSettings:
      properties:
        asOfDate:
          description: The as-of date for the analysis. The value should be in YYYY-MM-DD
            format. A special wildcard value 'latestMonthEnd' is supported as well.
            The as-of date should be among the set of preconfigured as-of dates for
            the user/client
          type: string
        returnsPreferences:
          description: 'code of preconfigured analysis settings<br> Note: the setup
            of these settings is done by PGE administrator'
          type: string
        validatePortfolio:
          default: false
          description: a flag controlling whether to perform validations on the portfolio
            and its holdings (e.g. whether they have valid historical data). If set
            to false it is possible that call might not return user-friendly error
            message, however the call will be faster
          type: boolean
      type: object
    Level:
      properties:
        levels:
          example:
          - portfolio
          - holdings
          items:
            default: portfolio
            description: This setting controls on what level(s) the stats, specified
              via 'stats', 'series' and 'udfs' parameter will be returned.<br> Accepted
              values are:<br>  * portfolio - stats for the portfolio will be returned
              if specified<br> * holdings - stats for all holdings in the portfolio
              will be returned if specified<br> * a comma-separated list of the values,
              specified above
            type: string
          type: array
      type: object
    Settings:
      allOf:
      - $ref: '#/components/schemas/BaseSettings'
      - $ref: '#/components/schemas/Level'
      - $ref: '#/components/schemas/Settings_allOf'
    TimeWindow:
      properties:
        timeWindows:
          example:
          - ytd
          - "12"
          - "36"
          - "60"
          - "120"
          - lifetime
          items:
            description: time window(s) for the analysis - a comma-spearated list
              of  periods (representated as number of months or the special values
              'ytd' and 'lifetime')
            type: string
          type: array
      type: object
    Periods:
      properties:
        periods:
          items:
            $ref: '#/components/schemas/Period'
          type: array
      type: object
    Period:
      description: several periods for the analysis can be specified - one for each
        period to be analyzed. When a period parameter is provided in the request,
        the API will 'cut' the returns for the period from the returns for the time
        window, specified in timeWindow parameter if provided, or from the lifetime
        returns, if no timeWindow parameter is provided
      properties:
        startDate:
          example: 2017-01-03
          type: string
        endDate:
          example: 2017-05-31
          type: string
      type: object
    ExPostSettings:
      allOf:
      - $ref: '#/components/schemas/Settings'
      - $ref: '#/components/schemas/TimeWindow'
      - $ref: '#/components/schemas/Periods'
      - $ref: '#/components/schemas/ExPostSettings_allOf'
    Stats:
      properties:
        stats:
          example:
          - cumReturn
          - annReturn
          - stDev
          - annStDev
          - alpha
          - beta
          - upCapture
          - downCapture
          - maxDrawdown
          items:
            enum:
            - annReturn
            - cumReturn
            - meanReturn
            - etr
            - stDev
            - annStDev
            - annLossStd
            - annStDev100
            - etl
            - skewness
            - excessKurtosis
            - var
            - positiveReturnsRatio
            - sharpe
            - sharpeExcessReturn
            - starr
            - sortino
            - sortinoExcessReturn
            - alpha
            - alphaExcessReturn
            - beta
            - betaExcessReturn
            - upCapture
            - upCaptureMStar
            - downCapture
            - downCaptureMstar
            - rsquare
            - rsquareExcessReturn
            - trackingError
            - annTrackingError
            - informationRatioAnnArithmeticExcessReturn
            - battingAverage
            - correlationMatrix
            - boxplotSummary
            - boxplotOutliers
            - maxDrawdown
            - maxDrawdownPV
            - maxDrawdownDate
            - maxDrawdownStart
            - maxDrawdownEnd
            - maxDrawdownPeriods
            - longestDrawdownStart
            - longestDrawdownEnd
            - topDrawdowns
            - annComponentReturnAttribution
            - annPercentageReturnAttribution
            - annComponentStDevAttribution
            - annPercentageStDevAttribution
            - contributionTransactions
            - withdrawalTransactions
            - feeTransactions
            type: string
          type: array
      type: object
    ExPostStatsSettings:
      allOf:
      - $ref: '#/components/schemas/ExPostSettings'
      - $ref: '#/components/schemas/Stats'
      - $ref: '#/components/schemas/ExPostStatsSettings_allOf'
    ExPostSeriesSettings:
      allOf:
      - $ref: '#/components/schemas/ExPostSettings'
      - $ref: '#/components/schemas/ExPostSeriesSettings_allOf'
    ExPostRollingSettings:
      allOf:
      - $ref: '#/components/schemas/BaseSettings'
      - $ref: '#/components/schemas/TimeWindow'
      - $ref: '#/components/schemas/ExPostRollingSettings_allOf'
    ExPostStatsRollingSettings:
      allOf:
      - $ref: '#/components/schemas/ExPostRollingSettings'
      - $ref: '#/components/schemas/ExPostStatsRollingSettings_allOf'
    ExPostStatsCorrelationsSettings:
      allOf:
      - $ref: '#/components/schemas/BaseSettings'
      - $ref: '#/components/schemas/TimeWindow'
      - $ref: '#/components/schemas/ExPostStatsCorrelationsSettings_allOf'
    ExPostStatsFactorExposureSettings:
      allOf:
      - $ref: '#/components/schemas/BaseSettings'
      - $ref: '#/components/schemas/TimeWindow'
      - $ref: '#/components/schemas/ExPostStatsFactorExposureSettings_allOf'
    ExPostSeriesRollingSettings:
      allOf:
      - $ref: '#/components/schemas/ExPostRollingSettings'
      - $ref: '#/components/schemas/Periods'
    ExPostStatsResponseData:
      example:
        holdings:
        - null
        - null
        errors:
        - errors
        - errors
      properties:
        portfolio:
          $ref: '#/components/schemas/PortfolioWithExPostStats'
        holdings:
          items:
            $ref: '#/components/schemas/ExPostPortfolioInvestmentResponse'
          type: array
        errors:
          description: information for problems, which prevented stats for certain
            holdings or time windows to be calculated
          items:
            type: string
          type: array
      type: object
    PortfolioWithExPostStats:
      allOf:
      - $ref: '#/components/schemas/PortfolioEntity'
      - $ref: '#/components/schemas/PortfolioWithExPostStats_allOf'
    ExPostSeriesResponseData:
      example:
        holdings:
        - null
        - null
        errors:
        - errors
        - errors
      properties:
        portfolio:
          $ref: '#/components/schemas/PortfolioWithExPostSeries'
        holdings:
          items:
            $ref: '#/components/schemas/ExPostPortfolioInvestmentSeriesResponse'
          type: array
        errors:
          description: information for problems, which prevented series for certain
            holdings or time windows to be calculated
          items:
            type: string
          type: array
      type: object
    PortfolioWithExPostSeries:
      allOf:
      - $ref: '#/components/schemas/PortfolioEntity'
      - $ref: '#/components/schemas/PortfolioWithExPostSeries_allOf'
    DatedNodeStats:
      example:
        timeWindow:
          key:
          - exposures:
            - exposure: 6.027456183070403
              name: name
              id: id
              rsquare: 1.4658129805029452
              group: group
              factors:
