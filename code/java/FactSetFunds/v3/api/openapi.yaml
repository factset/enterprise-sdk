  /returns:
    get:
      description: 'Get Fund NAV Returns over a time-series for the requested date
        range and frequency. <p>The simple Total Return NAV shows the fund''s total
        return level by reinvesting distributions so that ex-date NAVs are increased
        by the distribution amount and compounded thereafter. Total return NAV compounds
        daily and is calculated from the first available NAV date of each fund. The
        total return NAV series reflects the value that an investor would own if it
        had purchased one share at the inception date and reinvested all dividends
        on a Gross basis.</p><p> Control the dividends to include or exclude using
        the `dividendAdjust` parameter. The first available NAV date of each fund
        can be found in the /summary endpoint as `priceFirstDate`. Visit [OA #21437](https://my.apps.factset.com/oa/pages/21437)
        for more details.</p>'
      operationId: getFundsReturns
      parameters:
      - description: The requested fund identifier. FactSet Identifiers, tickers,
          CUSIP, SEDOL, and ISIN are accepted inputs. <p>***IDs limit** =  200 per
          request*</p> *<p>Make note, GET Method URL request lines are also limited
          to a total length of 8192 bytes (8KB). In cases where the service allows
          for thousands of IDs, which may lead to exceeding this request line limit
          of 8KB, its advised for any requests with large request lines to be requested
          through the respective "POST" method.</p>*
        examples:
          oneId:
            summary: One Market Identifier
            value:
            - MABAX-US
          multipleIds:
            summary: Multiple Market Identifiers
            value:
            - MABAX-US
            - SPY-US
        explode: false
        in: query
        name: ids
        required: true
        schema:
          items:
            type: string
          maxItems: 200
          minItems: 1
          type: array
        style: form
      - description: The start date requested for a given date range in YYYY-MM-DD
          format. If left blank, the API will default to previous close.Future dates
          (T+1) are not accepted in this endpoint.
        example: 2025-01-01
        explode: true
        in: query
        name: startDate
        required: false
        schema:
          $ref: '#/components/schemas/StartDate'
        style: form
      - description: The end date requested for a given date range in YYYY-MM-DD format.
          If left blank, the API will default to previous close.Future dates (T+1)
          are not accepted in this endpoint
        example: 2025-12-31
        explode: true
        in: query
        name: endDate
        required: false
        schema:
