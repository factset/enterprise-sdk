      - description: The end date requested for a given date range in YYYY-MM-DD format.
          If left blank, the API will default to previous close.Future dates (T+1)
          are not accepted in this endpoint
        example: 2025-12-31
        explode: true
        in: query
        name: endDate
        required: false
        schema:
          $ref: '#/components/schemas/EndDate'
        style: form
      - description: "Controls the display frequency of the data returned. The supported\
          \ frequencies are:\n  \n- **D**: Daily\n- **W**: Weekly, based on the last\
          \ day of the week of the start date.\n- **M**: Monthly, based on the last\
          \ trading day of the month.\n- **AM**: Monthly, based on the start date\
          \ (e.g., if the start date is June 16, data is displayed for June 16, May\
          \ 16, April 16, etc.).\n- **CQ**: Quarterly, based on the last trading day\
          \ of the calendar quarter (March, June, September, or December).\n- **FQ**:\
          \ Fiscal Quarter of the company.\n- **AY**: Actual Annual, based on the\
          \ start date.\n- **CY**: Calendar Annual, based on the last trading day\
          \ of the calendar year.\n- **FY**: Fiscal Annual, based on the last trading\
          \ day of the company's fiscal year.\n"
        example: M
        explode: true
        in: query
        name: frequency
        required: false
        schema:
          $ref: '#/components/schemas/Frequency'
        style: form
      - description: The maximum number of records to return. The default is 20.
        explode: true
        in: query
        name: _paginationLimit
        required: false
        schema:
          default: 20
          example: 100
          format: int32
          maximum: 500
          minimum: 1
          type: integer
        style: form
      - description: The number of records to skip before the first record to return.
          The default is 0.
        explode: true
        in: query
        name: _paginationOffset
        required: false
        schema:
          default: 0
          example: 0
          format: int32
          maximum: 2147483147
          minimum: 0
          type: integer
        style: form
      responses:
