          title: The requested data could not be found
          detail: The requested data could not be found. Please review the request
            and try again.
    unauthenticated:
      description: This occurs when a user is not properly authenticated or recognized
        by the service. Please double check the USERNAME-SERIAL and API-Key used to
        request and ensure you are within the IP range specified for the Key. Report
        Issue under 401 error for help with troubleshooting.
      summary: User Authentication Failed
      value:
        errors:
        - id: adb01824-252f-4420-b0c6
          code: Bad Request
          title: Authentication Failed
          detail: User Authentication Failed.
    forbidden:
      description: The USERNAME-SERIAL attempted to request the endpoint is not authorized
        to access. The request was a legal request, but the server is refusing to
        respond. Please reach out to FactSet Account Team for assistance with authorization.
      summary: Forbidden
      value:
        errors:
        - id: adb01824-252f-4420-b0c6
          code: Forbidden
          title: Authentication Failed
          detail: USERNAME-SERIAL does not have permission to use /factset-funds /v1/{endpoint}
    notFound:
      description: The requested endpoint could not be found.
      summary: Not Found
      value:
        errors:
        - id: adb01824-252f-4420-b0c6
          code: Not Found
          title: No endpoint found
          detail: The requested endpoint could not be found.
    dataNotFound:
      description: The requested data could not be found.
      summary: Data Not Found
      value:
        errors:
        - id: adb01824-252f-4420-b0c6
          code: Not Found
          title: data not found
          detail: The requested data could not be found.
    unsupportedMediaType:
      description: This bad request occurs when the media type passed in the request
        is not supported. Currently the APIs only support 'application/json'.
      summary: Unsupported Media Type
      value:
        errors:
        - id: adb01824-252f-4420-b0c6
          code: Unsupported Media Type
          title: No endpoint found
          detail: text/html media type is not supported. Supported media types are
            application/json
    unprocessableEntity:
      description: This bad request occurs when the requested fields doesnt pass the
        validation checks.
      summary: Invalid request parameters
      value:
        errors:
        - code: ValidationError
          title: Invalid Parameter
          id: aac34dc2-eca4-4773-9878-6eacfa62e666
          detail: The parameter 'ids' should be valid and may not be empty.
    notWritable:
      description: This error may be returned when the server encounters an error
        writing the JSON response.
      summary: Internal Server Error - Not Writable
      value:
        errors:
        - id: adb01824-252f-4420-b0c6
          code: Internal Server Error
          title: Not Writable
          detail: Error writing JSON output
    generalException:
      description: This is the most general error that can be returned to by the service.
        Please `Report Issue` to FactSet.
      summary: Internal Server Error - General Exception
      value:
        errors:
        - id: adb01824-252f-4420-b0c6
          code: Internal Server Error
          title: Not Writable
          detail: unexpected error
  parameters:
    ids:
      description: The requested fund identifier. FactSet Identifiers, tickers, CUSIP,
        SEDOL, and ISIN are accepted inputs. <p>***IDs limit** =  200 per request*</p>
        *<p>Make note, GET Method URL request lines are also limited to a total length
        of 8192 bytes (8KB). In cases where the service allows for thousands of IDs,
        which may lead to exceeding this request line limit of 8KB, its advised for
        any requests with large request lines to be requested through the respective
        "POST" method.</p>*
      examples:
        oneId:
          summary: One Market Identifier
          value:
          - MABAX-US
        multipleIds:
          summary: Multiple Market Identifiers
          value:
          - MABAX-US
          - SPY-US
      explode: false
      in: query
      name: ids
      required: true
      schema:
        items:
          type: string
        maxItems: 200
        minItems: 1
        type: array
      style: form
    paginationLimit:
      description: The maximum number of records to return. The default is 20.
      explode: true
      in: query
      name: _paginationLimit
      required: false
      schema:
        default: 20
        example: 100
        format: int32
        maximum: 500
        minimum: 1
        type: integer
      style: form
    paginationOffset:
      description: The number of records to skip before the first record to return.
        The default is 0.
      explode: true
      in: query
      name: _paginationOffset
      required: false
      schema:
        default: 0
        example: 0
        format: int32
        maximum: 2147483147
        minimum: 0
        type: integer
      style: form
    lang:
      description: Language to be returned for Description, Insight (Overview), and
        Objective attributes, where available. Currently French will be returned for
        U.S. funds when "FR" is passed.
      example: EN
      explode: true
      in: query
      name: lang
      required: false
      schema:
        $ref: '#/components/schemas/Lang'
      style: form
    startDate:
      description: The start date requested for a given date range in YYYY-MM-DD format.
        If left blank, the API will default to previous close.Future dates (T+1) are
        not accepted in this endpoint.
      example: 2025-01-01
      explode: true
      in: query
      name: startDate
      required: false
      schema:
        $ref: '#/components/schemas/StartDate'
      style: form
    endDate:
      description: The end date requested for a given date range in YYYY-MM-DD format.
        If left blank, the API will default to previous close.Future dates (T+1) are
        not accepted in this endpoint
      example: 2025-12-31
      explode: true
      in: query
      name: endDate
      required: false
      schema:
        $ref: '#/components/schemas/EndDate'
      style: form
    frequency:
      description: "Controls the display frequency of the data returned. The supported\
        \ frequencies are:\n  \n- **D**: Daily\n- **W**: Weekly, based on the last\
        \ day of the week of the start date.\n- **M**: Monthly, based on the last\
        \ trading day of the month.\n- **AM**: Monthly, based on the start date (e.g.,\
        \ if the start date is June 16, data is displayed for June 16, May 16, April\
        \ 16, etc.).\n- **CQ**: Quarterly, based on the last trading day of the calendar\
        \ quarter (March, June, September, or December).\n- **FQ**: Fiscal Quarter\
        \ of the company.\n- **AY**: Actual Annual, based on the start date.\n- **CY**:\
        \ Calendar Annual, based on the last trading day of the calendar year.\n-\
        \ **FY**: Fiscal Annual, based on the last trading day of the company's fiscal\
        \ year.\n"
      example: M
      explode: true
      in: query
      name: frequency
      required: false
      schema:
        $ref: '#/components/schemas/Frequency'
      style: form
    currency:
      description: The ISO3 currency control for the requested fund. For a list of
        currency ISO codes, visit Online Assistant Page [OA1470](https://my.apps.factset.com/oa/pages/1470)
      example: USD
      explode: true
      in: query
      name: currency
      required: false
      schema:
        $ref: '#/components/schemas/Currency'
      style: form
    dataType:
      description: The Data Type of the NAV expressed as Raw or Rolled values.
      example: ROLL
      explode: true
      in: query
      name: dataType
      required: false
      schema:
        $ref: '#/components/schemas/NavDataType'
      style: form
    splitAdjust:
      description: "Controls the split adjustment of the Fund's NAV - \n  * **SPLIT**\
        \ = Split ONLY Adjusted. This is used by default.\n  * **UNSPLIT** = No Adjustments,\
        \ Controls the split and dividend adjustments for the prices.\n"
      example: SPLIT
      explode: true
      in: query
      name: splitAdjust
      required: false
      schema:
        $ref: '#/components/schemas/SplitAdjust'
      style: form
    dividendAdjust:
      description: |
        Controls the dividend inclusion for the NAV returns calculations -
          * **DIV** = Include Dividends, Total Return
          * **NO_DIV** = Exclude Dividends, Simple Return
      example: DIV
      explode: true
      in: query
      name: dividendAdjust
      required: false
      schema:
        $ref: '#/components/schemas/DividendAdjust'
      style: form
    date:
      description: The date for costs and fees in YYYY-MM-DD format. Future dates
        (T+1) are not accepted in this endpoint.
      example: 2025-01-01
      explode: true
      in: query
      name: date
      required: false
      schema:
        $ref: '#/components/schemas/DateSchema'
      style: form
    frequencyAum:
      description: |-
        Controls the display frequency of the data returned. Supported values are:
        - **MTD**: Month-To-Date
        - **M**: Monthly, based on the last trading day of the month
        - **CQTD**: Calendar Quarter-to-Date
        - **CQ**: Calendar Quarterly
        - **CYTD**: Calendar Year-to-Date
        - **CY**: Calendar Yearly
      example: M
      explode: true
      in: query
      name: frequency
      required: false
      schema:
        $ref: '#/components/schemas/FrequencyAum'
      style: form
    dateSnapshot:
      description: The date for snapshot data in YYYY-MM-DD format.
      example: 2025-01-01
      explode: true
      in: query
      name: date
      required: false
      schema:
        $ref: '#/components/schemas/DateSnapshot'
      style: form
    keyItemsType:
      description: The Key Items type report.
      explode: true
      in: query
      name: keyItemsType
      required: false
      schema:
        $ref: '#/components/schemas/KeyItemsType'
      style: form
    contentSets:
      description: The content sets from which the fields are requested.
      explode: true
      in: query
      name: contentSets
      required: true
      schema:
        items:
          type: string
        maxItems: 10
        minItems: 1
        type: array
      style: form
    structureType:
      description: |
        Returns the type of data items requested, such as classification details, similar funds, segment (benchmark) details,
        or structure information (funds structure and advisor details).

        * **CLASSIFICATION**: Categorizes funds using a rules-based system that is derived from seven core classifications. This system evaluates the asset class, economic development level, and geographical region as described in each fund's prospectus and marketing materials. Fund exposure details are presented on successively granular levels- category, then focus, and then niche

        * **SIMILAR_FUNDS**: Returns the similar fund share classes
        * **SEGMENTS**: Returns the Fund's Benchmark and Segment Benchmark information.
        * **FUND_STRUCTURE**: Returns fund structure and advisor information
      explode: true
      in: query
      name: structureType
      required: false
      schema:
        $ref: '#/components/schemas/StructureType'
      style: form
    taxItemsType:
      description: Returns type of tax and risk information.
      explode: true
      in: query
      name: taxItemsType
      required: false
      schema:
        $ref: '#/components/schemas/TaxItemsType'
      style: form
    riskType:
      description: Type of risk analytics to return.
      explode: true
      in: query
      name: riskType
      required: false
      schema:
        $ref: '#/components/schemas/RiskType'
      style: form
    analyticsType:
      description: |
        Type of portfolio analytics data items to be returned.

        * **ASSETALLOCATION**: Returns the asset types weights in the fund's portfolio.
        * **SECTOR_WEIGHTAGE**: Returns the weighted average percent of revenue derived from multiple industries for a universe of companies. Data is available for L1(Economy) level of the RBICS Classification. For more details, visit [Online Assistant Page
          #20710](https://oa.apps.factset.com/pages/20710)
        * **GEOGRAPHIC_REVENUE**: Returns an aggregated percent of revenue derived based on super region for a universe of companies. For more details, visit [Online Assistant Page
          #17555](https://oa.apps.factset.com/pages/17555)
        * **MARKET_CAPITALIZATION**: Returns the percentage of the aggregate that is composed of large-cap, mid-cap, small-cap and micro-cap holdings
      explode: true
      in: query
      name: analyticsType
      required: false
      schema:
        $ref: '#/components/schemas/AnalyticsType'
      style: form
    distributionType:
      description: Selects whether to return current or historical distributions.
      explode: true
      in: query
      name: distributionType
      required: false
      schema:
        $ref: '#/components/schemas/DistributionType'
      style: form
  responses:
    "400":
      content:
        application/json:
          examples:
            Bad Request - Date Format:
              $ref: '#/components/examples/badRequestDateFormat'
            Bad Request - Missing Required Parameter:
              $ref: '#/components/examples/badRequestRequiredParameter'
            Bad Request - Future Date:
              $ref: '#/components/examples/badRequestFutureDate'
            Bad Request - Invalid Parameter:
              $ref: '#/components/examples/badRequestInvalidParameters'
            Bad Request - Malformed JSON:
              $ref: '#/components/examples/badRequestMalformedJSON'
            Bad Request - Read Timeout:
              $ref: '#/components/examples/badRequestReadTimeout'
          schema:
            $ref: '#/components/schemas/ErrorResponse'
      description: Bad Request. This can occur for several reasons. Please review
        the "message" for more details.
    "401":
      content:
        application/json:
          examples:
            User Authentication - Failed:
              $ref: '#/components/examples/unauthenticated'
          schema:
            $ref: '#/components/schemas/ErrorResponse'
      description: Unauthenticated USERNAME-SERIAL. Ensure you are logged in and have
        successfully generated an API KEY for the IP range you are connecting from.
        For more help, select the **Report Issue** in the top right corner of this
        Developer Portal specification card and choose Connectivity 401 or 403 Responses.
    "403":
      content:
        application/json:
          examples:
            Forbidden:
              $ref: '#/components/examples/forbidden'
          schema:
            $ref: '#/components/schemas/ErrorResponse'
      description: The USERNAME-SERIAL attempted to request the endpoint is not authorized
        to access. The request was a legal request, but the server is refusing to
        respond. Please reach out to FactSet Account Team for assistance with authorization.
    "404":
      content:
        application/json:
          examples:
            Bad Request - Endpoint Not Found:
              $ref: '#/components/examples/notFound'
            Bad Request - Data Not Found:
              $ref: '#/components/examples/dataNotFound'
          schema:
            $ref: '#/components/schemas/ErrorResponse'
      description: The requested resource was not found.
    "415":
      content:
        application/json:
          examples:
            Unsupported Media Type:
              $ref: '#/components/examples/unsupportedMediaType'
          schema:
            $ref: '#/components/schemas/ErrorResponse'
      description: Unsupported Media Type. This error may be returned when the caller
        sends a resource in a format that is not accepted by the server. This can
        be fixed by ensuring that Content-Type header is set to the correct value.
        In this instance, "application/json" would be the appropriate value.
    "422":
      content:
        application/json:
          examples:
            Validation Error:
              $ref: '#/components/examples/unprocessableEntity'
          schema:
            $ref: '#/components/schemas/ErrorResponse'
      description: |
        Unprocessable Entity. Your request data was syntactically correct but semantically invalid.
        Check the required parameters and their value constraints.
    "500":
      content:
        application/json:
          examples:
            Internal Server Error - Not Writable:
              $ref: '#/components/examples/notWritable'
            Internal Server Error - General Exception:
              $ref: '#/components/examples/generalException'
          schema:
            $ref: '#/components/schemas/ErrorResponse'
      description: Internal Server Error.
  schemas:
    IdentifierResponseFields:
      additionalProperties: true
      description: Reusable component containing standard identifier fields (`fsymId`
        and `requestId`) used in response objects
      properties:
        fsymId:
          description: FactSet Security Identifier. Six alpha-numeric characters,
            excluding vowels, with a -S suffix (XXXXXX-S), resolved from the `requestId`
            of the Fund requested.
          example: FNK7XP-S
          nullable: true
          type: string
        requestId:
          description: The requested Id sent as input.
          example: MABAX
          type: string
      title: Common Identifier Response Fields
      type: object
    DateResponseField:
      additionalProperties: true
      description: Reusable component for date field in time-series response objects
      properties:
        date:
          description: The date in YYYY-MM-DD format.
          example: 2025-02-26
          format: date
          nullable: true
          type: string
      title: Date Response Field Component
      type: object
    CurrencyResponseField:
      additionalProperties: true
      description: Reusable component for currency field in response objects
      properties:
        currency:
          description: ISO3 Currency. For a list of currency ISO codes, visit Online
            Assistant Page [OA1470](https://my.apps.factset.com/oa/pages/1470)'
          example: USD
          nullable: true
          type: string
      title: Currency Response Field Component
      type: object
    SummariesRequest:
      description: Summaries Request
      example:
        data:
          ids:
          - MABAX
          - SPY
          lang: EN
      properties:
        data:
          $ref: '#/components/schemas/SummariesRequest_data'
      required:
      - data
      title: Summaries Request
      type: object
    SummariesResponse:
      description: Response containing an array of fund summary objects
      example:
        data:
        - null
        - null
      properties:
        data:
          description: Array of Summaries Objects
          items:
            $ref: '#/components/schemas/Summaries'
          type: array
      title: Summaries Response
      type: object
    Summaries:
      allOf:
      - $ref: '#/components/schemas/IdentifierResponseFields'
      - $ref: '#/components/schemas/Summaries_allOf'
      description: Comprehensive summary information for a fund including identifiers,
        status, names, descriptions, and key attributes
      title: Funds Summary Object
    Managers:
      description: Information about fund managers including name, title, contact
        details, and tenure
      properties:
        name:
          description: Proper Name of the Fund Manager
          example: Mr. Antonio DeSpirito III
          nullable: true
          type: string
        title:
          description: Proper Title of the Fund Manager
          example: Managing Director
          nullable: true
          type: string
        phone:
          description: Phone Number of the Fund Manager
          example: 1.212.810.5300
          nullable: true
          type: string
        inceptionDate:
          description: Inception Date of the Fund Manager
          example: 2014-01-01
          format: date
          nullable: true
          type: string
        jobId:
          description: Job Identifier for the Fund Manager
          example: 6721381
          nullable: true
          type: integer
      title: Managers Object
      type: object
    TaxExposure:
      allOf:
      - $ref: '#/components/schemas/IdentifierResponseFields'
      - $ref: '#/components/schemas/TaxExposure_allOf'
      description: Tax-related information including capital gains distributions,
        tax rates, and K1 distribution details
      title: Tax Exposure
      type: object
    RegulationsTaxDetails:
      allOf:
      - $ref: '#/components/schemas/IdentifierResponseFields'
      - $ref: '#/components/schemas/RegulationsTaxDetails_allOf'
      description: Regulatory compliance details including UCITS, SFDR classification,
        UK SDR, tax reporting status, and availability by country
      title: Regulation Tax Detail
      type: object
    ScoringRequest:
      description: Scoring Request
      example:
        data:
          endDate: 2025-12-31T00:00:00.000+0000
          ids:
          - MABAX
          - SPY
          startDate: 2025-01-01T00:00:00.000+0000
          frequency: M
        meta:
          pagination:
            offset: 0
            limit: 100
      properties:
        data:
          $ref: '#/components/schemas/ScoringRequest_data'
        meta:
          $ref: '#/components/schemas/MetaRequest'
      required:
      - data
      title: Scoring Request
      type: object
    ScoringResponse:
      description: Response containing an array of fund scoring and grading information
      example:
        data:
        - null
        - null
        meta:
          pagination:
            total: 0
            isEstimatedTotal: true
      properties:
        data:
          description: Array of Scoring Objects
          items:
            $ref: '#/components/schemas/Scoring'
          type: array
        meta:
          $ref: '#/components/schemas/SearchMeta'
      title: Scoring
      type: object
    Scoring:
      allOf:
      - $ref: '#/components/schemas/IdentifierResponseFields'
      - $ref: '#/components/schemas/Scoring_allOf'
      description: Fund scoring metrics including analyst picks, fund grades, fit
        scores, efficiency, and tradability ratings
      title: Scoring Details
    PortfolioStatisticsRequest:
      description: Portfolio Statistics Request
      example:
        data:
          endDate: 2025-12-31T00:00:00.000+0000
          ids:
          - MABAX
          - SPY
          startDate: 2025-01-01T00:00:00.000+0000
          frequency: M
        meta:
          pagination:
            offset: 0
            limit: 100
      properties:
        data:
          $ref: '#/components/schemas/PortfolioStatisticsRequest_data'
        meta:
          $ref: '#/components/schemas/MetaRequest'
      required:
      - data
      title: Portfolio Statistics Request
      type: object
    PortfolioStatisticsResponse:
      description: Response containing an array of portfolio statistics including
        valuation ratios and metrics
      example:
        data:
        - null
        - null
        meta:
          pagination:
            total: 0
            isEstimatedTotal: true
      properties:
        data:
          description: Array of Portfolio Statistics Details Objects
          items:
            $ref: '#/components/schemas/PortfolioStatistics'
          type: array
        meta:
          $ref: '#/components/schemas/SearchMeta'
      title: Portfolio Statistics Details
      type: object
    PortfolioStatistics:
      allOf:
      - $ref: '#/components/schemas/IdentifierResponseFields'
      - $ref: '#/components/schemas/DateResponseField'
      - $ref: '#/components/schemas/PortfolioStatistics_allOf'
      description: Portfolio statistics including concentration, dividend yield, valuation
        ratios (P/E, P/B, P/S, P/CF), and weighted average market cap
      title: Portfolio Statistics Details
    SectorWeightage:
      allOf:
      - $ref: '#/components/schemas/IdentifierResponseFields'
      - $ref: '#/components/schemas/DateResponseField'
      - $ref: '#/components/schemas/SectorWeightage_allOf'
      description: Sector allocation percentages based on FactSet RBICS classification
      title: Sector Weightage
      type: object
    GeographicRevenue:
      allOf:
      - $ref: '#/components/schemas/IdentifierResponseFields'
      - $ref: '#/components/schemas/DateResponseField'
      - $ref: '#/components/schemas/GeographicRevenue_allOf'
      description: Geographic revenue distribution showing percentage breakdown by
        region
      title: Geographic Revenue
      type: object
    MarketCapitalization:
      allOf:
      - $ref: '#/components/schemas/IdentifierResponseFields'
      - $ref: '#/components/schemas/DateResponseField'
      - $ref: '#/components/schemas/MarketCapitalization_allOf'
      description: Market capitalization breakdown showing portfolio allocation across
        large, mid, small, and micro-cap holdings
      title: Market Capitalization
      type: object
    AssetAllocation:
      allOf:
      - $ref: '#/components/schemas/IdentifierResponseFields'
      - $ref: '#/components/schemas/DateResponseField'
      - $ref: '#/components/schemas/AssetAllocation_allOf'
      description: Portfolio asset allocation showing weight distribution across asset
        types such as equity, bonds, and cash
      title: Asset Allocation
      type: object
    RiskMeasures:
      allOf:
      - $ref: '#/components/schemas/IdentifierResponseFields'
      - $ref: '#/components/schemas/DateResponseField'
      - $ref: '#/components/schemas/RiskMeasures_allOf'
      description: Risk measurement indicators including fund vs benchmark comparison,
        SRI PRIIPS, and SRRI UCITS ratings
      title: Risk Measures
      type: object
    CreditRisk:
      allOf:
      - $ref: '#/components/schemas/IdentifierResponseFields'
      - $ref: '#/components/schemas/CreditRisk_allOf'
      description: Credit risk analytics including option-adjusted spread (OAS) and
        its breakdown distribution
      title: Credit Risk
      type: object
    OAS:
      description: Option-adjusted spread breakdown showing distribution by OAS range
      properties:
        date:
          description: The date in YYYY-MM-DD format.
          example: 2025-12-01
          format: date
          type: string
        optionAdjustedSpread:
          description: The Option Adjusted Spread for the fund.
          example: 26.9150588258592
          format: double
          nullable: true
          type: number
        oasBreakdownLabel:
          description: OAS Breakdown Label
          example: 0-100
          type: string
        oasBreakdownPercent:
          description: OAS Breakdown Percentage
          example: 94.56
          format: double
          type: number
      type: object
    RateRisk:
      allOf:
      - $ref: '#/components/schemas/IdentifierResponseFields'
      - $ref: '#/components/schemas/RateRisk_allOf'
      description: Interest rate risk analytics including effective duration and weighted
        average life (WAL) with breakdown
      title: Rate Risk
      type: object
    WAL:
      description: Weighted average life breakdown showing distribution by time period
        ranges
      properties:
        date:
          description: The date in YYYY-MM-DD format.
          example: 2025-12-01
          format: date
          type: string
        effectiveDuration:
          description: The effective duration (in years) for the fund.
          example: 5.78407825634928
          format: double
          nullable: true
          type: number
        weightedAverageLife:
          description: The Weighted Average Life (in years) for the fund.
          example: 28.01722890487987
          format: double
          nullable: true
          type: number
        walBreakdownLabel:
          description: Weighted Average Life (in years)  Label for the fund
          example: 0-1Year
          type: string
        walBreakdownPercent:
          description: Weighted Average Life (in years)  Percentage for the fund
          example: 3.74
          format: double
          type: number
      type: object
    FundVsSegmentBenchmark:
      description: Fund performance metrics relative to its segment benchmark including
        R-squared, alpha, and beta
      properties:
        oneYearFundRSquare:
          description: Returns the fund's rsquare measured against its segment benchmark.Uses
            one year total returns and segment benchmark from the start date. This
            data item is available only with the Analytics product package. If the
            product is not enabled, the field will be omitted from the response.
          example: 0.9
          nullable: true
          type: number
        oneYearFundAlpha:
