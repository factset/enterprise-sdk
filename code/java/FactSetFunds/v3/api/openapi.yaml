  /aum:
    get:
      description: Get the Fund Level or Share Class Level Assets Under Management
        (AUM). <p>NOTE - AUM can be accessed on a five-day calendar. If a vendor does
        not provide NAV and shares outstanding on a market holiday, the previous trading
        day value is used. If a vendor does provide data on a market holiday, that
