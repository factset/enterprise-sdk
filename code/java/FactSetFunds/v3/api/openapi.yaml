  /segments-and-structure:
    get:
      description: |
        Returns fund structure information (classification, similar funds,
        segments, or fund structure) based on the `structureType` parameter.
      operationId: getSegmentsAndStructure
      parameters:
      - description: The requested fund identifier. FactSet Identifiers, tickers,
          CUSIP, SEDOL, and ISIN are accepted inputs. <p>***IDs limit** =  200 per
          request*</p> *<p>Make note, GET Method URL request lines are also limited
          to a total length of 8192 bytes (8KB). In cases where the service allows
          for thousands of IDs, which may lead to exceeding this request line limit
          of 8KB, its advised for any requests with large request lines to be requested
          through the respective "POST" method.</p>*
        examples:
          oneId:
            summary: One Market Identifier
            value:
            - MABAX-US
          multipleIds:
            summary: Multiple Market Identifiers
            value:
            - MABAX-US
            - SPY-US
        explode: false
        in: query
        name: ids
        required: true
        schema:
          items:
            type: string
          maxItems: 200
          minItems: 1
          type: array
        style: form
      - description: |
          Returns the type of data items requested, such as classification details, similar funds, segment (benchmark) details,
          or structure information (funds structure and advisor details).

          * **CLASSIFICATION**: Categorizes funds using a rules-based system that is derived from seven core classifications. This system evaluates the asset class, economic development level, and geographical region as described in each fund's prospectus and marketing materials. Fund exposure details are presented on successively granular levels- category, then focus, and then niche

          * **SIMILAR_FUNDS**: Returns the similar fund share classes
          * **SEGMENTS**: Returns the Fund's Benchmark and Segment Benchmark information.
          * **FUND_STRUCTURE**: Returns fund structure and advisor information
        explode: true
        in: query
        name: structureType
        required: false
        schema:
          $ref: '#/components/schemas/StructureType'
        style: form
      responses:
        "200":
          content:
            application/json:
              examples:
                Classification:
                  $ref: '#/components/examples/SegmentsAndStructureClassification'
                SimilarFunds:
                  $ref: '#/components/examples/SegmentsAndStructureSimilarFunds'
                Segments:
                  $ref: '#/components/examples/SegmentsAndStructureSegments'
                Structure:
                  $ref: '#/components/examples/SegmentsAndStructureFundStructure'
              schema:
                $ref: '#/components/schemas/SegmentsAndStructureResponse'
          description: Successful response
