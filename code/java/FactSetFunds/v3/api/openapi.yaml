    Ids:
      description: The requested fund identifier. FactSet Identifiers, tickers, CUSIP,
        SEDOL, and ISIN are accepted inputs. <p>***IDs limit** =  200 per request*</p>
        *<p>Make note, GET Method URL request lines are also limited to a total length
        of 8192 bytes (8KB). In cases where the service allows for thousands of IDs,
        which may lead to exceeding this request line limit of 8KB, its advised for
        any requests with large request lines to be requested through the respective
        "POST" method.</p>*
      example:
      - MABAX
      - SPY
      items:
        type: string
      maxItems: 200
      minItems: 1
      type: array
    Lang:
      default: EN
      description: |-
        Language to be returned for Description, Insight (Overview), and Objective attributes, where available.
        Currently French will be returned for U.S. funds when "FR" is passed.
      enum:
