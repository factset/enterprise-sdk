    Summaries_allOf:
      properties:
        error:
          $ref: '#/components/schemas/FundsErrorObject'
        fsymEntityId:
          description: FactSet Entity Identifier. Six alpha-numeric characters, excluding
            vowels, with a -E suffix (XXXXXX-E), resolved from the `requestId` of
            the Fund requested.
          example: 04BFG7-E
          nullable: true
          type: string
        fsymRegionalId:
          description: FactSet Regional Identifier. Six alpha-numeric characters,
            excluding vowels, with a -R suffix (XXXXXX-R), resolved from the`requestId`
            of the Fund requested.
          example: SJY03Z-R
          nullable: true
          type: string
        fsymTickerRegion:
          description: FactSet Ticker-Region for the requested fund.
          example: MABAX-US
          nullable: true
          type: string
        fsymUltimateParentId:
          description: The FactSet Ultimate Parent Entity Identifier, with a -E suffix
            (XXXXXX-E).
          example: 002HJD-E
          nullable: true
          type: string
        name:
          description: The Fund security's name in proper format.
          example: BlackRock Basic Value Fund Incorporated
          nullable: true
          type: string
        isin:
          description: Unique 12-character identifier for the requested fund, as per
            the International Securities Identification Number (ISIN) standard.
          example: US09251G5071
          nullable: true
          type: string
        cusip:
          description: Unique 9-character identifier for the requested fund, as per
            the CUSIP Numbering System.
          example: 09251G507
          nullable: true
          type: string
        sedol:
          description: Sedol Identifier
          example: "2580964"
          nullable: true
          type: string
        wkn:
          description: WKN
          example: A1J47F
          nullable: true
          type: string
        valoren:
          description: Valoren
          example: "2730688"
          nullable: true
          type: string
        issuerId:
          description: The Issuer Identifier.
          example: 004B8C-E
          nullable: true
          type: string
        issuerName:
          description: The Issuer Name in proper format.
          example: BlackRock Inc.
          nullable: true
          type: string
        activeFlag:
          description: Boolean flag to indicate whether the fund is currently active
            or not.
          example: true
          nullable: true
          type: boolean
        activelyManagedFlag:
          description: Boolean flag of whether the fund is actively managed or not.
          example: true
          nullable: true
          type: boolean
        brand:
          description: The Funds Brand Name in proper format.
          example: BlackRock
          nullable: true
          type: string
        fundDomicile:
          description: Returns the fund's country of domicile in ISO2 format. Only
            available for Mutual Funds.
          example: US
          nullable: true
          type: string
        currency:
          description: ISO3 Currency. For a list of currency ISO codes, visit Online
            Assistant Page [OA1470](https://my.apps.factset.com/oa/pages/1470)'
          example: USD
          nullable: true
          type: string
        currencyHedged:
          description: Returns selected ETF currency hedge information.
          example: false
          nullable: true
          type: boolean
        shareClass:
          description: The Funds Share class type name in proper format.
          example: Institutional Class
          nullable: true
          type: string
        shareClassName:
          description: The specified share class name for the fund in proper format.
          example: BlackRock Basic Value I
          nullable: true
          type: string
        shareClassActiveFlag:
          description: Returns a binary indicator of whether the specified share class
            is currently active, where 1 is active and 0 is inactive.
          example: true
          nullable: true
          type: boolean
        shareClassActivelyManagedFlag:
          description: Returns a binary indicator of whether the specified share class
            is actively managed, where 1 is active and 0 is inactive.
          example: true
          nullable: true
          type: boolean
        shareClassCurrency:
          description: The currency for the specified share class. ISO3 Currency.
            For a list of currency ISO codes, visit Online Assistant Page [OA1470](https://my.apps.factset.com/oa/pages/1470)'
          example: USD
          nullable: true
          type: string
        isOldestShareClass:
          description: Returns a flag to indicate whether the specified ID is the
            oldest share class. Data is returned for Mutual Funds only.
          example: true
          nullable: true
          type: boolean
        descInfo:
          description: The Fund's Investment Strategy short description.  For the
            long-form description, see `insight`.
          example: The investment objective of the BlackRock Basic Value Fund, Inc.
            (the Fund) is to seek capital appreciation and, secondarily, income by
            investing in securities, primarily equity securities, that management
            of the Fund believes are undervalued and therefore represent basic investment
            value.
          nullable: true
          type: string
        priceFirstDate:
          description: 'The fund''s first available date for prices (NAV) in YYYY-MM-DD
            format. This can be used to fetch the first available price from FactSet.
            *NOTE: This is not the inception date of fund.*'
          example: 2025-04-18
          format: date
          nullable: true
          type: string
        priceRecentDate:
          description: The fund's most recent available date for prices (NAV) in YYYY-MM-DD
            format.
          example: 2026-03-26
          format: date
          type: string
        insight:
          description: The fund's investment strategy long description. Use `descInfo`
            if needing short description.
          example: |
            AGG`s all-in cost is low and more predictable than its rivals. In a segment where there are a handful of similar funds tracking essentially the same underlying index, holding and trading costs are the driving factors. AGG delivers its underlying index`s returns with precision and consistency. The fund also has a history of massive trading volume and tight spreads. AGG tracks our segment benchmark, providing excellent exposure to the US investment-grade bond market. Note that the fund employs a careful optimization strategy, holding just a fraction of the names in its index, a near-necessity among bond-market ETFs.
          nullable: true
          type: string
        legalStructure:
          description: The legal structure of the fund, e.g. Open-Ended Fund, close-ended
            fund
          example: Open-Ended Fund
          nullable: true
          type: string
        inceptionDate:
          description: The fund's inception date in YYYY-MM-DD format.
          example: 1977-07-01
          format: date
          nullable: true
          type: string
        shareClassLaunchDate:
          description: The specified share class's inception date in YYYY-MM-DD format.
            Available only for Mutual Funds
          example: 1977-07-01
          format: date
          nullable: true
          type: string
        primaryExchange:
          description: Returns exchange information for the fund.  Exchange Name is
            available for Mutual Funds and ETFs, returns a short-form exchange code
            (e.g., "NYSE"), rather than the full exchange name.
          example: NYSE
          nullable: true
          type: string
        webSite:
          description: The URL of the Fund.
          example: https://www.blackrock.com/investing/products/227716/blackrock-basic-value-class-a-fund
          nullable: true
          type: string
        webSiteShareClass:
          description: URL of the share class webpage.
          example: https://www.blackrock.com/us/individual/products/227716/blackrock-Large%20Cap%20Focus-value-class-a-fund
          nullable: true
          type: string
        backing:
          description: Returns selected ETF structure backing information. Data items
            available are ETF type, legal structure, and disclosures.
          example: physical
          nullable: true
          type: string
        syntheticType:
          description: Returns selected ETF structure information. Data items available
            are ETF type, legal structure, and disclosures.
          example: ""
          nullable: true
          type: string
        underlyingIndex:
          description: Returns the name of the fund's benchmark. Data is returned
            for both Mutual Funds and ETFs.
          example: Russell 1000 Value
          nullable: true
          type: string
        broadBasedIndex:
          description: Returns the index that represents the overall market applicable
            to the fund, providing a broad measure of market performance. Data is
            returned for both Mutual Funds and ETFs.
          example: Russell 1000 Index - TR
          nullable: true
          type: string
        narrowBenchmark:
          description: Returns the fund's narrow benchmark data. Narrow Benchmark
            returns the primary benchmark for an actively managed fund, reflecting
            the specific market in which the fund primarily invests. It is a more
            focused measure compared to a broad-based index, offering a closer alignment
            with the fund’s investment strategy
          example: Russell 1000 Index - TR
          nullable: true
          type: string
        additionalNarrowBenchmark:
          description: |
            Returns the fund's additional narrow benchmark data.
            Narrow Benchmark returns the primary benchmark for an actively managed fund, reflecting the specific market in which the fund primarily invests.
            Additional Narrow Benchmark returns an additional benchmark for an actively managed fund that measures performance within a specific market segment, providing a more detailed comparison than the primary benchmark.
            Data is returned for both Mutual Funds and ETFs.
          nullable: true
          type: string
        fundObjective:
          description: |
            Returns the fund's objective long description.
            National language returns French translations for US Mutual Funds and US and Canadian ETFs.
            Data is returned for both Mutual Funds and ETFs.
          example: |
            Under normal circumstances, the Fund seeks to invest at least 80% of its net assets plus the amount of any borrowings for investment purposes in large cap equity securities and derivatives that have similar economic characteristics to such securities. For purposes of the Fund’s 80% policy, large cap equity securities are equity securities that at the time of purchase have a market capitalization within the range of companies included in the Russell 1000® Value Index (the “Russell 1000 Value Index”). The Russell 1000 Value Index is a capitalization-weighted index from a broad range of industries chosen for market size, liquidity and industry group representation. Equity securities consist of common stock and preferred stock, other financial instruments that are components of, or have characteristics similar to, the securities included in the Russell 1000 Value Index, and American Depositary Receipts (“ADRs”), which are receipts typically issued by an American bank or trust company that evidence underlying securities issued by a foreign company. The Fund may also purchase conver tible securities. The Fund invests primarily in equity securities that Fund management believes are undervalued, which means that their prices are less than Fund management believes they are wor th. Fund management places par ticular emphasis on companies with below average price/earnings ratios that may pay above average dividends. The Fund invests primarily in common stock of U.S. companies, but the Fund may invest up to 25% of its total assets in the securities of foreign
          nullable: true
          type: string
        dualPriced:
          description: |
            Returns true if the fund is based on "dual pricing". These unit trusts have an offer (buying) price and a bid (selling) price.
            In such cases, Net Asset Value (NAV) is substituted with either a bid, offer, or mid price, as provided by the fund issuer.
            Data is returned for Mutual Funds only.
          example: false
          nullable: true
          type: boolean
        currencyHedgedFrom:
          description: |
            Returns ETF currency hedge source currency. Part of ETF hedge information including: - currency hedged flag - currency hedged from - currency hedged into ISO3 Currency. For a list of currency ISO codes, visit Online Assistant Page [OA1470](https://my.apps.factset.com/oa/pages/1470)'
          example: EUR
          nullable: true
          type: string
        currencyHedgedInto:
          description: |
            Returns ETF currency hedge target currency. Part of ETF hedge information including: - currency hedged flag - currency hedged from - currency hedged into ISO3 Currency. For a list of currency ISO codes, visit Online Assistant Page [OA1470](https://my.apps.factset.com/oa/pages/1470)'
          example: USD
          nullable: true
          type: string
        managers:
          description: Fetch basic Fund manager details, such as Title, Phone, Job
            Id and Name.
          items:
            $ref: '#/components/schemas/Managers'
          nullable: true
          type: array
      type: object
    TaxExposure_allOf:
