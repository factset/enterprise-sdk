    Operator:
      description: "The operator to be used in the filter criteria, where\n  * **EQ**\
        \  = Equals,\n  * **NE** = Not equals,\n  * **CT**  = Contains returns values\
        \ which contain given substring,\n  * **NOT_CT** = Not Contains - returns\
        \ values that **do not** contain the given substring,\n  * **IN** = The \"\
        In\" operator accepts an array of values and returns data that matches any\
        \ of them,\n  * **NOT_IN** = The \"NOT_IN\" operator accepts an array of values\
        \ and returns data that matches none of them,\n  * **LT** = Less than,\n \
        \ * **LTE** = Less than or equal to,\n  * **GT**  = Greater than,\n  * **GTE**\
        \ = Greater than or equal to.\n  \n  <br>\n**Note:** Both the `IN` and `NOT_IN`\
        \ operators accept multiple values, while all other operators should be used\
        \ with a single value.\n"
      enum:
      - EQ
      - NE
      - CT
      - NOT_CT
      - IN
      - NOT_IN
      - LT
      - LTE
      - GT
      - GTE
      example: EQ
      type: string
