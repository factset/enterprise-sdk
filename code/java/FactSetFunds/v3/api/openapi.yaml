        (T+1) are not accepted in this endpoint
      example: 2025-01-01
      format: date
      type: string
    DateSnapshot:
      description: The date requested for a given date range in YYYY-MM-DD format.
        The date MUST be equal to or less than the `priceRecentDate` found within
        the /summary endpoint.
      example: 2025-01-01
      format: date
      type: string
    EndDate:
      description: The end date requested for a given date range in **YYYY-MM-DD**
        format. If left blank, the API will default to previous close. Future dates
        (T+1) are not accepted in this endpoint.
      example: 2025-12-31
      format: date
      type: string
