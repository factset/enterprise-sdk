openapi: 3.0.0
info:
  contact:
    email: api@factset.com
    name: FactSet Research Systems
    url: https://developer.factset.com/contact
  description: "FactSet Mutual Funds and ETFs Reference provides fund-specific reference\
    \ information as well as FactSet's proprietary classification system. It includes\
    \ but is not limited to the following coverage \n  * Fund descriptions \n  * A\
    \ seven-tier classification system\n  * Leverage information\n  * Fees and expenses\
    \ \n  * Portfolio managers \n  \n  FactSet Mutual Funds Time Series provides quantitative\
    \ data items on a historical basis. It includes but is not limited to the following\
    \ coverage \n  * Net asset value\n  * Fund flows \n  * Assets under management\n\
    \  * Total return \n  \n In addition to core reference and time series data, the\
    \ API enables broader fund analytics and workflows, including: \n * Fund summary\
    \ and classification insights such as domicile, structure, segments, and similar\
    \ funds  \n * Performance analytics including historical returns, snapshot returns\
    \ across time horizons, and yield data \n * Cost, fee, and risk metrics including\
    \ expense ratios, regulatory/tax exposure, and risk measures \n * Portfolio exposure\
    \ and analytics including asset allocation, sector weightage, geographic exposure,\
    \ and top holdings  \n * Trading and liquidity characteristics for evaluating\
    \ tradability  \n * ETF-specific scoring and ratings to assess efficiency, tradability,\
    \ and fit relative to benchmarks  \n * Distribution and income data for understanding\
    \ payouts and investor returns \n <p>This API is rate-limited to 10 requests per\
    \ second and 10 concurrent requests per user.\n"
  license:
    name: Apache License, Version 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  title: FactSet Funds and ETF API
  version: 3.0.0
externalDocs:
  description: API Documentation
  url: https://developer.factset.com/api-catalog/factset-funds-api
servers:
- description: Production
  url: https://api.factset.com/content/factset-funds/v3
security:
- FactSetApiKey: []
- FactSetOAuth2: []
tags:
- description: Fund summary information, classification, similar funds, segments,
    asset under management, and flows.
  name: Summary, Segments and Stats
- description: Fund pricing, returns, distributions, and income data.
  name: Prices, Returns, and Distributions
- description: Fund costs, fees, tax exposure, regulatory compliance, and risk measures.
  name: Taxes, Fees and Risks
- description: Fund portfolio composition, sector breakdown, risk analytics, holdings.
  name: Portfolio Exposure and Analysis
- description: Get scoring details for ETF
  name: Scoring
- description: Trading-related characteristics for funds and ETFs
  name: Trading
- description: Screener-specific endpoints for managing and querying content sets.
  name: Screener Operations
paths:
  /summary:
    get:
      description: "Fetch basic reference data for the requested fund(s), including\
        \ `fundDomicile`, `shareClass`, `shareClassLaunchDate`, etc. \n"
      operationId: getFundsSummary
      parameters:
      - description: The requested fund identifier. FactSet Identifiers, tickers,
          CUSIP, SEDOL, and ISIN are accepted inputs. <p>***IDs limit** =  200 per
          request*</p> *<p>Make note, GET Method URL request lines are also limited
          to a total length of 8192 bytes (8KB). In cases where the service allows
          for thousands of IDs, which may lead to exceeding this request line limit
          of 8KB, its advised for any requests with large request lines to be requested
          through the respective "POST" method.</p>*
        examples:
          oneId:
            summary: One Market Identifier
            value:
            - MABAX-US
          multipleIds:
            summary: Multiple Market Identifiers
            value:
            - MABAX-US
            - SPY-US
        explode: false
        in: query
        name: ids
        required: true
        schema:
          items:
            type: string
          maxItems: 200
          minItems: 1
          type: array
        style: form
      - description: Language to be returned for Description, Insight (Overview),
          and Objective attributes, where available. Currently French will be returned
          for U.S. funds when "FR" is passed.
        example: EN
        explode: true
        in: query
        name: lang
        required: false
        schema:
          $ref: '#/components/schemas/Lang'
        style: form
      responses:
        "200":
          content:
            application/json:
              examples:
                Fund Summary details for MABAX-US:
                  $ref: '#/components/examples/summariesResponseExample'
              schema:
                $ref: '#/components/schemas/SummariesResponse'
          description: The Fund Summaries response object.
        "400":
          content:
            application/json:
              examples:
                Bad Request - Date Format:
                  $ref: '#/components/examples/badRequestDateFormat'
                Bad Request - Missing Required Parameter:
                  $ref: '#/components/examples/badRequestRequiredParameter'
                Bad Request - Future Date:
                  $ref: '#/components/examples/badRequestFutureDate'
                Bad Request - Invalid Parameter:
                  $ref: '#/components/examples/badRequestInvalidParameters'
                Bad Request - Malformed JSON:
                  $ref: '#/components/examples/badRequestMalformedJSON'
                Bad Request - Read Timeout:
                  $ref: '#/components/examples/badRequestReadTimeout'
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad Request. This can occur for several reasons. Please review
            the "message" for more details.
        "401":
          content:
            application/json:
              examples:
                User Authentication - Failed:
                  $ref: '#/components/examples/unauthenticated'
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthenticated USERNAME-SERIAL. Ensure you are logged in and
            have successfully generated an API KEY for the IP range you are connecting
            from. For more help, select the **Report Issue** in the top right corner
            of this Developer Portal specification card and choose Connectivity 401
            or 403 Responses.
        "403":
          content:
            application/json:
              examples:
                Forbidden:
                  $ref: '#/components/examples/forbidden'
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: The USERNAME-SERIAL attempted to request the endpoint is not
            authorized to access. The request was a legal request, but the server
            is refusing to respond. Please reach out to FactSet Account Team for assistance
            with authorization.
        "404":
          content:
            application/json:
              examples:
                Bad Request - Endpoint Not Found:
                  $ref: '#/components/examples/notFound'
                Bad Request - Data Not Found:
                  $ref: '#/components/examples/dataNotFound'
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: The requested resource was not found.
        "415":
          content:
            application/json:
              examples:
                Unsupported Media Type:
                  $ref: '#/components/examples/unsupportedMediaType'
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unsupported Media Type. This error may be returned when the
            caller sends a resource in a format that is not accepted by the server.
            This can be fixed by ensuring that Content-Type header is set to the correct
            value. In this instance, "application/json" would be the appropriate value.
        "422":
          content:
            application/json:
              examples:
                Validation Error:
                  $ref: '#/components/examples/unprocessableEntity'
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: |
            Unprocessable Entity. Your request data was syntactically correct but semantically invalid.
            Check the required parameters and their value constraints.
        "500":
          content:
            application/json:
              examples:
                Internal Server Error - Not Writable:
                  $ref: '#/components/examples/notWritable'
                Internal Server Error - General Exception:
                  $ref: '#/components/examples/generalException'
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal Server Error.
      summary: Get basic reference summary data for a Fund.
      tags:
      - Summary, Segments and Stats
      x-accepts: application/json
    post:
      description: "Fetch basic reference data for the requested fund(s), including\
        \ `fundDomicile`, `shareClass`, `shareClassLaunchDate`, etc. \n"
