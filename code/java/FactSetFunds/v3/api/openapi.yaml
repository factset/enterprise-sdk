    RegulationsTaxDetails_allOf:
      properties:
        error:
          $ref: '#/components/schemas/FundsErrorObject'
        taxItemsType:
          $ref: '#/components/schemas/RegulationsTaxDetailsType'
        regulatoryAuthority:
          description: "The regulatory authority supervising the fund or umbrella.\
            \ Data is returned for Mutual Funds only.\nPossible values include—  \n\
            \  SEC, CONSOB, FCMC, CSSF, MFSA, AFM, NFSA, ASF, CNMV, FINMA, FCA, FRC,\
            \ JFSC, FI (SE),\n  FIN-FSA, GFSC, FMA (LI), NBS, FME, MNB, CMB, FMA (AT),\
            \ FMA (AU), SFSA, HANFA, EFSA,\n  ATVP, CNB, CMB, CMVM, KNF, CIMA, CCAF,\
            \ FSMA, COVIP, IOMFSA, FI (EE), DFSA, AMF,\n  BaFin, HCMC, CBI\n"
          example: FCA
          nullable: true
          type: string
        ucitsScheme:
          description: Determines whether the fund is regulated under the UCITS IV
            (Directive 2009/65/EC) or UCITS V (Directive 2014/91/EU). Data is returned
            for Mutual Funds only.
          example: UCITS IV
          nullable: true
          type: string
        ucitsCompliance:
          description: Determines whether the fund is regulated under the UCITS IV
            (Directive 2009/65/EC) or UCITS V (Directive 2014/91/EU). Data is returned
            for Mutual Funds only.
          example: true
          nullable: true
          type: boolean
        priipsEligible:
          description: Indicates if the fund has a published Key Information Document
            (KID) in the fund website. Data is returned for Mutual Funds only.
          example: false
          nullable: true
          type: boolean
        taxReportingStatusUK:
          description: UK Tax Reporting indicates if a fund has UK fund tax status
            which enables approved shares to provide favorable tax rates on any gain
            upon disposal of investor's investments. Data is returned for both Mutual
            Funds and ETFs.
          example: true
          nullable: true
          type: boolean
        srdComplianceFR:
          description: Returns 'True' if the fund is eligible for Deferred Settlement
            Service or Service à Réglement Différé (SRD) in France. Data is returned
            for Mutual Funds only.
          example: true
          nullable: true
          type: boolean
        isaUKCompliant:
          description: UK ISA Compliance indicates whether the fund is included in
            the UK ISA (Individual Savings Account) in-house tax free saving scheme.
            Data is returned for both Mutual Funds and ETFs
          example: true
          nullable: true
          type: boolean
        peaEligibleFr:
          description: Returns 'True' if the fund is eligible for the Plan d'Epargne
            en Action (PEA) or “shared savings plan” in France.It is a regulated savings
            product that allows the purchase of European equities or funds without
            capitalization constraints.Data is returned for Mutual Funds only.
          example: true
          nullable: true
          type: boolean
        navFrequency:
          description: Returns frequency at which the NAV is calculated. Data is returned
            for Mutual Funds only.
          enum:
          - Daily
          - Bi-Monthly
          - Semi-Monthly
          - Bi-Weekly
          - Tri-Annually
          - Weekly
          - Semi-Weekly
          - Monthly
          - Quarterly
          - Semi-annual
          - Annually
          - Erratic
          - None
          example: Daily
          nullable: true
          type: string
        transactionCutOffTime:
          description: "Returns the cut off time for transactions.\nThe value is provided\
            \ as a time string in the format \"HH:mm z\", \nwhere HH:mm is the hour\
            \ and minute, and z is the timezone abbreviation (e.g., \"12:00 GMT\"\
            ).\n"
          example: 12:00 GMT
          nullable: true
          type: string
        esgObjective:
          description: Determine if the fund is ESG compliant or not and returns the
            fund's ESG classification.
          example: true
          nullable: true
          type: boolean
        sfdrClassification:
          description: |
            Determines if the fund is ESG compliant and returns the fund's ESG classification according to the Sustainable Finance Disclosure Regulation (SFDR).
            Possible values:
              - Article 8: Preferences for products having ESG Characteristics.
              - Article 9: Preferences for products having Sustainable Objectives.
              - Article 6: Fund is not ESG but makes disclosures on the integration of sustainable risks.
              - Article 0: The type or structure of the fund is out of ESG requirements.
              - NA:- No information available.
            Data is returned for both Mutual Funds and ETFs.
          example: Article 9
          nullable: true
          type: string
        ukSDR:
          description: Returns the fund's UK SDR. Data is returned for both Mutual
            Funds and ETFs
          example: Sustainability Impact
          nullable: true
          type: string
        availableForSaleIn:
          description: Returns where the fund is available for sale. Data is returned
            for both Mutual Funds and ETFs. Each entry is an ISO 3166-1 alpha-2 country
            code.
          example:
          - AT
          - BE
          - US
          items:
            type: string
          nullable: true
          type: array
