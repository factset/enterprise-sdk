  /scoring:
    get:
      description: "Returns ETF scores, segment averages, analyst recommendations,\n\
        and grade.\n* Calculated scores include efficiency, tradability, and fit.\n\
        \n* Segment averages include efficiency, tradability, and fit. \n\n* Analyst\
        \ pick flags an ETF that provides comprehensive, market like exposure to an\
        \ area of the market/segment, keeping costs and liquidity in mind.\n\n*  Opportunities\
        \ list flags an ETF that provides potentially valuable but\nalternative  \
        \ exposure to the market/segment, keeping costs and liquidity in mind.\n\n\
        * Grade combines efficiency and tradability scores and assigns a letter grade\n\
        \nThis endpoint is available only with Analytics product subscription. If\
        \ the product is not subscribed, an error will be returned.\n"
