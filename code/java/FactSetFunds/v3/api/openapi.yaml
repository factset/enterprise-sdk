  /flows:
    get:
      description: "Get the Fund Flows. One-day fund flows are calculated by subtracting\
        \ the shares outstanding at previous close from the shares outstanding one\
        \ day prior to close, and then multiplying the result by the net asset value\
        \ (NAV) of one day prior to close.\n\nThe fund flows calculation breaks down\
        \ as follows - \n```(Shares Outstanding T0 - Shares Outstanding T-1) * NAV\
        \ T-1 ```\nWhile NAVs are routinely reported on a trade-day (T0) basis, industry-wide\
        \ shares outstanding are a mixture of trade-day and next-day values. Trade-day\
        \ values are not verified, as the actual creation/redemption activity takes\
        \ place late in the evening, after NAVs and shares outstanding values have\
        \ been published. The result is that multiple industry flows are calculated\
        \ using unverified T0 values.\nFactSet has standardized all shares outstanding\
        \ reporting on a next-day basis. To ensure that assets under management (AUM)\
        \ and fund flows are synchronized, FactSet synchronizes shares outstanding\
        \ values and changes with NAVs reported on the previous day, as the creations\
        \ and redemptions used the previous day's reported NAVs as a transaction price.\
        \ <p>For more information on Fund Flows Methodology, Time Windows, Market\
        \ Holidays, and Missing Values, visit - [OA #17863](https://my.apps.factset.com/oa/pages/17863#Flows_Calculation)</p>\n"
      operationId: getFundsFlows
      parameters:
      - description: The requested fund identifier. FactSet Identifiers, tickers,
          CUSIP, SEDOL, and ISIN are accepted inputs. <p>***IDs limit** =  200 per
          request*</p> *<p>Make note, GET Method URL request lines are also limited
          to a total length of 8192 bytes (8KB). In cases where the service allows
          for thousands of IDs, which may lead to exceeding this request line limit
          of 8KB, its advised for any requests with large request lines to be requested
          through the respective "POST" method.</p>*
        examples:
          oneId:
            summary: One Market Identifier
            value:
            - MABAX-US
          multipleIds:
            summary: Multiple Market Identifiers
            value:
            - MABAX-US
            - SPY-US
        explode: false
        in: query
        name: ids
        required: true
        schema:
          items:
            type: string
          maxItems: 200
          minItems: 1
          type: array
        style: form
      - description: The start date requested for a given date range in YYYY-MM-DD
          format. If left blank, the API will default to previous close.Future dates
          (T+1) are not accepted in this endpoint.
        example: 2025-01-01
        explode: true
        in: query
        name: startDate
        required: false
        schema:
          $ref: '#/components/schemas/StartDate'
        style: form
      - description: The end date requested for a given date range in YYYY-MM-DD format.
          If left blank, the API will default to previous close.Future dates (T+1)
          are not accepted in this endpoint
        example: 2025-12-31
        explode: true
        in: query
        name: endDate
        required: false
        schema:
          $ref: '#/components/schemas/EndDate'
        style: form
      - description: "Controls the display frequency of the data returned. The supported\
          \ frequencies are:\n  \n- **D**: Daily\n- **W**: Weekly, based on the last\
          \ day of the week of the start date.\n- **M**: Monthly, based on the last\
          \ trading day of the month.\n- **AM**: Monthly, based on the start date\
          \ (e.g., if the start date is June 16, data is displayed for June 16, May\
          \ 16, April 16, etc.).\n- **CQ**: Quarterly, based on the last trading day\
          \ of the calendar quarter (March, June, September, or December).\n- **FQ**:\
          \ Fiscal Quarter of the company.\n- **AY**: Actual Annual, based on the\
          \ start date.\n- **CY**: Calendar Annual, based on the last trading day\
          \ of the calendar year.\n- **FY**: Fiscal Annual, based on the last trading\
          \ day of the company's fiscal year.\n"
        example: M
        explode: true
        in: query
        name: frequency
        required: false
        schema:
          $ref: '#/components/schemas/Frequency'
        style: form
      - description: The ISO3 currency control for the requested fund. For a list
          of currency ISO codes, visit Online Assistant Page [OA1470](https://my.apps.factset.com/oa/pages/1470)
        example: USD
        explode: true
        in: query
        name: currency
        required: false
        schema:
          $ref: '#/components/schemas/Currency'
        style: form
      - description: The maximum number of records to return. The default is 20.
        explode: true
        in: query
        name: _paginationLimit
        required: false
        schema:
          default: 20
          example: 100
          format: int32
          maximum: 500
          minimum: 1
          type: integer
        style: form
      - description: The number of records to skip before the first record to return.
          The default is 0.
        explode: true
        in: query
        name: _paginationOffset
        required: false
        schema:
          default: 0
          example: 0
          format: int32
          maximum: 2147483147
          minimum: 0
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              examples:
                Fund AUM details for MABAX-US:
                  $ref: '#/components/examples/fundFlows'
              schema:
                $ref: '#/components/schemas/FlowsResponse'
          description: The Fund Flows response object.
        "400":
