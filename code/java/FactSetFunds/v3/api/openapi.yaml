        this endpoint.
      example: 2025-12-31
      format: date
      type: string
    Currency:
      default: USD
      description: The ISO3 currency control for the requested fund. For a list of
        currency ISO codes, visit Online Assistant Page [OA1470](https://my.apps.factset.com/oa/pages/1470)
      example: USD
      type: string
    NavDataType:
      default: ROLL
      description: Controls the data type of the Fund NAV between Raw or Rolled values.
      enum:
      - ROLL
      - RAW
      example: ROLL
      type: string
    SplitAdjust:
      default: SPLIT
      description: "Controls the split adjustment of the Fund's NAV - \n  * **SPLIT**\
        \ = Split ONLY Adjusted. This is used by default.\n  * **UNSPLIT** = No Adjustments,\
        \ Controls the split and dividend adjustments for the prices.\n"
      enum:
      - SPLIT
      - UNSPLIT
      example: SPLIT
      type: string
    DividendAdjust:
      default: DIV
      description: |
        Controls the dividend inclusion for the NAV returns calculations -
          * **DIV** = Include Dividends, Total Return
          * **NO_DIV** = Exclude Dividends, Simple Return
      enum:
      - DIV
      - NO_DIV
      example: DIV
      type: string
    KeyItemsType:
      default: GROWTH
      description: The Key Items type report provides access to industry-specific
        operating measures
      enum:
      - GROWTH
      - MARGINS
      - RATIOS
      - PERSHARE
      example: GROWTH
      type: string
    Frequency:
      default: D
      description: |
        Controls the display frequency of the data returned.
          * **D** = Daily
          * **W** = Weekly, based on the last day of the week of the start date.
          * **M** = Monthly, based on the last trading day of the month.
          * **AM** = Monthly, based on the start date (e.g., if the start date is June 16, data is displayed for June 16, May 16, April 16 etc.).
          * **CQ** = Quarterly based on the last trading day of the calendar quarter (March, June, September, or December).
          * **FQ** = Fiscal Quarter of the company.
          * **AY** = Actual Annual, based on the start date.
          * **CY** = Calendar Annual, based on the last trading day of the calendar year.
          * **FY** = Fiscal Annual, based on the last trading day of the company's fiscal year.
      enum:
      - D
      - W
      - M
      - AM
      - CQ
      - FQ
      - AY
      - CY
      - FY
      example: M
      type: string
    FrequencyAum:
      default: M
      description: |
        Controls the display frequency of the data returned.
          * **MTD** = Month-To-Date
          * **M** = Monthly, based on the last trading day of the month.
          * **CQTD** = Calendar Quarter-to-Date
          * **CQ** = Calendar Quarterly
          * **CYTD** = Calendar Year-to-Date
          * **CY** = Calendar Yearly
      enum:
      - MTD
      - M
      - CQTD
      - CQ
      - CYTD
      - CY
      example: M
      type: string
    StructureType:
      default: CLASSIFICATION
      description: |
        Returns the type of data items requested, such as classification details, similar funds, segment (benchmark) details,
        or structure information (funds structure and advisor details).
        * **CLASSIFICATION**: Categorizes funds using a rules-based system that is derived from seven core classifications. This system evaluates the asset class, economic development level, and geographical region as described in each fund's prospectus and marketing materials. Fund exposure details are presented on successively granular levels- category, then focus, and then niche
        * **SIMILAR_FUNDS**: Returns the similar fund share classes
        * **SEGMENTS**: Returns the Fund's Benchmark and Segment Benchmark information.
        * **FUND_STRUCTURE**: Returns fund structure and advisor information
      enum:
      - CLASSIFICATION
      - SIMILAR_FUNDS
      - SEGMENTS
      - FUND_STRUCTURE
      type: string
    TaxItemsType:
      default: REGULATION_TAX
      description: Returns type of tax and risk information.
      enum:
      - REGULATION_TAX
      - TAX_EXPOSURE
      - RISK_MEASURES
      type: string
    RiskType:
